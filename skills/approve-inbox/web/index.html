    function allColumns() {
      const byId = new Map();
      for (const col of COLUMN_DEFS.concat(state.customColumns || [])) byId.set(col.id, col);
      return [...byId.values()];
    }

    function getColumn(id) {
      return allColumns().find(c => c.id === id) || { id, label: id };
    }

    function ensureRequiredColumns(ids) {
      const next = Array.isArray(ids) ? ids.filter(id => id && id !== 'actions') : [];
      if (!next.includes('title')) next.unshift('title');
      return next.concat('actions');
    }

    function getPathValue(source, path) {
      if (!source || !path) return undefined;
      return String(path).split('.').reduce((current, segment) => {
        if (current == null) return undefined;
        const match = segment.match(/^(.+)\[(\d+)]$/);
        if (match) {
          const base = current[match[1]];
          return Array.isArray(base) ? base[Number(match[2])] : undefined;
        }
        return current[segment];
      }, source);
    }

    function fieldText(item, id) {
      const col = getColumn(id);
      if (col.path) return displayText(getPathValue(item, col.path) || getPathValue(item.summary, col.path) || '');
      if (id === 'amount') return displayText(item.amount || item.summary?.amount || item.summary?.totalAmount || '');
      if (id === 'supplier') return displayText(item.supplier || item.summary?.supplier || item.summary?.vendor || '');
      if (id === 'budget') return displayText(item.budget || item.summary?.budget || '');
      if (id === 'department') return displayText(item.department || item.summary?.department || '');
      return displayText(item[id] || item.summary?.[id] || '');
    }

    function renderAdvice(value) {
      return value && ADVICE_LABEL[value]
        ? '<span class="yc-mail-advice yc-mail-advice-' + esc(value) + '">' + ADVICE_LABEL[value] + '</span>'
        : '<span class="yc-mail-muted">-</span>';
    }

    function renderRisk(value) {
      return value && RISK_LABEL[value]
        ? '<span class="yc-mail-risk-pill yc-mail-risk-' + esc(value) + '">' + RISK_LABEL[value] + '</span>'
        : '<span class="yc-mail-muted">-</span>';
    }

    function renderMailCell(item, id) {
      if (id === 'title') {
        return '<div class="yc-mail-title-cell"><i class="yc-approve-inbox-risk-dot"></i><div><strong>' + esc(item.title) + '</strong><span>' +
          [item.docType, item.submitter, formatDate(item.submittedAt)].filter(Boolean).map(esc).join(' · ') +
          '</span></div></div>';
      }
      if (id === 'submittedAt') return '<span class="yc-mail-cell-text">' + esc(formatDate(item.submittedAt)) + '</span>';
      if (id === 'advice') return renderAdvice(item.advice);
      if (id === 'riskLevel') return renderRisk(item.riskLevel);
      if (id === 'attachments') return item.hasAttachments
        ? '<span class="yc-mail-attachment">' + icon('file') + esc(item.attachmentCount || 1) + '</span>'
        : '<span class="yc-mail-muted">-</span>';
      if (id === 'tags') return renderSmartTags(item.smartTags) || '<span class="yc-mail-muted">-</span>';
      if (id === 'actions') return renderRowActions(item) || '<span class="yc-mail-muted">-</span>';
      return '<span class="yc-mail-cell-text">' + esc(fieldText(item, id) || '-') + '</span>';
    }

    function columnWidth(id) {
      const col = getColumn(id);
      if (col.width) return typeof col.width === 'number' ? col.width + 'px' : col.width;
      const widths = {
        title: 'minmax(300px, 1.8fr)',
        submitter: '112px',
        submittedAt: '150px',
        docType: '128px',
        advice: '108px',
        riskLevel: '92px',
        attachments: '84px',
        tags: '160px',
        actions: '150px',
        amount: '120px',
        supplier: '150px',
        budget: '120px',
        department: '120px',
      };
      return widths[id] || '120px';
    }

    function mailGridTemplate() {
      return 'grid-template-columns:36px ' + state.visibleColumns.map(columnWidth).join(' ') + ';';
    }

    function toggleColumn(id) {
      const col = getColumn(id);
      if (col.locked) return;
      if (state.visibleColumns.includes(id)) {
        state.visibleColumns = state.visibleColumns.filter(x => x !== id);
      } else {
        state.visibleColumns = state.visibleColumns.concat(id);
      }
      state.visibleColumns = ensureRequiredColumns(state.visibleColumns);
      render();
    }

    function moveColumn(id, direction) {
      const from = state.visibleColumns.indexOf(id);
      const to = from + direction;
      const moving = getColumn(id);
      const target = getColumn(state.visibleColumns[to]);
      if (from < 0 || to < 0 || to >= state.visibleColumns.length || moving.locked || target.locked) return;
      const next = state.visibleColumns.slice();
      [next[from], next[to]] = [next[to], next[from]];
      state.visibleColumns = next;
      render();
    }

    function addCustomColumnFromPanel() {
      const labelInput = document.getElementById('customColumnLabel');
      const pathInput = document.getElementById('customColumnPath');
      const label = displayText(labelInput && labelInput.value).trim();
      const path = displayText(pathInput && pathInput.value).trim();
      if (!label || !path) return;
      const base = (path || label).replace(/[^\w]+/g, '-').replace(/^-+|-+$/g, '').toLowerCase() || Date.now();
      const existingIds = new Set(allColumns().map(c => c.id));
      let id = 'custom-' + base;
      let suffix = 2;
      while (existingIds.has(id)) {
        id = 'custom-' + base + '-' + suffix;
        suffix += 1;
      }
      const col = { id, label, path, width: 140 };
      state.customColumns = (state.customColumns || []).concat(col);
      state.visibleColumns = ensureRequiredColumns(state.visibleColumns.concat(id));
      render();
    }

    function parseViewCommandText(input) {
      const compact = displayText(input).replace(/\s+/g, '');
      const ids = [...new Set(FIELD_ALIASES.filter(x => x.aliases.some(a => compact.includes(a))).map(x => x.id))];
      const patch = {};
      const summary = [];
      const wantsHide = /(隐藏|移除|删除|去掉|不显示|不要显示)/.test(compact);
      const wantsShow = /(显示|展示|增加|加入|加上|补充|打开)/.test(compact);
      if (ids.length && (wantsHide || wantsShow)) {
        patch.visibleColumns = wantsHide
          ? state.visibleColumns.filter(id => !ids.includes(id) || getColumn(id).locked)
          : [...new Set(state.visibleColumns.concat(ids))];
        if (!patch.visibleColumns.includes('actions')) patch.visibleColumns.push('actions');
        summary.push((wantsHide ? '隐藏 ' : '显示 ') + ids.map(id => getColumn(id).label).join('、'));
      }
      if (/(只看|筛选|过滤)/.test(compact)) {
        if (/(高风险|重要|拒绝)/.test(compact)) { patch.activeL2 = 'important'; patch.l2Mode = 'risk'; summary.push('只看高风险任务'); }
        else if (/(需关注|中风险|谨慎)/.test(compact)) { patch.activeL2 = 'attention'; patch.l2Mode = 'risk'; summary.push('只看需关注任务'); }
        else if (/(低风险|可通过)/.test(compact)) { patch.activeL2 = 'low-risk'; patch.l2Mode = 'risk'; summary.push('只看低风险任务'); }
      }
      if (/(已办|已处理)/.test(compact) && /(只看|切到|打开|显示)/.test(compact)) { patch.activeL1 = 'done'; summary.push('切到已办'); }
      if (/(待办|未处理)/.test(compact) && /(只看|切到|打开|显示)/.test(compact)) { patch.activeL1 = 'todo'; summary.push('切到待办'); }
      if (/(按类型|按业务|分组)/.test(compact)) { patch.l2Mode = 'docType'; patch.activeL2 = 'all'; summary.push('按业务类型查看'); }
      if (summary.length) return { ok: true, summary: summary.join('，'), patch };
      return { ok: false, summary: /(字段|列|列表|表格|显示|隐藏)/.test(compact) ? '我还不能确定要调整哪个字段。' : '已收到，我会交给 YonClaw 处理。' };
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return esc(iso);
      const p = (n) => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
    }

    function renderMeta(item) {
      const parts = [];
      if (item.submitter) parts.push('<span class="meta-item">' + esc(item.submitter) + '</span>');
      if (item.submittedAt) parts.push('<span class="meta-item">' + formatDate(item.submittedAt) + '</span>');
      // 跨租户徽标（提示该单据属于其他租户，需切换租户）
      let tenantTag = '';
      if (item.crossTenant && item.tenantName) {
        tenantTag = '<span class="yc-approve-inbox-tenant-tag" title="属于其他租户，需在 YonBIP 切换租户后查看">' + esc(item.tenantName) + '</span>';
      }
      // 审批建议 tag（与提交人·时间同行，右侧，tag 感，区别于审批按钮）
      let adviceTag = '';
      if (item.advice && ADVICE_LABEL[item.advice]) {
        adviceTag = '<span class="yc-approve-inbox-advice-tag yc-approve-inbox-advice-tag-' + item.advice + '">' + ADVICE_LABEL[item.advice] + '</span>';
      }
      if (!parts.length && !adviceTag && !tenantTag) return '';
      return '<div class="yc-approve-inbox-row-meta">' + parts.join('<span class="meta-sep">·</span>') + tenantTag + adviceTag + '</div>';
    }

    function renderSmartTags(tags) {
      if (!tags || !tags.length) return '';
      const visible = tags.slice(0, 3);
      const overflow = tags.length - visible.length;
      let h = '<div class="yc-approve-inbox-tags">';
      for (const t of visible) {
        h += '<span class="yc-approve-inbox-tag yc-approve-inbox-tag-' + (t.kind || 'default') + '">' + esc(t.label) + '</span>';
      }
      if (overflow > 0) h += '<span class="yc-approve-inbox-tag yc-approve-inbox-tag-overflow">+' + overflow + '</span>';
      return h + '</div>';
    }

    function renderRowActions(item) {
      const actions = (item.runtimeActions || []).filter(a => a.enabled !== false);
      if (!actions.length) return '';
      let h = '<div class="yc-approve-inbox-row-actions">';
      for (const a of actions) {
        const cls = a.action === 'approve' ? ' yc-approve-inbox-row-btn-approve' : a.action === 'reject' ? ' yc-approve-inbox-row-btn-reject' : '';
        h += '<button type="button" class="yc-approve-inbox-row-btn' + cls + '" data-act="' + esc(a.action) + '" data-id="' + esc(item.id) + '">' + esc(a.label || a.action) + '</button>';
      }
      return h + '</div>';
    }

    function hasAction(item, action) {
      const actions = Array.isArray(item && item.runtimeActions) ? item.runtimeActions : [];
      return actions.some(a => {
        if (!a || a.enabled === false) return false;
        if (action === 'approve') return a.action === 'approve' || a.callBackExecType === 'agree';
        return a.action === 'reject' || a.action === 'return' || a.callBackExecType === 'reject';
      });
    }

    function currentItem() {
      return (state.data && state.data.items || []).find(i => i.id === state.activeItemId) || null;
    }

    function detailNavigationState() {
      const items = state.data ? filterItems(state.data.items, state.activeL1, state.activeL2, state.l2Mode) : [];
      const index = items.findIndex(i => i.id === state.activeItemId);
      return {
        index,
        total: items.length,
        prevId: index > 0 ? items[index - 1].id : '',
        nextId: index >= 0 && index < items.length - 1 ? items[index + 1].id : ''
      };
    }

    function renderRow(item) {
      const selected = state.selectedIds.has(item.id);
      const active = state.activeItemId === item.id;
      return (
        '<article class="yc-approve-inbox-row yc-mail-row yc-approve-inbox-risk-' + item.riskLevel + (active ? ' active' : '') + '" data-open="' + esc(item.id) + '" style="' + mailGridTemplate() + '">' +
          '<div class="yc-mail-check"><input type="checkbox" class="yc-approve-inbox-checkbox" data-sel="' + esc(item.id) + '"' + (selected ? ' checked' : '') + ' /></div>' +
          state.visibleColumns.map(id => '<div class="yc-mail-cell yc-mail-cell-' + esc(id) + '" data-label="' + esc(getColumn(id).label) + '">' + renderMailCell(item, id) + '</div>').join('') +
        '</article>'
      );
    }

    /** 按当前筛选子集（L1+L2 后的 visible）实时算总结，切维度即不同 */
    function buildTabSummary(visible, scope, dimLabel) {
      if (!visible || !visible.length) return null;
      const risk = { high: 0, medium: 0, low: 0 };
      const typeMap = {};
      let approved = 0, rejected = 0, attention = 0;
      for (const i of visible) {
        if (risk[i.riskLevel] != null) risk[i.riskLevel]++;
        const t = i.docType || '其他'; typeMap[t] = (typeMap[t] || 0) + 1;
        if (i.advice === 'approve') approved++;
        if (i.advice === 'reject') rejected++;
        if (i.advice === 'caution' || i.riskLevel === 'medium') attention++;
      }
      const types = Object.entries(typeMap).sort((a, b) => b[1] - a[1]);
      const top = types[0];
      const dim = dimLabel && dimLabel !== '全部' ? dimLabel : '';
      if (scope === 'done') {
        const rate = visible.length ? Math.round((approved / visible.length) * 100) : 0;
        const analysis = `${dim ? '「' + dim + '」' : ''}已办 ${visible.length} 件，通过 ${approved} 件、驳回 ${rejected} 件，通过率 ${rate}%。` +
          (risk.high ? `高风险 ${risk.high} 件已处置。` : '') +
          (top ? `类型以「${top[0]}」最多（${top[1]} 件）。` : '');
        return { scope: 'done', total: visible.length, approvedCount: approved, rejectedCount: rejected, riskDistribution: risk, highlights: [{ label: '通过率', value: rate + '%' }], analysis };
      }
      const analysis = `${dim ? '「' + dim + '」' : ''}待办 ${visible.length} 件，` +
        (risk.high ? `高风险 ${risk.high} 件需优先处理，` : '') +
        `需关注 ${attention} 件。` +
        (top ? `类型以「${top[0]}」最多（${top[1]} 件）。` : '');
      return { scope: 'pending', total: visible.length, riskDistribution: risk, analysis };
    }

    function renderReviewSummary(rs) {
      if (!rs) return '';
      let h = '<section class="yc-approve-inbox-review-summary">';
      const title = rs.scope === 'pending' ? '待办智能速览' : '已办智能总结';
      h += '<div class="review-summary-head">' + icon('bot') + '<span>' + title + '</span>' +
        (rs.period ? '<span class="period">' + esc(rs.period) + '</span>' : '') + '</div>';
      // 待办速览：去掉统计行（与 tab 数字重复），只留分析；已办：保留通过率等独有统计
      if (rs.scope !== 'pending') {
        h += '<div class="review-summary-stats">';
        if (rs.approvedCount != null) h += '<div class="stat stat-approve"><b>' + rs.approvedCount + '</b><span>通过</span></div>';
        if (rs.rejectedCount != null) h += '<div class="stat stat-reject"><b>' + rs.rejectedCount + '</b><span>驳回</span></div>';
        if (rs.returnedCount) h += '<div class="stat stat-return"><b>' + rs.returnedCount + '</b><span>退回</span></div>';
        if (rs.highlights) for (const hl of rs.highlights) h += '<div class="stat"><b>' + esc(hl.value) + '</b><span>' + esc(hl.label) + '</span></div>';
        h += '</div>';
      }
      if (rs.analysis) h += '<p class="review-summary-analysis">' + esc(rs.analysis) + '</p>';
      return h + '</section>';
    }

    function renderList() {
      const data = state.data;
      if (!data) return '';
      const items = data.items;
      // L1 计数
      const l1Counts = {
        todo: filterItems(items, 'todo', 'all').length,
        done: filterItems(items, 'done', 'all').length,
      };
      // L2 选项（风险维 或 单据类型维）
      const l2Tabs = state.l2Mode === 'docType'
        ? docTypeTabs(items, state.activeL1)
        : TABS_L2_RISK;
      // 容错：当前 activeL2 不在选项里则回退 all
      if (!l2Tabs.some(t => t.id === state.activeL2)) state.activeL2 = 'all';
      const visible = filterItems(items, state.activeL1, state.activeL2, state.l2Mode);

      // ── L1 行 ──
      let h = '<header class="yc-approve-inbox-header"><div class="yc-approve-inbox-tabbar">';
      h += '<div class="yc-approve-inbox-tabs-l1" role="tablist">';
      for (const t of TABS_L1) {
        h += '<button type="button" class="yc-approve-inbox-tab-l1' + (state.activeL1 === t.id ? ' yc-approve-inbox-tab-l1-active' : '') + '" data-l1="' + t.id + '">' +
          t.label + '<span class="count">' + l1Counts[t.id] + '</span></button>';
      }
      h += '</div>';
      // ── L2 行 + 维度切换 ──
      h += '<div class="yc-approve-inbox-tabs-l2" role="tablist">';
      for (const t of l2Tabs) {
        const cnt = filterItems(items, state.activeL1, t.id, state.l2Mode).length;
        h += '<button type="button" class="yc-approve-inbox-tab-l2' + (state.activeL2 === t.id ? ' yc-approve-inbox-tab-l2-active' : '') + '" data-l2="' + esc(t.id) + '">' +
          esc(t.label) + (t.id !== 'all' ? '<span class="count">' + cnt + '</span>' : '') + '</button>';
      }
      h += '</div></div>';
      // ── 工具栏 ──
      const curTenant = data.meta && data.meta.currentTenantName;
      const crossCount = items.filter(i => i.crossTenant).length;
      // 待分析数：当前可取（非跨租户）voucher 单据里，分析未完成的（漏跑/旧模板残缺）
      const pendingAnalysis = filterItems(items, state.activeL1, 'all')
        .filter(i => i.voucher && !i.crossTenant && i.analyzed === false).length;
      const selectedVisible = visible.filter(i => state.selectedIds.has(i.id));
      const selectedApprovable = selectedVisible.filter(i => hasAction(i, 'approve'));
      h += '<div class="yc-approve-inbox-toolbar">' +
        '<button type="button" class="yc-approve-inbox-l2-toggle" id="btnL2Mode" title="' + (state.l2Mode === 'risk' ? '按类型查看' : '按风险查看') + '" aria-label="' + (state.l2Mode === 'risk' ? '按类型查看' : '按风险查看') + '">' +
          icon('switch') +
        '</button>' +
        '<label class="yc-mail-search-inline">' + icon('search') +
          '<input id="mailSearch" value="' + esc(state.query) + '" placeholder="检索标题、提交人、业务、AI建议">' +
        '</label>' +
        '<button type="button" class="yc-approve-inbox-toolbar-icon" id="btnColumns" title="列设置" aria-label="列设置">' + icon('columns') + '</button>' +
        '<button type="button" class="yc-approve-inbox-batch-approve" id="btnBatch"' + (selectedApprovable.length === 0 ? ' disabled' : '') + '>' +
          icon('done') + '批量通过' + (selectedApprovable.length > 0 ? '（' + selectedApprovable.length + '）' : '') +
        '</button>';
      if (pendingAnalysis > 0) {
        h += '<button type="button" class="yc-approve-inbox-reanalyze-pending" id="btnReanalyzePending" title="对分析未完成的单据后台批量重新分析（claude 较慢，结果陆续刷新）">' +
          icon('bot') + '重新分析未完成（' + pendingAnalysis + '）</button>';
      }
      if (crossCount > 0) {
        h += '<button type="button" class="yc-approve-inbox-tenant-toggle' + (state.currentTenantOnly ? ' on' : '') + '" id="btnTenantToggle" ' +
          'role="switch" aria-checked="' + (state.currentTenantOnly ? 'true' : 'false') + '" ' +
          'title="' + (curTenant ? ('当前租户：' + esc(curTenant) + '；关闭后显示其他租户') : '关闭后显示其他租户') + '">' +
          '<span class="yc-approve-inbox-tenant-switch" aria-hidden="true"></span><span class="yc-approve-inbox-tenant-toggle-label">仅显示当前租户</span>' +
        '</button>';
      }
      h += '</div></header>';

      if (state.columnPanelOpen) {
        h += '<section class="yc-mail-column-panel">';
        h += '<div class="yc-mail-column-list">';
        for (const col of allColumns()) {
          const visible = state.visibleColumns.includes(col.id);
          const orderIndex = state.visibleColumns.indexOf(col.id);
          h += '<div class="yc-mail-column-item' + (col.locked ? ' locked' : '') + '">' +
            '<label class="yc-mail-column-toggle"><input type="checkbox" data-col="' + esc(col.id) + '"' + (visible ? ' checked' : '') + (col.locked ? ' disabled' : '') + '><span>' + esc(col.label) + '</span></label>' +
            '<div class="yc-mail-column-order">' +
              '<button type="button" data-col-up="' + esc(col.id) + '" title="上移"' + (!visible || orderIndex <= 1 || col.locked ? ' disabled' : '') + '>' + icon('chevronUp') + '</button>' +
              '<button type="button" data-col-down="' + esc(col.id) + '" title="下移"' + (!visible || orderIndex < 0 || orderIndex >= state.visibleColumns.length - 1 || col.locked ? ' disabled' : '') + '>' + icon('chevronDown') + '</button>' +
            '</div>' +
          '</div>';
        }
        h += '</div>';
        h += '<div class="yc-mail-column-custom">' +
          '<label class="yc-mail-column-field"><span>字段名称</span><input id="customColumnLabel" placeholder="合同金额"></label>' +
          '<label class="yc-mail-column-field"><span>字段路径</span><input id="customColumnPath" placeholder="summary.amount"></label>' +
          '<button type="button" id="btnAddCustomColumn">新增字段</button>' +
        '</div>';
        h += '</section>';
      }

      // ── 列表（每个 tab 顶部 AI 总结）──
      h += '<div class="yc-approve-inbox-list yc-mail-list">';
      const dimLabel = (l2Tabs.find(t => t.id === state.activeL2) || {}).label;
      const tabSummary = buildTabSummary(visible, state.activeL1 === 'done' ? 'done' : 'pending', dimLabel);
      if (tabSummary) h += renderReviewSummary(tabSummary);
      h += '<div class="yc-mail-list-head" style="' + mailGridTemplate() + '"><span></span>' + state.visibleColumns.map(id => '<span class="yc-mail-head yc-mail-head-' + esc(id) + '" data-col="' + esc(id) + '">' + esc(getColumn(id).label) + '</span>').join('') + '</div>';
      if (visible.length === 0) {
        h += '<div class="yc-approve-inbox-empty">' + icon('check') + '<span>' + (state.activeL1 === 'done' ? '暂无已办' : '暂无待办') + '</span></div>';
      } else {
        h += visible.map(renderRow).join('');
      }
      h += '</div>';

      if (state.selectedIds.size > 0) {
        h += '<footer class="yc-approve-inbox-selection-bar"><span>已选 ' + state.selectedIds.size + ' 条</span><button type="button" id="btnClearSel">清空</button></footer>';
      }
      return h;
    }

    /* ========== 渲染：详情 5 段 ========== */
    function sevDot(s) { return 'yc-approve-inbox-dot ' + (s ? 'yc-approve-inbox-dot-' + s : 'yc-approve-inbox-dot-default'); }
    function sevTag(s) { return 'yc-approve-inbox-severity ' + (s ? 'yc-approve-inbox-severity-' + s : 'yc-approve-inbox-severity-default'); }

    function renderDetail(d) {
      if (!d) return '';
      const nav = detailNavigationState();
      let h = '<aside class="yc-approve-inbox-detail">';
      h += '<header class="yc-approve-inbox-detail-header"><strong class="yc-approve-inbox-detail-title">' + esc(d.title || '审批单据详情') + '</strong>' +
        '<div class="yc-approve-inbox-detail-nav" aria-label="详情快捷导航">' +
          '<button type="button" class="yc-approve-inbox-detail-nav-btn" data-detail-nav="prev" title="上一条" aria-label="上一条"' + (!nav.prevId ? ' disabled' : '') + '>' + icon('chevronUp') + '</button>' +
          '<button type="button" class="yc-approve-inbox-detail-nav-btn" data-detail-nav="next" title="下一条" aria-label="下一条"' + (!nav.nextId ? ' disabled' : '') + '>' + icon('chevronDown') + '</button>' +
          '<button type="button" class="yc-approve-inbox-detail-close" id="btnCloseDetail" aria-label="关闭">' + icon('close') + '</button>' +
        '</div></header>';

      // ── 四态状态判定 ──
      const cross = d.crossTenant;
      const unsupported = d.unsupportedType;
      const notFound = d.unavailableReason === 'not_found';
      const hasFields = !!(d.fields && d.fields.length);
      const analyzed = !!d.analyzed;
      // 是否可「重新分析本单」：真实数据、非跨租户、非不支持类型
      d._canReanalyze = d.dataSource === 'real' && !cross && !unsupported;

      if (state.detailEnriching) {
        h += '<div class="yc-approve-inbox-fallback-notice yc-approve-inbox-enriching">' + icon('bot') + '<span>正在抓取真实单据字段并分析…</span></div>';
      } else if (cross) {
        h += '<div class="yc-approve-inbox-fallback-notice">' + icon('bot') + '<span>属于其他租户' + (d.tenantName ? '『' + esc(d.tenantName) + '』' : '') + '，当前登录态无权读取真实字段。请在 YonBIP 切换到该租户后查看。</span></div>';
      } else if (unsupported) {
        h += '<div class="yc-approve-inbox-fallback-notice">' + icon('bot') + '<span>暂不支持的单据类型（非标准 MDF 单据），无法抓取结构化字段。</span></div>';
      } else if (notFound && !hasFields) {
        h += '<div class="yc-approve-inbox-fallback-notice">' + icon('bot') + '<span>单据数据未找到（可能已被处理或撤回）。</span></div>';
      } else if (d.dataSource === 'real' && !analyzed) {
        h += '<div class="yc-approve-inbox-fallback-notice">' + icon('bot') + '<span>' + (hasFields ? '已抓取真实字段，AI 分析未完成，可点底部刷新按钮重试。' : '尚未抓取真实字段，可点底部刷新按钮。') +
          (d.analysisError ? ('（' + esc(d.analysisError) + '）') : '') + '</span></div>';
      } else if (d.source === 'fallback' || d.dataSource === 'fallback') {
        h += '<div class="yc-approve-inbox-fallback-notice">' + icon('bot') + '<span>AI 兜底 · 仅供参考</span></div>';
      }

      h += '<div class="yc-approve-inbox-detail-body">';

      // ① 总体结论（仅真实分析存在时渲染，避免显示兜底假结论）
      if (analyzed) {
        const adv = d.conclusion ? d.conclusion.advice : 'caution';
        h += '<section class="yc-approve-inbox-detail-section"><h4 class="yc-approve-inbox-section-title">总体结论</h4>' +
          '<div class="yc-approve-inbox-conclusion yc-approve-inbox-conclusion-' + adv + '">' +
          '<span class="yc-approve-inbox-conclusion-light"></span>' +
          '<strong class="yc-approve-inbox-conclusion-label">' + esc((d.conclusion && d.conclusion.label) || ADVICE_LABEL[adv]) + '</strong></div></section>';
      }

      // ② 总体分析
      if (d.overallAnalysis) {
        h += '<section class="yc-approve-inbox-detail-section"><h4 class="yc-approve-inbox-section-title">总体分析</h4>' +
          '<p class="yc-approve-inbox-overall-analysis">' + esc(d.overallAnalysis) + '</p></section>';
      }

      // ⓪ 单据字段（真实字段值，enrich 后有）
      if (d.fields && d.fields.length) {
        h += '<section class="yc-approve-inbox-detail-section"><h4 class="yc-approve-inbox-section-title">单据字段</h4><div class="yc-approve-inbox-rawfields">';
        for (const f of d.fields) {
          const fv = displayText(f.value);
          if (!fv) continue;
          h += '<div class="rf-row"><span class="rf-k" title="' + esc(f.name || f.key) + '">' + esc(f.name || f.key || '未命名字段') + '</span><span class="rf-v" title="' + esc(fv) + '">' + esc(fv) + '</span></div>';
        }
        h += '</div></section>';
      }

      // ③ 单据字段分析
      if (d.fieldAnalysis && d.fieldAnalysis.length) {
        h += '<section class="yc-approve-inbox-detail-section"><h4 class="yc-approve-inbox-section-title">单据字段分析</h4><div class="yc-approve-inbox-field-list">';
        for (const f of d.fieldAnalysis) {
          h += '<article class="yc-approve-inbox-field-row"><i class="' + sevDot(f.severity) + '"></i>' +
            '<div class="yc-approve-inbox-field-content"><div class="yc-approve-inbox-field-head">' +
            '<span class="yc-approve-inbox-field-name">' + esc(f.name) + '</span>' +
            (f.value ? '<code class="yc-approve-inbox-field-value">' + esc(f.value) + '</code>' : '') +
            (f.severity ? '<span class="' + sevTag(f.severity) + '">' + SEVERITY_LABEL[f.severity] + '</span>' : '') +
            '</div><p class="yc-approve-inbox-field-summary">' + esc(f.summary) + '</p></div></article>';
        }
        h += '</div></section>';
      }

      // ④ 业务规则分析
      if (d.ruleAnalysis && d.ruleAnalysis.length) {
        h += '<section class="yc-approve-inbox-detail-section"><h4 class="yc-approve-inbox-section-title">业务规则分析</h4><div class="yc-approve-inbox-rule-list">';
        for (const r of d.ruleAnalysis) {
          h += '<article class="yc-approve-inbox-rule-row"><div class="yc-approve-inbox-rule-head">' +
            '<i class="' + sevDot(r.severity) + '"></i><strong class="yc-approve-inbox-rule-name">' + esc(r.ruleName) + '</strong>' +
            '<span class="' + sevTag(r.severity) + '">' + SEVERITY_LABEL[r.severity] + '</span></div>' +
            '<p class="yc-approve-inbox-rule-summary">' + esc(r.summary) + '</p>' +
            (r.evidence ? '<blockquote class="yc-approve-inbox-evidence">' + icon('file') + '<span>' + esc(r.evidence) + '</span></blockquote>' : '') +
            (r.suggestion ? '<p class="yc-approve-inbox-suggestion">' + icon('lightbulb') + esc(r.suggestion) + '</p>' : '') +
            '</article>';
        }
        h += '</div></section>';
      }

      // ⑤ 附件分析
      const attachmentRows = attachmentRowsForDetail(d);
      if (attachmentRows.length) {
        const filterOptions = attachmentFilterOptions(attachmentRows);
        const activeFilter = activeAttachmentFilter(filterOptions);
        const visibleAttachmentRows = attachmentRows
          .map((row, idx) => Object.assign({ rowIndex: idx }, row))
          .filter(row => activeFilter === 'all' || row.sourceKey === activeFilter);
        h += '<section class="yc-approve-inbox-detail-section">' +
          '<div class="yc-approve-inbox-attachment-toolbar"><div><h4 class="yc-approve-inbox-section-title">附件分析</h4>' +
          '<p class="yc-approve-inbox-attachment-count">共 ' + attachmentRows.length + ' 个附件，按来源快速筛选</p></div>' +
          '<div class="yc-approve-inbox-attachment-filter" role="toolbar" aria-label="附件来源筛选">';
        for (const option of filterOptions) {
          h += '<button type="button" class="yc-approve-inbox-attachment-filter-btn' + (option.key === activeFilter ? ' active' : '') +
            '" data-attachment-filter="' + esc(option.key) + '" aria-pressed="' + (option.key === activeFilter ? 'true' : 'false') + '">' +
            esc(option.label) + ' ' + option.count + '</button>';
        }
        h += '</div></div><div class="yc-approve-inbox-attachment-list">';
        for (const a of visibleAttachmentRows) {
          h += '<article class="yc-approve-inbox-attachment-row"><div class="yc-approve-inbox-attachment-head">' +
            '<button type="button" class="yc-approve-inbox-attachment-preview-trigger" data-attachment-preview="' + a.rowIndex + '" title="预览附件">' +
            icon('file') + '<span class="yc-approve-inbox-attachment-name">' + esc(a.fileName) + '</span></button>' +
            '<span class="yc-approve-inbox-attachment-source yc-approve-inbox-attachment-source-' + esc(a.sourceKey) + '">' + esc(a.sourceLabel) + '</span>' +
            (a.fileType ? '<code class="yc-approve-inbox-attachment-type">' + esc(a.fileType) + '</code>' : '') +
            (a.analysis && a.analysis.severity ? '<span class="' + sevTag(a.analysis.severity) + '">' + SEVERITY_LABEL[a.analysis.severity] + '</span>' : '') + '</div>';
          if (a.analysis && a.analysis.summary) {
            h += '<p class="yc-approve-inbox-attachment-summary">' + esc(a.analysis.summary) + '</p>';
          } else {
            h += '<p class="yc-approve-inbox-attachment-summary yc-approve-inbox-attachment-pending">已识别附件' +
              (a.size ? '（' + esc(Math.round(Number(a.size) / 1024)) + ' KB）' : '') +
              '，正文内容解析待完成。</p>';
          }
          h += '<p class="yc-approve-inbox-attachment-status"><span>' + esc(a.sourceLabel) + '</span><span>' + esc(formatFileSize(a.size)) + '</span><span>' + esc(attachmentCacheLabel(a)) + '</span></p>';
          if (a.error) h += '<p class="yc-approve-inbox-attachment-status"><span>解析状态：' + esc(a.error) + '</span></p>';
          if (a.analysis && a.analysis.findings && a.analysis.findings.length) {
            h += '<ul class="yc-approve-inbox-findings">';
            for (const fd of a.analysis.findings) h += '<li>' + (fd.name ? '<strong>' + esc(fd.name) + '：</strong>' : '') + esc(fd.detail) + '</li>';
            h += '</ul>';
          }
          h += '</article>';
        }
        h += '</div></section>';
      }

      h += '</div>';

      // 操作栏
      if (d.id) {
        const item = currentItem();
        const actions = (item && item.runtimeActions || []).filter(a => a.enabled !== false);
        h += '<footer class="yc-approve-inbox-detail-footer">';
        for (const a of actions) {
          const cls = a.action === 'approve' ? ' yc-approve-inbox-detail-btn-approve' : '';
          h += '<button type="button" class="yc-approve-inbox-detail-btn' + cls + '" data-detail-act="' + esc(a.action) + '">' + esc(a.label || a.action) + '</button>';
        }
        if (d._canReanalyze) {
          h += '<button type="button" class="yc-approve-inbox-detail-btn yc-approve-inbox-detail-btn-icon" data-detail-act="reanalyze" title="' +
            (state.detailEnriching ? '正在分析…' : '重新分析本单') + '" aria-label="' +
            (state.detailEnriching ? '正在分析' : '重新分析本单') + '"' + (state.detailEnriching ? ' disabled' : '') + '>' +
            icon('refresh') + '</button>';
        }
        h += '</footer>';
      }
      return h + '</aside>';
    }

    /* ========== 总渲染 ========== */
    function render(options = {}) {
      document.getElementById('inbox').innerHTML = renderList();
      const drawer = document.getElementById('drawer');
      if (!HOST_OWNS_DETAIL && state.activeItemId && state.detail) {
        drawer.style.display = '';
        drawer.innerHTML = '<div class="yc-sheet-grabber" aria-hidden="true"></div>' + renderDetail(state.detail);
        if (Number.isFinite(options.detailScrollTop)) {
          requestAnimationFrame(() => {
            const detailBody = drawer.querySelector('.yc-approve-inbox-detail-body');
            if (detailBody) detailBody.scrollTop = options.detailScrollTop;
          });
        }
        document.body.classList.add('sheet-open');
      } else {
        drawer.style.display = 'none';
        drawer.innerHTML = '';
        document.body.classList.remove('sheet-open');
      }
      document.getElementById('approvalDialogHost').innerHTML = renderApprovalDialog();
      document.getElementById('attachmentPreviewHost').innerHTML = renderAttachmentPreview();
      document.getElementById('yonclawChatHost').innerHTML = renderYonClawChat();
      const dm = document.getElementById('dataMode');
      if (state.data && dm) {
        const src = state.data.dataSource;
        dm.className = 'data-mode data-mode-' + (src === 'real' ? 'real' : 'unavailable');
        dm.textContent = src === 'real' ? '真实数据' : '未同步';
      }
    }

    /* ========== 交互 ========== */
    async function openDetail(id) {
      if (HOST_OWNS_DETAIL) {
        state.activeItemId = id;
        render();
        tellCockpit({
          type: 'approve-inbox:request-detail',
          todoId: id,
          detailUrl: window.location.origin + '/api/details/' + encodeURIComponent(id),
        });
        return;
      }
      revokeAttachmentPreviewObjectUrl();
      state.activeItemId = id;
      state.detail = null;
      state.detailEnriching = false;
      state.attachmentPreview = null;
      state.attachmentPreviewContent = { status: 'idle' };
      state.attachmentFilter = 'all';
      render();
      let d;
      try {
        d = await fetchDetail(id);
      } catch (e) {
        toast('详情加载失败', 'error');
        return;
      }
      if (state.activeItemId !== id) return; // 用户已切换
      state.detail = d;
      render();
      // 按需自动 enrich：真实数据、可取数（非跨租户/非不支持类型）、尚未抓到字段 → 自动抓取+分析
      if (d.dataSource === 'real' && d.enriched === false && !d.crossTenant && !d.unsupportedType) {
        await enrichAndPoll(id);
      }
    }

    /**
     * 单据级异步 enrich + 轮询：POST 触发后台子进程，轮询 /api/details 直到真实分析出现或任务结束。
     * 不阻塞 UI；期间每次抓到新数据即刷新（字段先到、分析后到）。
     */
    async function enrichAndPoll(id) {
      state.detailEnriching = true;
      render();
      try {
        const res = await postJson('/api/enrich/' + encodeURIComponent(id), {});
        if (state.activeItemId !== id) return;
        if (!res.success) {
          toast(res.error ? ('无法抓取：' + res.error) : '该单据暂无法抓取真实字段', 'info');
          return;
        }
        const started = Date.now();
        while (Date.now() - started < 185000) {
          await sleep(3000);
          if (state.activeItemId !== id) return;
          const d = await fetchDetail(id);
          state.detail = d;
          render();
          if (d.analyzed) { toast('分析完成', 'success'); return; }
          const st = await getJson('/api/enrich-status/' + encodeURIComponent(id));
          if (st && (st.status === 'done' || st.status === 'error')) {
            toast(d.enriched ? '已抓取真实字段，AI 分析未完成，可再点重新分析' : '该单据暂无法抓取真实字段', 'info');
            return;
          }
        }
        toast('分析超时，请稍后重试', 'info');
      } catch (e) {
        toast('分析失败', 'error');
      } finally {
        state.detailEnriching = false;
        render();
      }
    }
    function closeDetail() {
      revokeAttachmentPreviewObjectUrl();
      state.activeItemId = null;
      state.detail = null;
      state.detailEnriching = false;
      state.attachmentPreview = null;
      state.attachmentPreviewContent = { status: 'idle' };
      state.attachmentFilter = 'all';
      render();
    }

    async function submitApproval(ids, payload) {
      if (!ids.length) return;
      if (!payload) return;
      const res = await postJson('/api/approve', { ids, ...payload });
      const completed = res.completed || res.approved || [];
      if (completed.length) {
        for (const it of state.data.items) if (completed.includes(it.id)) { it.status = 'done'; it.runtimeActions = []; }
        completed.forEach(id => state.selectedIds.delete(id));
        if (completed.includes(state.activeItemId)) closeDetail();
        const text = payload.action === 'approve' ? '已通过 ' : (payload.action === 'return' ? '已退回 ' : '已驳回 ');
        toast(text + completed.length + ' 条', 'success');
        render();
        tellCockpit({ type: 'approve-inbox:approve-result', ids: completed, action: payload.action, ok: true });
      }
      if (!res.success) {
        const firstError = (res.results || []).find(r => r && !r.success)?.error;
        toast(firstError || res.error || '审批动作失败', completed.length ? 'info' : 'error');
      } else {
        await refreshInbox();
      }
      return res;
    }

    async function submitApprovalDialog() {
      const d = state.approvalDialog;
      if (!d || d.submitting) return;
      const payload = readApprovalDialogForm();
      if (!payload.comment) { toast('请填写审批意见', 'info'); return; }
      d.submitting = true;
      render();
      try {
        const res = await submitApproval(d.ids, payload);
        const completed = res?.completed || res?.approved || [];
        if (res?.success || completed.length) state.approvalDialog = null;
        else if (state.approvalDialog) state.approvalDialog.submitting = false;
        render();
      } catch (e) {
        toast(e.message || '审批动作失败', 'error');
        if (state.approvalDialog) state.approvalDialog.submitting = false;
        render();
      }
    }

    document.getElementById('inbox').addEventListener('click', (e) => {
      const l1 = e.target.closest('[data-l1]');
      if (l1) { state.activeL1 = l1.dataset.l1; state.activeL2 = 'all'; state.selectedIds.clear(); render(); return; }
      const l2 = e.target.closest('[data-l2]');
      if (l2) { state.activeL2 = l2.dataset.l2; state.selectedIds.clear(); render(); return; }
      const l2mode = e.target.closest('#btnL2Mode');
      if (l2mode) { state.l2Mode = state.l2Mode === 'risk' ? 'docType' : 'risk'; state.activeL2 = 'all'; state.selectedIds.clear(); render(); return; }
      const columns = e.target.closest('#btnColumns');
      if (columns) { state.columnPanelOpen = !state.columnPanelOpen; render(); return; }
      const colUp = e.target.closest('[data-col-up]');
      if (colUp) { moveColumn(colUp.dataset.colUp, -1); return; }
      const colDown = e.target.closest('[data-col-down]');
      if (colDown) { moveColumn(colDown.dataset.colDown, 1); return; }
      const addCol = e.target.closest('#btnAddCustomColumn');
      if (addCol) { addCustomColumnFromPanel(); return; }
      const col = e.target.closest('[data-col]');
      if (col) { toggleColumn(col.dataset.col); return; }
      const tt = e.target.closest('#btnTenantToggle');
      if (tt) { state.currentTenantOnly = !state.currentTenantOnly; state.activeL2 = 'all'; state.selectedIds.clear(); render(); return; }
      const rap = e.target.closest('#btnReanalyzePending');
      if (rap) { triggerReanalyzePending(rap); return; }
      const clear = e.target.closest('#btnClearSel');
      if (clear) { state.selectedIds.clear(); render(); return; }
      const batch = e.target.closest('#btnBatch');
      if (batch) {
        const visible = filterItems(state.data.items, state.activeL1, state.activeL2, state.l2Mode);
        const ids = visible.filter(i => state.selectedIds.has(i.id) && hasAction(i, 'approve')).map(i => i.id);
        openApprovalDialog(ids, 'approve');
        return;
      }
      const sel = e.target.closest('[data-sel]');
      if (sel) {
        const id = sel.dataset.sel;
        if (state.selectedIds.has(id)) state.selectedIds.delete(id); else state.selectedIds.add(id);
        render();
        return;
      }
      const actBtn = e.target.closest('[data-act]');
      if (actBtn) {
        e.stopPropagation();
        const id = actBtn.dataset.id, act = actBtn.dataset.act;
        if (act === 'approve' || act === 'reject' || act === 'return') openApprovalDialog([id], act);
        else toast('「' + act + '」暂未接入', 'info');
        return;
      }
      const open = e.target.closest('[data-open]');
      if (open) openDetail(open.dataset.open);
    });

    document.getElementById('inbox').addEventListener('input', (e) => {
      if (e.target && e.target.id === 'mailSearch') {
        if (e.isComposing || state.searchComposing) {
          state.query = e.target.value;
          return;
        }
        const cursor = e.target.selectionStart || e.target.value.length;
        state.query = e.target.value;
        state.selectedIds.clear();
        render();
        const input = document.getElementById('mailSearch');
        if (input) {
          input.focus();
          input.setSelectionRange(cursor, cursor);
        }
      }
    });

    document.getElementById('inbox').addEventListener('compositionstart', (e) => {
      if (e.target && e.target.id === 'mailSearch') state.searchComposing = true;
    });

    document.getElementById('inbox').addEventListener('compositionend', (e) => {
      if (e.target && e.target.id === 'mailSearch') {
        state.searchComposing = false;
        state.query = e.target.value;
        state.selectedIds.clear();
        const cursor = e.target.selectionStart || e.target.value.length;
        render();
        const input = document.getElementById('mailSearch');
        if (input) {
          input.focus();
          input.setSelectionRange(cursor, cursor);
        }
      }
    });

    document.getElementById('drawer').addEventListener('click', (e) => {
      if (e.target.closest('#btnCloseDetail')) { closeDetail(); return; }
      const detailNav = e.target.closest('[data-detail-nav]');
      if (detailNav) {
        const nav = detailNavigationState();
        const nextId = detailNav.dataset.detailNav === 'prev' ? nav.prevId : nav.nextId;
        if (nextId) openDetail(nextId);
        return;
      }
      const af = e.target.closest('[data-attachment-filter]');
      if (af) {
        e.preventDefault();
        e.stopPropagation();
        const detailBody = e.currentTarget.querySelector('.yc-approve-inbox-detail-body');
        const detailScrollTop = detailBody ? detailBody.scrollTop : 0;
        state.attachmentFilter = af.dataset.attachmentFilter || 'all';
        render({ detailScrollTop });
        return;
      }
      const ap = e.target.closest('[data-attachment-preview]');
      if (ap) { openAttachmentPreview(ap.dataset.attachmentPreview); return; }
      const da = e.target.closest('[data-detail-act]');
      if (da) {
        const act = da.dataset.detailAct;
        if (act === 'approve') openApprovalDialog([state.activeItemId], 'approve');
        else if (act === 'reanalyze') { if (state.activeItemId && !state.detailEnriching) enrichAndPoll(state.activeItemId); }
        else if (act === 'reject' || act === 'return') openApprovalDialog([state.activeItemId], act);
        else toast('「' + act + '」暂未接入', 'info');
      }
    });
    document.getElementById('sheetOverlay').addEventListener('click', closeDetail);
    document.getElementById('approvalDialogHost').addEventListener('click', (e) => {
      if (e.target.closest('[data-approval-close]') || e.target.matches('[data-approval-overlay]')) { closeApprovalDialog(); return; }
      if (e.target.closest('[data-approval-submit]')) { submitApprovalDialog(); return; }
    });
    document.getElementById('attachmentPreviewHost').addEventListener('click', (e) => {
      if (e.target.closest('[data-attachment-preview-close]') || e.target.matches('[data-attachment-preview-overlay]')) { closeAttachmentPreview(); return; }
    });
    document.getElementById('yonclawChatHost').addEventListener('click', (e) => {
      if (e.target.closest('#btnYonClawOpen')) { state.chatOpen = true; render(); return; }
      if (e.target.closest('#btnYonClawClose')) { state.chatOpen = false; render(); return; }
      if (e.target.closest('#btnYonClawSend')) { submitYonClawMessage(); return; }
      if (e.target.closest('#btnYonClawApply')) { applyPendingViewCommand(); return; }
      if (e.target.closest('#btnYonClawCancel')) { state.pendingViewCommand = null; render(); return; }
    });
    document.getElementById('yonclawChatHost').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target && e.target.id === 'yonclawInput') submitYonClawMessage();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && state.attachmentPreview) { closeAttachmentPreview(); return; }
      if (e.key === 'Escape' && state.approvalDialog) closeApprovalDialog();
    });

    // 后台批量重新分析「未完成」单据（含漏跑/旧模板残缺）。非阻塞，结果陆续刷新。
    async function triggerReanalyzePending(btn) {
      if (btn) { btn.disabled = true; btn.textContent = '已触发分析…'; }
      try {
        const res = await postJson('/api/sync', {});
        if (res.data) {
          state.data = res.data;
          render();
        }
        if (res.success) toast(res.started ? '已触发后台重新分析，结果将陆续刷新（claude 较慢）' : (res.running ? '已有分析在进行中' : '已触发'), 'success');
        else toast(syncFallbackMessage(res), 'info');
      } catch (e) { toast('触发失败', 'error'); }
      pollSyncStatus();
      setTimeout(refreshInbox, 8000);
      setTimeout(() => { pollSyncStatus(); refreshInbox(); }, 30000);
    }

    const syncButton = document.getElementById('btnSync');
    if (syncButton) {
      syncButton.addEventListener('click', async () => {
        setSyncButtonState(true);
        try {
          const res = await postJson('/api/sync', {});
          if (res.data) {
            state.data = res.data;
            state.selectedIds.clear();
            render();
          } else {
            await refreshInbox();
          }
          if (res.success) toast(res.started ? '已刷新待办，后台智能分析中' : (res.running ? '已刷新待办，已有分析在进行中' : '已刷新待办'), 'success');
          else toast(syncFallbackMessage(res), 'info');
        } catch (e) { toast('触发失败', 'error'); }
        finally {
          setSyncButtonState(false);
          pollSyncStatus();
          setTimeout(refreshInbox, 3000);
          setTimeout(() => { pollSyncStatus(); refreshInbox(); }, 30000);
        }
      });
    }

    /* ========== 自动刷新 + 离线分析状态 ========== */
    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso); if (isNaN(d.getTime())) return '';
      const p = (n) => String(n).padStart(2, '0');
      return p(d.getHours()) + ':' + p(d.getMinutes());
    }
    async function pollSyncStatus() {
      try {
        const r = await fetch('/api/sync-status');
        const s = await r.json();
        const el = document.getElementById('syncStatus');
        if (!el) return;
        if (s && s.inboxSync && s.inboxSync.running) {
          el.className = 'sync-status analyzing';
          el.innerHTML = '<span class="dot"></span>刷新待办中…';
          return;
        }
        if (state.data && state.data.dataSource !== 'real') {
          el.className = 'sync-status';
          el.innerHTML = '<span class="dot"></span>待同步';
          return;
        }
        if (!s || s.enabled === false) { el.textContent = ''; return; }
        if (s.running) {
          el.className = 'sync-status analyzing';
          el.innerHTML = '<span class="dot"></span>智能分析中…';
        } else {
          el.className = 'sync-status';
          const analyzed = Number(s.enrichedTotal || 0);
          const statusText = s.lastRunAt
            ? ((analyzed > 0 ? ('已分析 ' + analyzed) : '已检查') + ' · ' + fmtTime(s.lastRunAt))
            : '待分析';
          el.innerHTML = '<span class="dot"></span>' + statusText;
        }
      } catch (e) { /* 忽略 */ }
    }

    /* 平滑重载列表数据（保留当前选中详情，不打断阅读） */
    async function refreshInbox() {
      try {
        const data = await fetchInbox();
        state.data = data;
        render();
      } catch (e) { /* 忽略瞬时失败 */ }
    }

    /* ========== 启动 ========== */
    async function load() {
      try {
        state.data = await fetchInbox();
        render();
        pollSyncStatus();
      } catch (e) {
        document.getElementById('inbox').innerHTML = '<div class="yc-approve-inbox-empty"><span>加载失败：' + esc(e.message) + '</span></div>';
      }
    }
    setSyncButtonState(false);
    load();
    // 列表 30s 轮询刷新；状态 10s 轮询（仅读，不触发分析）
    setInterval(refreshInbox, 30000);
    setInterval(pollSyncStatus, 10000);
  </script>
</body>
</html>
