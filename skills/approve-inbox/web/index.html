<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>智能待办</title>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      if (params.get('embed') === 'cockpit-drawer') {
        document.documentElement.classList.add('is-cockpit-embed');
      }
      if (params.get('detailOwner') === 'host') {
        document.documentElement.classList.add('is-host-detail-owner');
      }
    })();
  </script>
  <style>
    /* ========== 设计 token（独立单页自带；驾驶舱内由全局 token 提供） ========== */
    :root {
      --app-text: 222 20% 18%;
      --app-text-secondary: 222 12% 32%;
      --app-text-muted: 222 10% 45%;
      --app-text-subtle: 222 8% 62%;
      --app-surface: 0 0% 100%;
      --app-surface-hover: 220 14% 96%;
      --app-surface-subtle: 220 16% 97%;
      --app-bg: 220 20% 99%;
      --app-border: 220 13% 88%;
      --app-border-subtle: 220 13% 92%;
      --app-border-hover: 220 13% 80%;
      --primary: 351 83% 57%;
      --primary-foreground: 0 0% 100%;
      --primary-300: 351 95% 72%;
      --destructive: 0 72% 51%;
      --destructive-soft: 0 86% 96%;
      --destructive-border: 0 70% 84%;
      --warning: 32 95% 50%;
      --warning-soft: 38 92% 95%;
      --warning-border: 38 90% 80%;
      --warning-text: 32 95% 37%;
      --success: 142 71% 40%;
      --success-soft: 142 70% 95%;
      --success-border: 142 45% 80%;
      --info-soft: 217 91% 96%;
      --info-border: 217 91% 82%;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: hsl(220 24% 95%);
      color: hsl(var(--app-text));
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 1180px;
      height: 100vh;
      height: 100dvh;
      min-height: 0;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    html.is-cockpit-embed,
    html.is-cockpit-embed body {
      height: 100%;
      min-height: 0;
      overflow: hidden;
      background: transparent;
    }

    html.is-cockpit-embed .app {
      width: 100%;
      max-width: none;
      height: 100%;
      min-height: 0;
      margin: 0;
      padding: 0;
      gap: 0;
      background: transparent;
    }

    html.is-cockpit-embed .app-header {
      display: none;
    }

    html.is-cockpit-embed .yc-approve-inbox-shell {
      flex: 1 1 auto;
      height: 100%;
      min-height: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    html.is-cockpit-embed .yc-approve-inbox-shell-list,
    html.is-cockpit-embed .yc-approve-inbox,
    html.is-cockpit-embed .yc-mail-workbench {
      height: 100%;
      min-height: 0;
    }

    html.is-cockpit-embed.is-host-detail-owner .yc-approve-inbox-shell-drawer,
    html.is-cockpit-embed.is-host-detail-owner .yc-sheet-overlay {
      display: none !important;
    }

    /* ── 顶栏 ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .app-header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .app-header-right { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .sync-status { min-width: 0; overflow: hidden; text-overflow: ellipsis; font-size: 11px; color: hsl(var(--app-text-subtle)); white-space: nowrap; }
    .sync-status.analyzing { color: hsl(var(--primary)); }
    .sync-status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; margin-right: 4px; vertical-align: middle; }
    .sync-status.analyzing .dot { animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
    .btn-sync {
      display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
      width: 30px; height: 30px; padding: 0;
      border: 1px solid hsl(var(--app-border));
      border-radius: 6px; background: hsl(var(--app-surface));
      color: hsl(var(--app-text)); font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap;
      transition: background .14s, border-color .14s;
    }
    .btn-sync:hover { background: hsl(var(--app-surface-hover)); border-color: hsl(var(--app-border-hover)); }
    .btn-sync:disabled { opacity: .5; cursor: not-allowed; }
    .btn-sync .yc-action-icon { width: 14px; height: 14px; }
    .btn-sync.is-running .yc-action-icon { animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== Shell 布局 ========== */
    .yc-approve-inbox-shell {
      display: flex; flex: 1; min-height: 0;
      background: hsl(var(--app-surface));
      border: 1px solid hsl(var(--app-border-subtle));
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 3px hsl(220 40% 20% / .06);
    }
    .yc-approve-inbox-shell-list {
      flex: 1; min-width: 0; height: 100%;
      display: flex; flex-direction: column; overflow: hidden;
      transition: flex .22s cubic-bezier(.2,.8,.2,1);
    }
    .yc-approve-inbox-shell-drawer {
      flex: 0 0 380px; width: 380px; height: 100%; overflow: hidden;
      display: flex; flex-direction: column;
      animation: drawer-enter .22s cubic-bezier(.2,.8,.2,1);
    }
    @keyframes drawer-enter { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }

    /* ========== 容器 ========== */
    .yc-approve-inbox { display: flex; flex-direction: column; min-height: 0; height: 100%; }

    /* ── header: tab + 工具栏 ── */
    .yc-approve-inbox-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px 0; flex-shrink: 0;
      background: hsl(var(--app-surface));
    }
    .yc-approve-inbox-tabs { display: flex; gap: 2px; flex: 1; min-width: 0; overflow-x: auto; scrollbar-width: none; }
    .yc-approve-inbox-tabs::-webkit-scrollbar { display: none; }

    /* 两层 tab：L1（待办|已办）粗，L2（维度）细 + 切换 */
    .yc-approve-inbox-tabbar { display: flex; flex-direction: column; gap: 0; flex: 1; min-width: 0; }
    .yc-approve-inbox-tabs-l1 { display: flex; gap: 4px; }
    .yc-approve-inbox-tab-l1 {
      padding: 7px 14px; border: none; background: none; border-radius: 6px 6px 0 0;
      color: hsl(var(--app-text-muted)); font-size: 13px; font-weight: 600; cursor: pointer;
      transition: color .14s, background .14s;
    }
    .yc-approve-inbox-tab-l1:hover { color: hsl(var(--app-text)); background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-tab-l1-active { color: hsl(var(--primary)); }
    .yc-approve-inbox-tab-l1 .count { opacity: .6; margin-left: 4px; font-weight: 500; font-size: 12px; }
    .yc-approve-inbox-tabs-l2 { display: flex; align-items: center; gap: 4px; padding: 6px 0 2px; flex-wrap: wrap; }
    .yc-approve-inbox-tab-l2 {
      padding: 2px 10px; border: 1px solid transparent; border-radius: 12px; background: none;
      color: hsl(var(--app-text-muted)); font-size: 12px; cursor: pointer; white-space: nowrap;
      transition: color .12s, background .12s, border-color .12s;
    }
    .yc-approve-inbox-tab-l2:hover { background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-tab-l2-active { color: hsl(var(--primary)); background: hsl(var(--primary) / .08); border-color: hsl(var(--primary) / .25); font-weight: 600; }
    .yc-approve-inbox-tab-l2 .count { opacity: .55; margin-left: 3px; }
    .yc-approve-inbox-l2-toggle {
      width: 28px; height: 28px; display: grid; place-items: center;
      border: 1px solid hsl(var(--app-border-subtle)); border-radius: 6px; background: none;
      color: hsl(var(--app-text-muted)); cursor: pointer; transition: color .14s, border-color .14s, background .14s;
    }
    .yc-approve-inbox-l2-toggle:hover { color: hsl(var(--app-text)); border-color: hsl(var(--app-border)); background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-l2-toggle .yc-action-icon { width: 14px; height: 14px; }

    .yc-approve-inbox-tab {
      padding: 6px 10px; border: none; border-bottom: 2px solid transparent; border-radius: 4px 4px 0 0;
      background: none; color: hsl(var(--app-text-muted)); font-size: 12px; font-weight: 500;
      white-space: nowrap; cursor: pointer; transition: color .14s, border-color .14s, background .14s;
    }
    .yc-approve-inbox-tab:hover { color: hsl(var(--app-text)); background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-tab-active { color: hsl(var(--primary)); border-bottom-color: hsl(var(--primary)); font-weight: 700; }
    .yc-approve-inbox-tab .count { opacity: .6; margin-left: 3px; font-weight: 500; }

    .yc-approve-inbox-toolbar { display: flex; align-items: center; gap: 4px; flex-shrink: 0; min-width: 0; padding-bottom: 6px; }
    .yc-approve-inbox-toolbar-icon {
      width: 28px; height: 28px; display: grid; place-items: center;
      border: 1px solid hsl(var(--app-border-subtle)); border-radius: 6px; background: none;
      color: hsl(var(--app-text-muted)); cursor: pointer; transition: color .14s, border-color .14s, background .14s;
    }
    .yc-approve-inbox-toolbar-icon:hover { color: hsl(var(--app-text)); border-color: hsl(var(--app-border)); background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-toolbar-icon .yc-action-icon { width: 14px; height: 14px; }
    .yc-approve-inbox-batch-approve {
      display: inline-flex; align-items: center; gap: 4px; padding: 0 10px; height: 28px;
      border: 1px solid hsl(var(--app-border)); border-radius: 6px; background: hsl(var(--app-surface));
      color: hsl(var(--app-text-muted)); font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap;
      transition: color .14s, background .14s, border-color .14s;
    }
    .yc-approve-inbox-batch-approve:hover:not(:disabled) { color: hsl(var(--app-text)); border-color: hsl(var(--app-border-hover)); background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-batch-approve:disabled { opacity: .4; cursor: not-allowed; }
    .yc-approve-inbox-batch-approve .yc-action-icon { width: 13px; height: 13px; }

    /* ── 列表 ── */
    .yc-approve-inbox-list { flex: 1; min-height: 0; overflow-y: auto; padding: 6px 0; border-top: 1px solid hsl(var(--app-border-subtle)); }
    .yc-approve-inbox-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      min-height: 160px; color: hsl(var(--app-text-subtle)); font-size: 13px;
    }
    .yc-approve-inbox-empty .yc-action-icon { width: 28px; height: 28px; opacity: .4; }

    /* ── 已办智能总结 ── */
    .yc-approve-inbox-review-summary { margin: 4px 12px 10px; padding: 12px 14px; border: 1px solid hsl(var(--info-border)); border-radius: 8px; background: linear-gradient(180deg, hsl(var(--info-soft)), hsl(var(--app-surface))); display: flex; flex-direction: column; gap: 10px; }
    .review-summary-head { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: hsl(var(--app-text)); }
    .review-summary-head .yc-action-icon { width: 14px; height: 14px; color: hsl(222 47% 45%); }
    .review-summary-head .period { margin-left: auto; font-weight: 500; font-size: 11px; color: hsl(var(--app-text-subtle)); }
    .review-summary-stats { display: flex; flex-wrap: wrap; gap: 8px; }
    .review-summary-stats .stat { display: flex; flex-direction: column; align-items: center; min-width: 56px; padding: 6px 10px; border-radius: 6px; background: hsl(var(--app-surface)); border: 1px solid hsl(var(--app-border-subtle)); }
    .review-summary-stats .stat b { font-size: 17px; font-weight: 700; line-height: 1.2; color: hsl(var(--app-text)); }
    .review-summary-stats .stat span { font-size: 10px; color: hsl(var(--app-text-muted)); margin-top: 2px; }
    .review-summary-stats .stat-approve b { color: hsl(var(--success)); }
    .review-summary-stats .stat-reject b { color: hsl(var(--destructive)); }
    .review-summary-stats .stat-return b { color: hsl(var(--warning-text)); }
    .review-summary-risk { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; font-size: 11px; color: hsl(var(--app-text-muted)); }
    .review-summary-risk .rk { display: inline-flex; align-items: center; gap: 4px; }
    .review-summary-risk .rk i { width: 7px; height: 7px; border-radius: 50%; }
    .review-summary-risk .rk-high i { background: hsl(var(--destructive)); }
    .review-summary-risk .rk-medium i { background: hsl(var(--warning)); }
    .review-summary-risk .rk-low i { background: hsl(var(--success)); }
    .review-summary-analysis { margin: 0; font-size: 12px; line-height: 1.7; color: hsl(var(--app-text-secondary)); }

    /* ── 单条列表项 ── */
    .yc-approve-inbox-row {
      position: relative; display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 12px; border-left: 3px solid transparent; cursor: pointer;
      transition: background .14s, border-color .14s;
    }
    .yc-approve-inbox-row:hover { background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-row.active { background: hsl(var(--primary) / .06); }
    .yc-approve-inbox-risk-high { border-left-color: hsl(var(--destructive)); }
    .yc-approve-inbox-risk-high .yc-approve-inbox-risk-dot { background: hsl(var(--destructive)); }
    .yc-approve-inbox-risk-high .yc-approve-inbox-row-title strong { color: #b91c1c; }
    .yc-approve-inbox-risk-medium { border-left-color: hsl(var(--warning)); }
    .yc-approve-inbox-risk-medium .yc-approve-inbox-risk-dot { background: hsl(var(--warning)); }
    .yc-approve-inbox-risk-medium .yc-approve-inbox-row-title strong { color: #b45309; }
    .yc-approve-inbox-risk-low { border-left-color: hsl(var(--success)); }
    .yc-approve-inbox-risk-low .yc-approve-inbox-risk-dot { background: hsl(var(--success)); }
    .yc-approve-inbox-risk-low .yc-approve-inbox-row-title strong { color: hsl(var(--app-text)); }

    .yc-approve-inbox-checkbox {
      flex-shrink: 0; margin-top: 2px; width: 14px; height: 14px; cursor: pointer;
      accent-color: hsl(var(--primary)); opacity: 0; transition: opacity .12s;
    }
    .yc-approve-inbox-row:hover .yc-approve-inbox-checkbox,
    .yc-approve-inbox-checkbox:checked { opacity: 1; }

    .yc-approve-inbox-row-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
    .yc-approve-inbox-row-title { display: flex; align-items: center; gap: 6px; }
    .yc-approve-inbox-row-title strong {
      min-width: 0; font-size: 13px; font-weight: 600; line-height: 1.4;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .yc-approve-inbox-attachment-indicator {
      flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; color: hsl(var(--app-text-muted));
    }
    .yc-approve-inbox-attachment-indicator .yc-action-icon { width: 13px; height: 13px; }
    .yc-approve-inbox-risk-dot { flex-shrink: 0; width: 6px; height: 6px; border-radius: 50%; background: hsl(var(--app-text-subtle)); }

    /* ── 提交人 · 日期 meta 行 ── */
    .yc-approve-inbox-row-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: hsl(var(--app-text-subtle)); line-height: 1.4; white-space: nowrap; }
    .yc-approve-inbox-row-meta .meta-item { display: inline-flex; align-items: center; gap: 3px; }
    .yc-approve-inbox-row-meta .meta-sep { color: hsl(var(--app-border)); }
    /* 审批建议 tag（同行，tag 感，区别于审批按钮） */
    .yc-approve-inbox-advice-tag {
      margin-left: 2px; padding: 0 7px; height: 17px; border-radius: 9px; font-size: 10px; font-weight: 600;
      display: inline-flex; align-items: center; white-space: nowrap;
    }
    .yc-approve-inbox-advice-tag-approve { color: hsl(var(--success)); background: hsl(var(--success-soft)); }
    .yc-approve-inbox-advice-tag-caution { color: hsl(var(--warning-text)); background: hsl(var(--warning-soft)); }
    .yc-approve-inbox-advice-tag-reject { color: hsl(var(--destructive)); background: hsl(var(--destructive-soft)); }
    .yc-approve-inbox-tenant-tag {
      margin-left: 2px; padding: 0 7px; height: 17px; border-radius: 9px; font-size: 10px; font-weight: 500;
      display: inline-flex; align-items: center; white-space: nowrap; gap: 3px;
      color: hsl(var(--app-text-subtle)); background: hsl(var(--app-border-subtle) / .5); border: 1px solid hsl(var(--app-border));
    }
    .yc-approve-inbox-tenant-toggle {
      margin-left: auto; padding: 0 8px 0 6px; height: 28px; border-radius: 8px; font-size: 12px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
      border: 1px solid hsl(var(--app-border)); background: hsl(var(--app-bg)); color: hsl(var(--app-text-subtle));
    }
    .yc-approve-inbox-tenant-toggle.on { color: hsl(var(--app-text)); border-color: hsl(var(--primary) / .35); background: hsl(var(--primary) / .05); }
    .yc-approve-inbox-tenant-switch {
      position: relative; width: 32px; height: 18px; flex: 0 0 32px; border-radius: 999px;
      background: hsl(var(--app-border-hover)); transition: background .16s ease;
    }
    .yc-approve-inbox-tenant-switch::after {
      content: ""; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 999px;
      background: hsl(var(--app-bg)); box-shadow: 0 1px 3px hsl(222 40% 12% / .18); transition: transform .16s ease;
    }
    .yc-approve-inbox-tenant-toggle.on .yc-approve-inbox-tenant-switch { background: hsl(var(--primary)); }
    .yc-approve-inbox-tenant-toggle.on .yc-approve-inbox-tenant-switch::after { transform: translateX(14px); }
    .yc-approve-inbox-tenant-toggle-label { overflow: hidden; text-overflow: ellipsis; }
    .yc-approve-inbox-reanalyze-pending {
      padding: 0 10px; height: 28px; border-radius: 8px; font-size: 12px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
      border: 1px solid hsl(var(--warning-text) / .35); background: hsl(var(--warning-soft)); color: hsl(var(--warning-text));
    }
    .yc-approve-inbox-reanalyze-pending:disabled { opacity: .6; cursor: default; }

    /* ── 智能 tags ── */
    .yc-approve-inbox-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .yc-approve-inbox-tag {
      display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 4px;
      font-size: 11px; font-weight: 500; line-height: 18px; white-space: nowrap;
      max-width: 100%; overflow: hidden; text-overflow: ellipsis;
    }
    .yc-approve-inbox-tag-risk { color: hsl(var(--destructive)); background: hsl(var(--destructive-soft)); border: 1px solid hsl(var(--destructive-border)); }
    .yc-approve-inbox-tag-rule { color: hsl(var(--warning-text)); background: hsl(var(--warning-soft)); border: 1px solid hsl(var(--warning-border)); }
    .yc-approve-inbox-tag-advice { color: hsl(var(--success)); background: hsl(var(--success-soft)); border: 1px solid hsl(var(--success-border)); }
    .yc-approve-inbox-tag-default { color: hsl(var(--app-text-muted)); background: hsl(var(--app-surface-subtle)); border: 1px solid hsl(var(--app-border-subtle)); }
    .yc-approve-inbox-tag-overflow { color: hsl(var(--app-text-subtle)); background: none; border: 1px solid hsl(var(--app-border-subtle)); }

    /* ── 行操作 ── */
    /* 行操作：默认隐藏，只在 hover 到当前行时显示（与 YonClaw 一致） */
    .yc-approve-inbox-row-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; opacity: 0; pointer-events: none; transition: opacity .14s ease; }
    .yc-approve-inbox-row:hover .yc-approve-inbox-row-actions { opacity: 1; pointer-events: auto; }
    .yc-approve-inbox-row-btn {
      padding: 2px 8px; height: 24px; border: 1px solid hsl(var(--app-border)); border-radius: 4px;
      background: hsl(var(--app-surface)); color: hsl(var(--app-text-muted)); font-size: 11px; font-weight: 500;
      cursor: pointer; white-space: nowrap; transition: color .12s, border-color .12s, background .12s;
    }
    .yc-approve-inbox-row-btn:hover { color: hsl(var(--app-text)); border-color: hsl(var(--app-border-hover)); background: hsl(var(--app-surface-hover)); }
    /* 通过=主操作（用友红实心，与 YonClaw 一致）；驳回=描边幽灵 */
    .yc-approve-inbox-row-btn-approve { color: hsl(var(--primary-foreground)); border-color: hsl(var(--primary)); background: hsl(var(--primary)); font-weight: 600; }
    .yc-approve-inbox-row-btn-approve:hover { background: hsl(var(--primary-300)); border-color: hsl(var(--primary-300)); color: hsl(var(--primary-foreground)); }

    /* ── 已选条 ── */
    .yc-approve-inbox-selection-bar {
      display: flex; align-items: center; justify-content: space-between; padding: 6px 12px;

    /* ========== 详情抽屉 ========== */
    .yc-approve-inbox-detail {

    .yc-approve-inbox-detail-close {
      flex-shrink: 0; width: 28px; height: 28px; display: grid; place-items: center;
      border: 1px solid hsl(var(--app-border-subtle)); border-radius: 6px; background: none;
      color: hsl(var(--app-text-muted)); cursor: pointer; transition: color .12s, background .12s;
    }
    .yc-approve-inbox-detail-nav-btn:hover:not(:disabled),
    .yc-approve-inbox-detail-close:hover { color: hsl(var(--app-text)); background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-detail-nav-btn:disabled { opacity: .34; cursor: not-allowed; }
    .yc-approve-inbox-detail-nav-btn .yc-action-icon,
    .yc-approve-inbox-detail-close .yc-action-icon { width: 14px; height: 14px; }

    .yc-approve-inbox-fallback-notice {
      display: flex; align-items: center; gap: 6px; padding: 6px 16px;
      background: hsl(var(--warning-soft)); color: hsl(var(--warning-text)); font-size: 11px; font-weight: 500; flex-shrink: 0;
    }
    .yc-approve-inbox-fallback-notice .yc-action-icon { width: 13px; height: 13px; }

    .yc-approve-inbox-detail-body { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 20px; }
    .yc-approve-inbox-detail-section { display: flex; flex-direction: column; gap: 10px; }
    /* 真实单据字段 grid */
    .yc-approve-inbox-rawfields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px; }
    .yc-approve-inbox-rawfields .rf-row { display: flex; flex-direction: column; gap: 1px; min-width: 0; padding: 4px 8px; border-radius: 5px; background: hsl(var(--app-surface-subtle)); }
    .yc-approve-inbox-rawfields .rf-k { font-size: 10px; color: hsl(var(--app-text-subtle)); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .yc-approve-inbox-rawfields .rf-v { font-size: 12px; color: hsl(var(--app-text)); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .yc-approve-inbox-enriching { background: hsl(var(--primary) / .08); color: hsl(var(--primary)); }
    .yc-approve-inbox-enriching .yc-action-icon { animation: pulse 1s infinite; }
    .yc-approve-inbox-section-title {
      margin: 0; font-size: 12px; font-weight: 700; color: hsl(var(--app-text-muted));
      text-transform: uppercase; letter-spacing: 0;
    }

    /* ① 总体结论 */

    .yc-approve-inbox-conclusion-light { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .yc-approve-inbox-conclusion-approve { color: hsl(var(--success)); background: hsl(var(--success-soft)); border: 1px solid hsl(var(--success-border)); }
    .yc-approve-inbox-conclusion-approve .yc-approve-inbox-conclusion-light { background: hsl(var(--success)); box-shadow: 0 0 6px 1px hsl(var(--success) / .4); }
    .yc-approve-inbox-conclusion-caution { color: hsl(var(--warning-text)); background: hsl(var(--warning-soft)); border: 1px solid hsl(var(--warning-border)); }
    .yc-approve-inbox-conclusion-caution .yc-approve-inbox-conclusion-light { background: hsl(var(--warning)); box-shadow: 0 0 6px 1px hsl(var(--warning) / .4); }
    .yc-approve-inbox-conclusion-reject { color: hsl(var(--destructive)); background: hsl(var(--destructive-soft)); border: 1px solid hsl(var(--destructive-border)); }
    .yc-approve-inbox-conclusion-reject .yc-approve-inbox-conclusion-light { background: hsl(var(--destructive)); box-shadow: 0 0 6px 1px hsl(var(--destructive) / .4); }

    /* ② 总体分析 */
    .yc-approve-inbox-overall-analysis {
      margin: 0; padding: 10px 12px; border-radius: 6px; border-left: 3px solid hsl(var(--primary) / .35);
      background: hsl(var(--app-surface-subtle)); color: hsl(var(--app-text-secondary)); line-height: 1.7; font-size: 13px;
    }

    /* ③ 字段分析 */
    .yc-approve-inbox-field-list { display: flex; flex-direction: column; gap: 8px; }

    .yc-approve-inbox-field-value { padding: 0 5px; border-radius: 3px; background: hsl(var(--app-surface-subtle)); color: hsl(var(--app-text-secondary)); font-size: 11px; font-family: 'SF Mono','Fira Code',monospace; }
    .yc-approve-inbox-field-summary { margin: 0; color: hsl(var(--app-text-muted)); font-size: 12px; line-height: 1.6; }

    /* ④ 规则分析 */

    .yc-approve-inbox-rule-row { padding: 10px 12px; border: 1px solid hsl(var(--app-border-subtle)); border-radius: 6px; background: hsl(var(--app-bg)); display: flex; flex-direction: column; gap: 6px; }
    .yc-approve-inbox-rule-head { display: flex; align-items: center; gap: 6px; }

    .yc-approve-inbox-rule-summary { margin: 0; color: hsl(var(--app-text-secondary)); font-size: 12px; line-height: 1.6; }
    .yc-approve-inbox-evidence {
      display: flex; align-items: flex-start; gap: 6px; margin: 0; padding: 6px 10px;
      border-left: 2px solid hsl(var(--info-border)); border-radius: 0 4px 4px 0;
      background: hsl(var(--info-soft)); color: hsl(var(--app-text-muted)); font-size: 11px; line-height: 1.6;
    }
    .yc-approve-inbox-evidence .yc-action-icon { flex-shrink: 0; width: 12px; height: 12px; margin-top: 1px; opacity: .6; }
    .yc-approve-inbox-suggestion { display: flex; align-items: flex-start; gap: 5px; margin: 0; color: hsl(var(--app-text-muted)); font-size: 12px; line-height: 1.6; }
    .yc-approve-inbox-suggestion .yc-action-icon { flex-shrink: 0; width: 13px; height: 13px; margin-top: 1px; color: hsl(var(--warning)); }

    /* ⑤ 附件分析 */
    .yc-approve-inbox-attachment-toolbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .yc-approve-inbox-attachment-count { margin: 3px 0 0; color: hsl(var(--app-text-subtle)); font-size: 11px; line-height: 1.5; }

    .yc-approve-inbox-attachment-filter-btn {
      height: 24px; padding: 0 9px; border: 1px solid hsl(var(--app-border-subtle)); border-radius: 999px;
      background: hsl(var(--app-surface)); color: hsl(var(--app-text-muted)); font-size: 11px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .yc-approve-inbox-attachment-filter-btn:hover { border-color: hsl(var(--app-border-hover)); background: hsl(var(--app-surface-hover)); color: hsl(var(--app-text)); }
    .yc-approve-inbox-attachment-filter-btn.active { border-color: hsl(var(--primary) / .42); background: hsl(var(--primary) / .08); color: hsl(var(--primary)); }
    .yc-approve-inbox-attachment-list { max-height: min(440px, 52vh); padding-right: 2px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .yc-approve-inbox-attachment-row { padding: 10px 12px; border: 1px solid hsl(var(--app-border-subtle)); border-radius: 6px; background: hsl(var(--app-bg)); display: flex; flex-direction: column; gap: 6px; }
    .yc-approve-inbox-attachment-head { display: flex; align-items: center; gap: 6px; }
    .yc-approve-inbox-attachment-head .yc-action-icon { flex-shrink: 0; width: 14px; height: 14px; color: hsl(var(--app-text-muted)); }
    .yc-approve-inbox-attachment-name { flex: 1; font-size: 12px; font-weight: 600; color: hsl(var(--app-text)); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .yc-approve-inbox-attachment-source {
      flex-shrink: 0; display: inline-flex; align-items: center; height: 18px; padding: 0 7px; border-radius: 999px;
      background: hsl(var(--app-surface-subtle)); color: hsl(var(--app-text-muted)); font-size: 10px; font-weight: 700; white-space: nowrap;
    }
    .yc-approve-inbox-attachment-source-standard { background: hsl(220 16% 95%); color: hsl(222 12% 35%); }
    .yc-approve-inbox-attachment-source-comment { background: hsl(var(--warning-soft)); color: hsl(var(--warning-text)); }
    .yc-approve-inbox-attachment-source-task { background: hsl(var(--info-soft)); color: hsl(217 78% 42%); }
    .yc-approve-inbox-attachment-source-approval { background: hsl(var(--success-soft)); color: hsl(var(--success)); }
    .yc-approve-inbox-attachment-source-analysis { background: hsl(var(--app-surface-subtle)); color: hsl(var(--app-text-subtle)); }
    .yc-approve-inbox-attachment-source-other { background: hsl(278 55% 96%); color: hsl(278 42% 42%); }
    .yc-approve-inbox-attachment-type { padding: 0 5px; border-radius: 3px; background: hsl(var(--app-surface-subtle)); color: hsl(var(--app-text-muted)); font-size: 10px; font-family: 'SF Mono','Fira Code',monospace; }
    .yc-approve-inbox-attachment-summary { margin: 0; color: hsl(var(--app-text-muted)); font-size: 12px; line-height: 1.6; }
    .yc-approve-inbox-attachment-pending { color: hsl(var(--warning-text)); }
    .yc-approve-inbox-attachment-status { margin: 0; display: flex; flex-wrap: wrap; gap: 4px 10px; font-size: 11px; color: hsl(var(--app-text-subtle)); }
    .yc-approve-inbox-attachment-preview-trigger {

    .yc-approve-inbox-findings li strong { color: hsl(var(--app-text-secondary)); font-weight: 600; }

    /* 严重度色点 + tag */
    .yc-approve-inbox-dot { flex-shrink: 0; width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; background: hsl(var(--app-text-subtle)); }
    .yc-approve-inbox-dot-risk { background: hsl(var(--destructive)); }
    .yc-approve-inbox-dot-warning { background: hsl(var(--warning)); }
    .yc-approve-inbox-dot-passed { background: hsl(var(--success)); }
    .yc-approve-inbox-severity { display: inline-flex; align-items: center; padding: 0 5px; height: 16px; border-radius: 3px; font-size: 10px; font-weight: 600; white-space: nowrap; }
    .yc-approve-inbox-severity-risk { color: hsl(var(--destructive)); background: hsl(var(--destructive-soft)); }
    .yc-approve-inbox-severity-warning { color: hsl(var(--warning-text)); background: hsl(var(--warning-soft)); }
    .yc-approve-inbox-severity-passed { color: hsl(var(--success)); background: hsl(var(--success-soft)); }
    .yc-approve-inbox-severity-default { color: hsl(var(--app-text-muted)); background: hsl(var(--app-surface-subtle)); }

    /* 操作栏 */
    .yc-approve-inbox-detail-footer { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-top: 1px solid hsl(var(--app-border-subtle)); background: hsl(var(--app-surface)); flex-shrink: 0; }
    .yc-approve-inbox-detail-btn { min-width: 0; padding: 0 14px; height: 32px; border: 1px solid hsl(var(--app-border)); border-radius: 6px; background: hsl(var(--app-surface)); color: hsl(var(--app-text)); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .12s, border-color .12s; }
    .yc-approve-inbox-detail-btn:hover { background: hsl(var(--app-surface-hover)); border-color: hsl(var(--app-border-hover)); }
    .yc-approve-inbox-detail-btn-approve { color: hsl(var(--primary-foreground)); background: hsl(var(--primary)); border-color: hsl(var(--primary)); font-weight: 600; }
    .yc-approve-inbox-detail-btn-approve:hover { background: hsl(var(--primary-300)); border-color: hsl(var(--primary-300)); }
    .yc-approve-inbox-detail-btn-icon {
      flex: 0 0 32px; width: 32px; padding: 0;
      display: inline-grid; place-items: center;
    }
    .yc-approve-inbox-detail-btn-icon .yc-action-icon { width: 15px; height: 15px; }
    .yc-approve-inbox-detail-btn-icon:disabled { opacity: .6; cursor: default; }
    .yc-approve-inbox-detail-btn-icon:disabled .yc-action-icon { animation: pulse 1s infinite; }

    /* ── toast ── */
    #toast { position: fixed; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
    .toast {
      padding: 9px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; color: #fff;
      box-shadow: 0 4px 12px rgba(0,0,0,.15); animation: toast-in .2s; max-width: 320px;
    }

    .toast-info { background: hsl(222 47% 40%); }
    .toast-error { background: hsl(var(--destructive)); }
    @keyframes toast-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    /* ── 审批确认弹窗 ── */
    .yc-approval-modal-layer {
      position: fixed; inset: 0; z-index: 120;
      display: grid; place-items: center;
      padding: 24px;
      background: hsl(222 30% 12% / .42);
    }
    .yc-approval-modal {
      width: min(440px, 100%);
      max-height: min(620px, calc(100dvh - 48px));
      overflow: hidden;
      display: flex; flex-direction: column;

      box-shadow: 0 18px 50px hsl(222 40% 12% / .22);
      animation: modal-in .16s ease;

    .yc-approval-modal-close {
      width: 28px; height: 28px; display: grid; place-items: center;
      border: 1px solid hsl(var(--app-border-subtle)); border-radius: 6px;
      background: none; color: hsl(var(--app-text-muted)); cursor: pointer;
    }
    .yc-approval-modal-close:hover { background: hsl(var(--app-surface-hover)); color: hsl(var(--app-text)); }
    .yc-approval-modal-body { padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .yc-approval-modal-summary {

    }
    .yc-approval-modal-list {
      margin: 0; padding: 8px 10px; list-style: none;
      border: 1px solid hsl(var(--app-border-subtle)); border-radius: 8px;
      background: hsl(var(--app-surface-subtle));
      display: flex; flex-direction: column; gap: 6px;
    }
    .yc-approval-modal-list li {
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: hsl(var(--app-text-muted)); font-size: 12px;
    }
    .yc-approval-field { display: flex; flex-direction: column; gap: 6px; }
    .yc-approval-field label { font-size: 12px; font-weight: 600; color: hsl(var(--app-text-muted)); }
    .yc-approval-field textarea,
    .yc-approval-field select {
      width: 100%; border: 1px solid hsl(var(--app-border)); border-radius: 7px;
      background: hsl(var(--app-surface)); color: hsl(var(--app-text));
      font: inherit; font-size: 13px;
    }
    .yc-approval-field textarea { min-height: 82px; resize: vertical; padding: 9px 10px; line-height: 1.55; }
    .yc-approval-field select { height: 34px; padding: 0 9px; }
    .yc-approval-modal-footer {
      display: flex; align-items: center; justify-content: flex-end; gap: 8px;
      padding: 12px 16px; border-top: 1px solid hsl(var(--app-border-subtle));
      background: hsl(var(--app-bg));
    }
    .yc-approval-modal-btn {
      height: 32px; padding: 0 14px; border: 1px solid hsl(var(--app-border)); border-radius: 6px;
      background: hsl(var(--app-surface)); color: hsl(var(--app-text)); font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .yc-approval-modal-btn:hover:not(:disabled) { background: hsl(var(--app-surface-hover)); border-color: hsl(var(--app-border-hover)); }
    .yc-approval-modal-btn-primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); border-color: hsl(var(--primary)); }
    .yc-approval-modal-btn-primary:hover:not(:disabled) { background: hsl(var(--primary-300)); border-color: hsl(var(--primary-300)); }
    .yc-approval-modal-btn:disabled { opacity: .55; cursor: not-allowed; }

    /* ── 附件即时预览 ── */
    .yc-attachment-preview-layer {
      position: fixed; inset: 0; z-index: 130;
      display: grid; place-items: center; padding: 24px;
      background: hsl(222 30% 12% / .44);
    }
    .yc-attachment-preview {
      width: min(1540px, calc(100vw - 48px));
      height: min(900px, calc(100dvh - 48px));
      display: flex; flex-direction: column; overflow: hidden;
      border-radius: 10px; background: hsl(var(--app-surface));
      border: 1px solid hsl(var(--app-border-subtle));
      box-shadow: 0 18px 50px hsl(222 40% 12% / .24);
      animation: modal-in .16s ease;
    }
    .yc-attachment-preview-header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 14px 16px; border-bottom: 1px solid hsl(var(--app-border-subtle));
    }
    .yc-attachment-preview-title {
      min-width: 0; flex: 1 1 auto; display: flex; align-items: center; gap: 8px;
      color: hsl(var(--app-text)); font-size: 15px; font-weight: 700;
    }
    .yc-attachment-preview-title .yc-action-icon { width: 18px; height: 18px; flex: 0 0 18px; }
    .yc-attachment-preview-title span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .yc-attachment-preview-close {
      width: 28px; height: 28px; flex-shrink: 0; display: grid; place-items: center;
      border: 1px solid hsl(var(--app-border-subtle)); border-radius: 6px;
      background: none; color: hsl(var(--app-text-muted)); cursor: pointer;
    }
    .yc-attachment-preview-close:hover { background: hsl(var(--app-surface-hover)); color: hsl(var(--app-text)); }
    .yc-attachment-preview-body { flex: 1; min-height: 0; padding: 14px 16px; overflow: hidden; display: grid; grid-template-columns: minmax(0, 3fr) minmax(280px, 1fr); gap: 12px; }

    }
    .yc-mail-column-custom button:hover:not(:disabled) { background: hsl(var(--app-surface-hover)); border-color: hsl(var(--app-border-hover)); }
    .yc-mail-column-custom button:disabled { opacity: .45; cursor: not-allowed; }
    .yc-mail-search-inline {
      height: 28px; width: min(280px, 38vw); display: inline-flex; align-items: center; gap: 7px;

    .yc-mail-search-inline input {
      width: 100%; min-width: 0; border: 0; outline: 0; background: transparent;

    .yc-yonclaw-chat { position: fixed; z-index: 80; right: 16px; bottom: 16px; }
    .yc-yonclaw-launcher {
      width: 46px; height: 46px; display: grid; place-items: center;
      border: 1px solid hsl(var(--primary)); border-radius: 999px;
      background: hsl(var(--primary)); color: hsl(var(--primary-foreground));
      box-shadow: 0 12px 30px hsl(var(--primary) / .32); cursor: pointer;
    }
    .yc-yonclaw-launcher .yc-action-icon { width: 20px; height: 20px; }
    .yc-yonclaw-panel {
      width: min(360px, calc(100vw - 24px)); height: min(460px, calc(100dvh - 32px));
      display: flex; flex-direction: column; overflow: hidden; border: 1px solid hsl(var(--app-border));
      border-radius: 10px; background: hsl(var(--app-surface)); box-shadow: 0 18px 50px hsl(222 40% 12% / .22);
    }
    .yc-yonclaw-panel header {
      height: 44px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px; border-bottom: 1px solid hsl(var(--app-border-subtle));
    }
    .yc-yonclaw-panel header button {
      width: 28px; height: 28px; display: grid; place-items: center;

    .yc-yonclaw-messages .assistant { align-self: flex-start; background: hsl(var(--app-surface)); color: hsl(var(--app-text-secondary)); border: 1px solid hsl(var(--app-border-subtle)); }
    .yc-yonclaw-messages .user { align-self: flex-end; background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }
    .yc-yonclaw-command-actions { display: flex; gap: 6px; margin-top: 8px; }
    .yc-yonclaw-command-actions button {
      height: 26px; padding: 0 10px; border: 1px solid hsl(var(--app-border-subtle)); border-radius: 6px;
      background: hsl(var(--app-surface)); color: hsl(var(--app-text)); font-size: 12px; font-weight: 700; cursor: pointer;

    .yc-yonclaw-input { display: flex; gap: 8px; padding: 10px; border-top: 1px solid hsl(var(--app-border-subtle)); }

      .yc-mail-head:not(.yc-mail-head-title):not(.yc-mail-head-submitter):not(.yc-mail-head-submittedAt):not(.yc-mail-head-docType):not(.yc-mail-head-actions),

    @media (min-width: 768px) and (max-width: 920px) {

      }

        width: 32px;

      .yc-approve-inbox-toolbar { flex-wrap: wrap; overflow: visible; }
      .yc-approve-inbox-list.yc-mail-list { overflow-y: auto; overflow-x: hidden; }
      .yc-mail-list-head { display: none; }
      .yc-mail-row {
        grid-template-columns: 32px minmax(0, 1fr) !important;
        align-items: start; min-width: 0; min-height: 0; padding: 12px; row-gap: 7px; border-left: 0;
      }
      .yc-mail-check { grid-column: 1; grid-row: 1 / span 5; align-self: start; padding-top: 2px; }

      }
      .yc-mail-cell:not(.yc-mail-cell-title):not(.yc-mail-cell-actions) > .yc-mail-advice,
      .yc-mail-cell:not(.yc-mail-cell-title):not(.yc-mail-cell-actions) > .yc-mail-risk-pill,
      .yc-mail-cell:not(.yc-mail-cell-title):not(.yc-mail-cell-actions) > .yc-mail-attachment {
        justify-self: start; width: fit-content; max-width: 100%; height: 22px; padding: 0 8px; border-radius: 999px; box-shadow: none;
      }
      .yc-mail-cell-actions { margin-top: 4px; display: block; }
      .yc-mail-title-cell { align-items: flex-start; }
      .yc-mail-title-cell strong { white-space: normal; overflow-wrap: anywhere; line-height: 1.35; }
      .yc-mail-title-cell span { display: none; }
      .yc-mail-column-panel { grid-template-columns: 1fr; }
      .yc-mail-column-custom { grid-template-columns: 1fr; }
      .yc-mail-search-inline { width: 100%; flex: 1 1 100%; }
      .yc-approve-inbox-shell-drawer { min-width: 0; }

  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>智能待办</h1>
      <div class="app-header-right">
        <span class="sync-status" id="syncStatus"></span>
        <button class="btn-sync" id="btnSync" title="刷新待办并启动智能分析" aria-label="刷新待办并启动智能分析"></button>
      </div>
    </header>
    <main class="yc-approve-inbox-shell">
      <div class="yc-approve-inbox-shell-list">
        <div class="yc-approve-inbox" id="inbox"></div>
      </div>
      <div class="yc-approve-inbox-shell-drawer" id="drawer" style="display:none"></div>
    </main>
  </div>
  <div class="yc-sheet-overlay" id="sheetOverlay" aria-hidden="true"></div>
  <div id="toast"></div>
  <div id="approvalDialogHost"></div>
  <div id="attachmentPreviewHost"></div>
  <div id="yonclawChatHost"></div>

  <script>
    /* ========== 图标 ========== */
    const ICON_PATHS = {
      filter: '<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>',
      switch: '<path d="M8 7h12"/><path d="m17 4 3 3-3 3"/><path d="M16 17H4"/><path d="m7 14-3 3 3 3"/>',
      chevronDown: '<polyline points="6 9 12 15 18 9"/>',
      chevronUp: '<polyline points="18 15 12 9 6 15"/>',
      done: '<polyline points="20 6 9 17 4 12"/>',
      check: '<polyline points="20 6 9 17 4 12"/>',
      close: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
      refresh: '<path d="M21 12a9 9 0 0 1-15.4 6.4L3 16"/><path d="M3 21v-5h5"/><path d="M3 12A9 9 0 0 1 18.4 5.6L21 8"/><path d="M21 3v5h-5"/>',
      file: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',
      lightbulb: '<path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.5.4.8 1 .8 1.6V17h6.4v-.7c0-.6.3-1.2.8-1.6A7 7 0 0 0 12 2z"/>',
      bot: '<rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/>',
      message: '<path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>',
      columns: '<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/><path d="M15 4v16"/>',
      search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
    };
    function icon(name) {
      return '<svg class="yc-action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + (ICON_PATHS[name] || '') + '</svg>';
    }
    function displayText(s) {
      if (s == null) return '';
      if (typeof s === 'string') {
        const t = s.trim();
        if ((t.startsWith('{') && t.endsWith('}')) || (t.startsWith('[') && t.endsWith(']'))) {
          try { return displayText(JSON.parse(t)); } catch { return t; }
        }
        return t;
      }
      if (typeof s === 'number' || typeof s === 'boolean') return String(s);
      if (Array.isArray(s)) return s.map(displayText).filter(Boolean).join('、');
      if (typeof s === 'object') {
        for (const k of ['name', 'displayName', 'label', 'title', 'text', 'value', 'code', 'id']) {
          const v = displayText(s[k]);
          if (v) return v;
        }
        return Object.entries(s).slice(0, 4).map(([k, v]) => {
          const tv = displayText(v);
          return tv ? k + ':' + tv : '';
        }).filter(Boolean).join('，');
      }
      return String(s);
    }
    function esc(s) {
      return displayText(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    const PAGE_PARAMS = new URLSearchParams(window.location.search);
    const IS_COCKPIT_EMBED = PAGE_PARAMS.get('embed') === 'cockpit-drawer';
    const HOST_OWNS_DETAIL = IS_COCKPIT_EMBED && PAGE_PARAMS.get('detailOwner') === 'host';

    /* ========== 状态 ========== */
    /* 两层 tab：L1 待办|已办；L2 单据类型维(默认)，可切换为风险维 */
    const TABS_L1 = [
      { id: 'todo', label: '待办' },
      { id: 'done', label: '已办' },
    ];
    const TABS_L2_RISK = [
      { id: 'all', label: '全部' },
      { id: 'important', label: '重要' },
      { id: 'attention', label: '需关注' },
      { id: 'low-risk', label: '低风险' },
    ];
    const state = {
      data: null,
      activeL1: 'todo',     // todo | done
      activeL2: 'all',      // 风险维 id 或 docType 名
      l2Mode: 'docType',    // risk | docType
      currentTenantOnly: true,  // 仅看当前租户（默认开）；跨租户单据代理无权取数
      selectedIds: new Set(),
      activeItemId: null,
      detail: null,
      approvalDialog: null,
      attachmentPreview: null,
      attachmentPreviewContent: { status: 'idle' },
      attachmentFilter: 'all',
      visibleColumns: ['title', 'submitter', 'submittedAt', 'docType', 'advice', 'attachments', 'actions'],
      customColumns: [],
      query: '',
      searchComposing: false,
      columnPanelOpen: false,
      chatOpen: false,
      chatMessages: [{ role: 'assistant', text: '可以分析任务，也可以调整列表。' }],
      pendingViewCommand: null,
    };

    /* ========== 过滤 ========== */
    /** 先按 L1（待办/已办），再按 L2（风险维 或 单据类型维）过滤 */
    function filterItems(items, l1, l2, l2Mode) {
      let arr = (items || []).filter(i =>
        l1 === 'done' ? i.status === 'done' : (i.status === 'pending' || !i.status)
      );
      // 待办/已办统一受「仅显示当前租户」开关控制；已办默认不做时间范围过滤。
      if (state.currentTenantOnly) arr = arr.filter(i => !i.crossTenant);
      const query = displayText(state.query).trim().toLowerCase();
      if (query) {
        arr = arr.filter(i => [
          i.title,
          i.docType,
          i.submitter,
          i.advice && ADVICE_LABEL[i.advice],
          i.riskLevel && RISK_LABEL[i.riskLevel],
          (i.smartTags || []).map(t => t.label).join(' '),
          displayText(i.summary)
        ].filter(Boolean).join(' ').toLowerCase().includes(query));
      }
      if (!l2 || l2 === 'all') return arr;
      if (l2Mode === 'docType') return arr.filter(i => (i.docType || '其他') === l2);
      // risk 维
      if (l2 === 'important') return arr.filter(i => i.riskLevel === 'high');
      if (l2 === 'attention') return arr.filter(i => i.riskLevel === 'medium' || i.advice === 'caution');
      if (l2 === 'low-risk') return arr.filter(i => i.riskLevel === 'low');
      return arr;
    }

    /** 当前 L1 下的单据类型维选项（动态去重 + 计数） */
    function docTypeTabs(items, l1) {
      const base = filterItems(items, l1, 'all');
      const m = {};
      for (const i of base) { const t = i.docType || '其他'; m[t] = (m[t] || 0) + 1; }
      return [{ id: 'all', label: '全部' }].concat(
        Object.keys(m).sort((a, b) => m[b] - m[a]).map(t => ({ id: t, label: t }))
      );
    }

    /* ========== API ========== */
    async function fetchInbox() {
      const r = await fetch('/api/inbox');
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || '未取到真实待办数据');
      if (!data || data.dataSource !== 'real' || !Array.isArray(data.items)) throw new Error(data.error || '未取到真实待办数据');
      if (data.items.length === 0) throw new Error('真实待办列表为空，请检查 YonClaw 登录态和当前租户');
      return data;
    }
    async function fetchDetail(id) {
      const r = await fetch('/api/details/' + encodeURIComponent(id));
      return r.json();
    }
    async function postJson(url, body) {
      const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body || {}) });
      return r.json();
    }
    async function getJson(url) {
      try { return await (await fetch(url)).json(); } catch { return null; }
    }
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    /* ========== 宿主桥:主题跟随 + 审批结果回传(ai-workbench 驾驶舱)========== */
    function cockpitHostOrigin() {
      const rt = PAGE_PARAMS.get('returnTo') || '';
      try { if (rt) return new URL(rt).origin; } catch (e) { /* ignore */ }
      try { return document.referrer ? new URL(document.referrer).origin : ''; } catch (e) { return ''; }
    }
    function hexToHslTriplet(hex) {
      const m = /^#?([0-9a-fA-F]{6})$/.exec(String(hex || '').trim());
      if (!m) return '';
      const n = parseInt(m[1], 16);
      const r = (n >> 16) / 255, g = ((n >> 8) & 255) / 255, b = (n & 255) / 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max === min) { h = 0; s = 0; }
      else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        if (max === r) h = ((g - b) / d + (g < b ? 6 : 0));
        else if (max === g) h = (b - r) / d + 2;
        else h = (r - g) / d + 4;
        h /= 6;
      }
      return Math.round(h * 360) + ' ' + Math.round(s * 100) + '% ' + Math.round(l * 100) + '%';
    }
    function tellCockpit(message) {
      const origin = cockpitHostOrigin();
      if (!origin || !window.parent || window.parent === window) return;
      window.parent.postMessage(message, origin);
    }
    function applyCockpitTheme(theme) {
      if (!theme || typeof theme !== 'object') return;
      const root = document.documentElement;
      if (theme.primary) { const hsl = hexToHslTriplet(theme.primary); if (hsl) root.style.setProperty('--primary', hsl); }
      if (theme.primaryHover) { const hsl = hexToHslTriplet(theme.primaryHover); if (hsl) root.style.setProperty('--primary-300', hsl); }
      if (theme.mode) root.setAttribute('data-theme', String(theme.mode));
    }
    window.addEventListener('message', (event) => {
      if (!event.data || typeof event.data !== 'object') return;
      const origin = cockpitHostOrigin();
      if (origin && event.origin !== origin) return;
      if (event.data.type === 'approve-inbox:theme') applyCockpitTheme(event.data.theme);
      if (event.data.type === 'approve-inbox:reload' || event.data.type === 'approve-inbox:refresh-complete') {
        refreshInbox();
        pollSyncStatus();
      }
    });
    tellCockpit({ type: 'approve-inbox:ready' });

    function setSyncButtonState(running) {
      const btn = document.getElementById('btnSync');
      if (!btn) return;
      btn.disabled = !!running;
      btn.classList.toggle('is-running', !!running);
      btn.innerHTML = icon('refresh');
    }

    /* ========== toast ========== */
    function toast(msg, type) {
      const el = document.createElement('div');
      el.className = 'toast toast-' + (type || 'info');
      el.textContent = msg;
      document.getElementById('toast').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }
    function syncFallbackMessage(res) {
      if (res && res.sync && res.sync.skipped === 'disabled') return '已刷新本地数据，真实同步未开启';
      if (res && res.error) return res.error;
      return '刷新未启动，请稍后重试';
    }
    function hostPromptPayload(text) {
      const selectedIds = Array.from(state.selectedIds || []);
      const activeItem = state.activeItemId ? itemById(state.activeItemId) : null;
      return {
        source: 'approve-inbox-chat',
        message: text,
        selectedIds,
        activeItemId: state.activeItemId,
        activeItemTitle: activeItem && activeItem.title,
        filter: {
          scope: state.activeL1,
          segment: state.activeL2,
          segmentMode: state.l2Mode,
          currentTenantOnly: state.currentTenantOnly,
          query: state.query,
        },
      };
    }
    function sendPromptToHost(text) {
      const payload = hostPromptPayload(text);
      tellCockpit({
        type: 'approve-inbox:send-prompt',
        message: text,
        payload,
        selectedIds: payload.selectedIds,
        activeItemId: payload.activeItemId,
      });
    }

    const ACTION_COPY = {
      approve: { label: '通过', title: '确认通过', defaultComment: '同意', primary: '确认通过' },
      reject: { label: '驳回', title: '确认驳回', defaultComment: '不同意', primary: '确认驳回' },
      return: { label: '退回', title: '确认退回', defaultComment: '资料需补充，请退回修改', primary: '确认退回' },
    };

    function itemById(id) {
      return (state.data?.items || []).find(i => i.id === id) || null;
    }

    function openApprovalDialog(ids, action) {
      const cleanIds = [...new Set((ids || []).filter(Boolean))];
      if (!cleanIds.length) { toast('请先选择要处理的单据', 'info'); return; }
      const act = ACTION_COPY[action] ? action : 'approve';
      state.approvalDialog = {
        ids: cleanIds,
        action: act,
        comment: ACTION_COPY[act].defaultComment,
        rejectTarget: '-1',
        selectedByRejecter: '0',
        submitting: false,
      };
      render();
      setTimeout(() => {
        const textarea = document.getElementById('approvalComment');
        if (textarea) textarea.focus();
      }, 0);
    }

    function closeApprovalDialog() {
      if (state.approvalDialog?.submitting) return;
      state.approvalDialog = null;
      render();
    }

    function renderApprovalDialog() {
      const d = state.approvalDialog;
      if (!d) return '';
      const copy = ACTION_COPY[d.action] || ACTION_COPY.approve;
      const items = d.ids.map(itemById).filter(Boolean);
      let h = '<div class="yc-approval-modal-layer" role="presentation" data-approval-overlay>' +
        '<section class="yc-approval-modal" role="dialog" aria-modal="true" aria-labelledby="approvalDialogTitle">' +
        '<header class="yc-approval-modal-header"><strong class="yc-approval-modal-title" id="approvalDialogTitle">' + esc(copy.title) + '</strong>' +

    function readApprovalDialogForm() {
      const d = state.approvalDialog;
      if (!d) return null;
      const comment = document.getElementById('approvalComment')?.value || '';
      return {
        action: d.action,
        comment: comment.trim() || ACTION_COPY[d.action].defaultComment,
        rejectTarget: document.getElementById('approvalRejectTarget')?.value || d.rejectTarget || '-1',
        selectedByRejecter: document.getElementById('approvalSelectedByRejecter')?.value || d.selectedByRejecter || '0',
      };
    }

    function formatFileSize(bytes) {
      const n = Number(bytes || 0);
      if (!n) return '-';
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return Math.round(n / 1024) + ' KB';
      return (n / 1024 / 1024).toFixed(1) + ' MB';
    }

    function attachmentSourceInfo(source) {
      const raw = displayText(source).toLowerCase();
      if (raw.includes('comment')) return { key: 'comment', label: '评论附件' };
      if (raw.includes('task')) return { key: 'task', label: '任务附件' };
      if (raw.includes('approval') || raw.includes('approve') || raw.includes('workflow')) return { key: 'approval', label: '审批附件' };
      if (raw.includes('analysis')) return { key: 'analysis', label: '已识别' };
      if (raw === 'mdf-file-api' || raw.includes('file-api') || raw.includes('standard') || raw.includes('detail')) return { key: 'standard', label: '标准附件' };
      if (!raw) return { key: 'standard', label: '标准附件' };
      return { key: 'other', label: '其他附件' };
    }

    function attachmentFilterOptions(rows) {
      const counts = new Map();
      const labels = new Map();
      for (const row of rows) {
        counts.set(row.sourceKey, (counts.get(row.sourceKey) || 0) + 1);
        labels.set(row.sourceKey, row.sourceLabel);
      }
      const preferred = ['standard', 'comment', 'task', 'approval', 'analysis', 'other'];
      const keys = Array.from(counts.keys()).sort((a, b) => {
        const ai = preferred.indexOf(a);
        const bi = preferred.indexOf(b);
        return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi) || a.localeCompare(b);
      });
      return [{ key: 'all', label: '全部', count: rows.length }].concat(keys.map(key => ({
        key,
        label: labels.get(key) || attachmentSourceInfo(key).label,
        count: counts.get(key) || 0
      })));
    }

    function activeAttachmentFilter(options) {
      const keys = new Set(options.map(option => option.key));
      return keys.has(state.attachmentFilter) ? state.attachmentFilter : 'all';
    }

    function attachmentCacheLabel(att) {
      if (att.error) return '解析异常';
      if (att.localPath) return '已缓存';
      return '未缓存正文';
    }

    function attachmentRowsForDetail(d) {
      if (!d) return [];
      const attachmentAnalysis = Array.isArray(d.attachmentAnalysis) ? d.attachmentAnalysis : [];
      const attachments = Array.isArray(d.attachments) ? d.attachments : [];
      return (attachments.length ? attachments : attachmentAnalysis.map(a => ({ fileName: a.name, fileType: a.fileType, source: 'analysis' }))).map((a, idx) => {
        const name = displayText(a.fileName || a.name);
        const analysis = attachmentAnalysis.find(x => x && x.name === name) || attachmentAnalysis[idx] || null;
        const sourceInfo = attachmentSourceInfo(a.source);
        return {
          fileName: name,
          fileType: displayText(a.fileType || (analysis && analysis.fileType) || ''),
          size: a.size,
          localPath: a.localPath || null,
          error: a.error || null,
          source: displayText(a.source || ''),
          sourceKey: sourceInfo.key,
          sourceLabel: sourceInfo.label,
          analysis
        };
      }).filter(a => a.fileName);
    }

    function attachmentExt(att) {
      const type = displayText(att && att.fileType).toLowerCase().replace(/^\./, '');
      if (type) return type;
      const name = displayText(att && att.fileName).toLowerCase();
      const idx = name.lastIndexOf('.');
      return idx >= 0 ? name.slice(idx + 1) : '';
    }

    function isImageAttachment(att) {
      return /^(png|jpe?g|gif|webp|bmp|svg|ico)$/.test(attachmentExt(att));
    }

    const TEXT_PREVIEW_EXTENSIONS = new Set(['txt','text','log','csv','json','xml','md','markdown','js','ts','jsx','tsx','css','html','htm','sql','yml','yaml','ini','conf','sh']);
    const WORD_PREVIEW_EXTENSIONS = new Set(['doc','docx','rtf']);
    const SPREADSHEET_PREVIEW_EXTENSIONS = new Set(['xls','xlsx']);
    const PREVIEW_SCRIPT_URLS = {
      mammoth: 'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js',
      xlsx: 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js'
    };
    const previewScriptPromises = {};
    let attachmentPreviewObjectUrl = '';

    function revokeAttachmentPreviewObjectUrl() {
      if (attachmentPreviewObjectUrl) {
        URL.revokeObjectURL(attachmentPreviewObjectUrl);
        attachmentPreviewObjectUrl = '';
      }
    }

    function attachmentPreviewUrl(att) {
      if (!state.activeItemId || !att || !att.localPath || !att.fileName) return '';
      return '/api/attachments/' + encodeURIComponent(state.activeItemId) + '/' + encodeURIComponent(att.fileName);
    }

    function appendPreviewParam(url) {
      return url + (url.includes('?') ? '&' : '?') + 'preview=html';
    }

    function sanitizePreviewHtml(html) {
      const doc = new DOMParser().parseFromString(html || '', 'text/html');
      doc.querySelectorAll('script,style,iframe,object,embed,link,meta').forEach(node => node.remove());
      doc.querySelectorAll('*').forEach(node => {
        Array.from(node.attributes).forEach(attr => {
          const name = attr.name.toLowerCase();
          const value = String(attr.value || '').trim().toLowerCase();
          if (name.startsWith('on') || ((name === 'href' || name === 'src' || name === 'xlink:href') && value.startsWith('javascript:'))) {
            node.removeAttribute(attr.name);
          }
        });
      });
      return doc.body.innerHTML;
    }

    function csvToPreviewHtml(text) {
      const rows = String(text || '').split(/\r?\n/).filter(row => row.trim()).slice(0, 120).map(row => row.split(',').map(cell => cell.trim()));
      if (!rows.length) return '<p class="yc-attachment-preview-empty">文件为空。</p>';
      return '<table><tbody>' + rows.map((row, rowIndex) => {
        const tag = rowIndex === 0 ? 'th' : 'td';
        return '<tr>' + row.map(cell => '<' + tag + '>' + esc(cell) + '</' + tag + '>').join('') + '</tr>';
      }).join('') + '</tbody></table>';
    }

    function loadPreviewScript(name) {
      if ((name === 'mammoth' && window.mammoth) || (name === 'xlsx' && window.XLSX)) return Promise.resolve();
      if (!previewScriptPromises[name]) {
        previewScriptPromises[name] = new Promise((resolve, reject) => {
          const existing = document.getElementById('yc-preview-lib-' + name);
          if (existing) {
            existing.addEventListener('load', resolve, { once: true });
            existing.addEventListener('error', () => reject(new Error('预览库加载失败')), { once: true });
            return;
          }
          const script = document.createElement('script');
          script.id = 'yc-preview-lib-' + name;
          script.src = PREVIEW_SCRIPT_URLS[name];
          script.async = true;
          script.onload = resolve;
          script.onerror = () => reject(new Error('预览库加载失败'));
          document.head.appendChild(script);
        });
      }
      return previewScriptPromises[name];
    }

    async function readPreviewError(response) {
      try {
        const data = await response.json();
        return data.error || data.message || ('HTTP ' + response.status);
      } catch (_) {
        return 'HTTP ' + response.status;
      }
    }

    async function fetchAttachmentForPreview(url) {
      const response = await fetch(url, { credentials: 'same-origin' });
      if (!response.ok) throw new Error(await readPreviewError(response));
      return response;
    }

    async function tryServerHtmlPreview(url) {
      const response = await fetch(appendPreviewParam(url), { credentials: 'same-origin' });
      if (!response.ok) throw new Error(await readPreviewError(response));
      return sanitizePreviewHtml(await response.text());
    }

    async function buildAttachmentPreviewContent(att) {
      const url = attachmentPreviewUrl(att);
      if (!url) {
        return { status: 'message', message: '附件正文暂未缓存。已显示当前可用的附件元信息和智能分析结果；重新分析拿到下载地址后可在此直接预览。' };
      }
      const ext = attachmentExt(att);
      if (isImageAttachment(att)) {
        const blob = await (await fetchAttachmentForPreview(url)).blob();
        return { status: 'ready', kind: 'image', objectUrl: URL.createObjectURL(blob) };
      }
      if (ext === 'pdf') {
        const blob = await (await fetchAttachmentForPreview(url)).blob();
        return { status: 'ready', kind: 'iframe', objectUrl: URL.createObjectURL(blob) };
      }
      if (TEXT_PREVIEW_EXTENSIONS.has(ext)) {
        const text = await (await fetchAttachmentForPreview(url)).text();
        if (ext === 'csv') return { status: 'ready', kind: 'html', html: csvToPreviewHtml(text) };
        if (ext === 'json') {
          try {
            return { status: 'ready', kind: 'text', text: JSON.stringify(JSON.parse(text), null, 2).slice(0, 200000) };
          } catch (_) {
            return { status: 'ready', kind: 'text', text: text.slice(0, 200000) };
          }
        }
        return { status: 'ready', kind: 'text', text: text.slice(0, 200000) };
      }
      if (WORD_PREVIEW_EXTENSIONS.has(ext)) {
        let serverError = '';
        if (ext === 'doc' || ext === 'rtf') {
          try {
            return { status: 'ready', kind: 'html', html: await tryServerHtmlPreview(url) };
          } catch (e) {
            serverError = e && e.message ? e.message : String(e);
          }
        }
        try {
          await loadPreviewScript('mammoth');
          if (!window.mammoth) throw new Error('Word 预览库不可用');
          const arrayBuffer = await (await fetchAttachmentForPreview(url)).arrayBuffer();
          const result = await window.mammoth.convertToHtml({ arrayBuffer });
          return { status: 'ready', kind: 'html', html: sanitizePreviewHtml(result.value) };
        } catch (e) {
          try {
            return { status: 'ready', kind: 'html', html: await tryServerHtmlPreview(url) };
          } catch (_) {
            const clientError = e && e.message ? e.message : String(e);
            throw new Error(serverError ? clientError + '；' + serverError : clientError);
          }
        }
      }
      if (SPREADSHEET_PREVIEW_EXTENSIONS.has(ext)) {
        await loadPreviewScript('xlsx');
        if (!window.XLSX) throw new Error('Excel 预览库不可用');
        const arrayBuffer = await (await fetchAttachmentForPreview(url)).arrayBuffer();
        const workbook = window.XLSX.read(arrayBuffer, { type: 'array' });
        const sheetName = workbook.SheetNames && workbook.SheetNames[0];
        if (!sheetName) return { status: 'message', message: '工作簿没有可预览的工作表。' };
        return { status: 'ready', kind: 'html', html: sanitizePreviewHtml(window.XLSX.utils.sheet_to_html(workbook.Sheets[sheetName], { editable: false })) };
      }
      return { status: 'message', message: '当前格式暂不支持浏览器内嵌预览，可点击下方“打开原文件”。' };
    }

    function openAttachmentPreview(index) {
      const rows = attachmentRowsForDetail(state.detail);
      const att = rows[Number(index)];
      if (!att) return;
      revokeAttachmentPreviewObjectUrl();
      state.attachmentPreview = att;
      state.attachmentPreviewContent = { status: 'loading' };
      render();
      buildAttachmentPreviewContent(att).then(content => {
        if (state.attachmentPreview !== att) {
          if (content && content.objectUrl) URL.revokeObjectURL(content.objectUrl);
          return;
        }
        revokeAttachmentPreviewObjectUrl();
        if (content && content.objectUrl) attachmentPreviewObjectUrl = content.objectUrl;
        state.attachmentPreviewContent = content;
        render();
      }).catch(error => {
        if (state.attachmentPreview !== att) return;
        state.attachmentPreviewContent = { status: 'error', message: error && error.message ? error.message : String(error) };
        render();
      });
    }

    function closeAttachmentPreview() {
      revokeAttachmentPreviewObjectUrl();
      state.attachmentPreview = null;
      state.attachmentPreviewContent = { status: 'idle' };
      render();
    }

    function renderAttachmentPreview() {
      const att = state.attachmentPreview;
      if (!att) return '';
      const url = attachmentPreviewUrl(att);
      const summary = att.analysis && att.analysis.summary
        ? att.analysis.summary
        : ('已识别附件' + (att.size ? '（' + formatFileSize(att.size) + '）' : '') + '，正文内容解析待完成。');
      let pane = '';
      const content = state.attachmentPreviewContent || { status: 'idle' };
      if (content.status === 'loading') {
        pane = '<p class="yc-attachment-preview-empty">正在生成预览…</p>';
      } else if (content.status === 'message') {
        pane = '<p class="yc-attachment-preview-empty">' + esc(content.message) + '</p>';
      } else if (content.status === 'error') {
        pane = '<p class="yc-attachment-preview-empty yc-attachment-preview-error">预览失败：' + esc(content.message) + '</p>';
      } else if (content.status === 'ready' && content.kind === 'image') {
        pane = '<img src="' + esc(content.objectUrl) + '" alt="' + esc(att.fileName) + '" />';
      } else if (content.status === 'ready' && content.kind === 'iframe') {
        pane = '<iframe src="' + esc(content.objectUrl) + '" title="' + esc(att.fileName) + '"></iframe>';
      } else if (content.status === 'ready' && content.kind === 'text') {
        pane = '<pre class="yc-attachment-preview-text">' + esc(content.text) + '</pre>';
      } else if (content.status === 'ready' && content.kind === 'html') {
        pane = '<div class="yc-attachment-preview-html">' + content.html + '</div>';
      } else {
        pane = '<p class="yc-attachment-preview-empty">准备预览…</p>';
      }
      let findings = '';
      if (att.analysis && Array.isArray(att.analysis.findings) && att.analysis.findings.length) {
        findings += '<ul class="yc-approve-inbox-findings">';
        for (const fd of att.analysis.findings) {
          findings += '<li>' + (fd.name ? '<strong>' + esc(fd.name) + '：</strong>' : '') + esc(fd.detail) + '</li>';
        }
        findings += '</ul>';
      }
      return '<div class="yc-attachment-preview-layer" role="presentation" data-attachment-preview-overlay>' +
        '<section class="yc-attachment-preview" role="dialog" aria-modal="true" aria-labelledby="attachmentPreviewTitle">' +
        '<header class="yc-attachment-preview-header"><strong class="yc-attachment-preview-title" id="attachmentPreviewTitle">' + icon('file') + '<span title="' + esc(att.fileName) + '">' + esc(att.fileName) + '</span></strong>' +
        '<button type="button" class="yc-attachment-preview-close" data-attachment-preview-close aria-label="关闭">' + icon('close') + '</button></header>' +
        '<div class="yc-attachment-preview-body">' +
        '<div class="yc-attachment-preview-stage"><div class="yc-attachment-preview-pane">' + pane + '</div></div>' +
        '<aside class="yc-attachment-preview-side">' +
        '<div class="yc-attachment-preview-meta">' +
        '<div><small>附件来源</small><strong>' + esc(att.sourceLabel || attachmentSourceInfo(att.source).label) + '</strong></div>' +
        '<div><small>文件类型</small><strong>' + esc(att.fileType || attachmentExt(att) || '-') + '</strong></div>' +
        '<div><small>文件大小</small><strong>' + esc(formatFileSize(att.size)) + '</strong></div>' +
        '<div><small>解析状态</small><strong>' + esc(att.error || (url ? '可预览' : '未缓存正文')) + '</strong></div>' +
        '</div>' +
        '<section class="yc-attachment-preview-insight"><h4>AI 分析</h4><p class="yc-attachment-preview-summary">' + esc(summary) + '</p>' +
        findings +
        '</section></aside>' +
        '</div><footer class="yc-attachment-preview-footer">' +
        (url ? '<a class="yc-attachment-preview-btn" href="' + esc(url) + '" target="_blank" rel="noopener">打开原文件</a>' +
          '<a class="yc-attachment-preview-btn" href="' + esc(url) + '" download="' + esc(att.fileName) + '">下载附件</a>' : '') +
        '<button type="button" class="yc-attachment-preview-btn" data-attachment-preview-close>关闭</button>' +
        '</footer></section></div>';
    }

    function renderYonClawChat() {
      if (!state.chatOpen) {
        return '<div class="yc-yonclaw-chat"><button type="button" class="yc-yonclaw-launcher" id="btnYonClawOpen" aria-label="打开 YonClaw 会话">' + icon('message') + '</button></div>';

      h += '<header><strong>YonClaw</strong><button type="button" id="btnYonClawClose" aria-label="关闭">' + icon('close') + '</button></header>';
      h += '<div class="yc-yonclaw-messages">';
      for (const msg of state.chatMessages) {
        h += '<article class="' + esc(msg.role) + '"><p>' + esc(msg.text) + '</p>';

        h += '</article>';

      h += '</section></div>';

    function submitYonClawMessage() {
      const input = document.getElementById('yonclawInput');
      const text = displayText(input && input.value).trim();
      if (!text) return;
      state.chatMessages.push({ role: 'user', text });
      const parsed = parseViewCommandText(text);
      if (parsed.ok) {
        const id = 'cmd-' + Date.now();
        state.pendingViewCommand = { id, patch: parsed.patch, summary: parsed.summary };
        state.chatMessages.push({ role: 'assistant', text: '我会这样调整：' + parsed.summary, commandId: id });
      } else {
        const forward = /交给\s*YonClaw|YonClaw\s*处理/.test(parsed.summary);
        if (forward) {
          sendPromptToHost(text);
          state.chatMessages.push({ role: 'assistant', text: '已发送给驾驶舱，正在转交 YonClaw 宿主会话。' });
        } else {
          state.chatMessages.push({ role: 'assistant', text: parsed.summary });
        }
      }
      render();
    }

    function applyPendingViewCommand() {
      const cmd = state.pendingViewCommand;
      if (!cmd) return;
      const patch = cmd.patch || {};
      if (patch.visibleColumns) state.visibleColumns = ensureRequiredColumns(patch.visibleColumns);
      if (patch.activeL1) state.activeL1 = patch.activeL1;
      if (patch.activeL2) state.activeL2 = patch.activeL2;
      if (patch.l2Mode) state.l2Mode = patch.l2Mode;
      state.pendingViewCommand = null;
      state.chatMessages.push({ role: 'assistant', text: '已应用：' + cmd.summary });
      state.selectedIds.clear();
      render();
    }
