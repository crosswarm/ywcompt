    function parseViewCommandText(input) {
      const compact = displayText(input).replace(/\s+/g, '');
      const ids = [...new Set(FIELD_ALIASES.filter(x => x.aliases.some(a => compact.includes(a))).map(x => x.id))];
      const patch = {};
      const summary = [];
      const wantsHide = /(隐藏|移除|删除|去掉|不显示|不要显示)/.test(compact);
      const wantsShow = /(显示|展示|增加|加入|加上|补充|打开)/.test(compact);
      if (ids.length && (wantsHide || wantsShow)) {
        patch.visibleColumns = wantsHide
          ? state.visibleColumns.filter(id => !ids.includes(id) || getColumn(id).locked)
          : [...new Set(state.visibleColumns.concat(ids))];
        if (!patch.visibleColumns.includes('actions')) patch.visibleColumns.push('actions');
        summary.push((wantsHide ? '隐藏 ' : '显示 ') + ids.map(id => getColumn(id).label).join('、'));
      }
      if (/(只看|筛选|过滤)/.test(compact)) {
        if (/(全部风险|所有风险)/.test(compact)) { patch.riskFilter = 'all'; summary.push('查看全部风险等级'); }
        else if (/(高风险|重要|拒绝)/.test(compact)) { patch.riskFilter = 'high'; summary.push('只看高风险任务'); }
        else if (/(需关注|中风险|谨慎)/.test(compact)) { patch.riskFilter = 'medium'; summary.push('只看需关注任务'); }
        else if (/(低风险|可通过)/.test(compact)) { patch.riskFilter = 'low'; summary.push('只看低风险任务'); }
      }
      if (/(已办|已处理)/.test(compact) && /(只看|切到|打开|显示)/.test(compact)) { patch.activeL1 = 'done'; summary.push('切到已办'); }
      if (/(待办|未处理)/.test(compact) && /(只看|切到|打开|显示)/.test(compact)) { patch.activeL1 = 'todo'; summary.push('切到待办'); }
      if (/(按类型|按业务|分组)/.test(compact)) { patch.activeL2 = 'all'; summary.push('按业务类型查看'); }
      if (summary.length) return { ok: true, summary: summary.join('，'), patch };
      return { ok: false, summary: /(字段|列|列表|表格|显示|隐藏)/.test(compact) ? '我还不能确定要调整哪个字段。' : '已收到，我会交给 YonWork 处理。' };
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return esc(iso);
      const p = (n) => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
    }

    function renderMeta(item) {
      const parts = [];
      if (item.submitter) parts.push('<span class="meta-item">' + esc(item.submitter) + '</span>');
      parts.push('<span class="meta-item" title="' + esc(item.receivedAtSourceLabel || '任务到手时间不可用') + '">' + (item.receivedAt ? ('任务到手 ' + formatDate(item.receivedAt)) : '任务到手时间不可用') + '</span>');
      // 跨租户徽标（提示该单据属于其他租户，需切换租户）
      let tenantTag = '';
      if (item.crossTenant && item.tenantName) {
        tenantTag = '<span class="yc-approve-inbox-tenant-tag" title="属于其他租户，需在 YonBIP 切换租户后查看">' + esc(item.tenantName) + '</span>';
      }
      // 审批建议 tag（与提交人·时间同行，右侧，tag 感，区别于审批按钮）
      let adviceTag = '';
      if (item.advice && ADVICE_LABEL[item.advice]) {
        adviceTag = '<span class="yc-approve-inbox-advice-tag yc-approve-inbox-advice-tag-' + item.advice + '">' + ADVICE_LABEL[item.advice] + '</span>';
      }
      const processing = approvalProcessing(item);
      if (processing) {
        const label = processing.state === 'needs_review' ? '待核对' : '处理中';
        const phaseLabel = approvalPhaseLabel(processing);
        const duration = Number(processing.durationMs);
        const durationLabel = Number.isFinite(duration) && duration >= 0 ? ('，耗时 ' + Math.ceil(duration / 1000) + ' 秒') : '';
        adviceTag += '<span class="yc-approve-inbox-advice-tag yc-approve-inbox-advice-tag-attention" title="' + esc(phaseLabel + durationLabel + '；处理完成前不可重复审批') + '">' + label + ' · ' + esc(phaseLabel) + '</span>';
      }
      if (!parts.length && !adviceTag && !tenantTag) return '';
      return '<div class="yc-approve-inbox-row-meta">' + parts.join('<span class="meta-sep">·</span>') + tenantTag + adviceTag + '</div>';
    }

    function renderSmartTags(tags) {
      if (!tags || !tags.length) return '';
      const visible = tags.slice(0, 3);
      const overflow = tags.length - visible.length;
      let h = '<div class="yc-approve-inbox-tags">';
      for (const t of visible) {
        h += '<span class="yc-approve-inbox-tag yc-approve-inbox-tag-' + (t.kind || 'default') + '">' + esc(t.label) + '</span>';
      }
      if (overflow > 0) h += '<span class="yc-approve-inbox-tag yc-approve-inbox-tag-overflow">+' + overflow + '</span>';
      return h + '</div>';
    }

    function renderRowActions(item) {
      if (interactionsBlocked() || approvalProcessing(item)) return '';
      const actions = (item.runtimeActions || []).filter(a => a.enabled !== false);
      if (!actions.length) return '';
      const visibleActions = actions.slice(0, 2);
      const overflowActions = actions.slice(2);
      let h = '<div class="yc-native-row-actions">';
      for (const action of visibleActions) {
        h += '<button type="button" class="yc-native-row-action" data-act="' + esc(action.action) + '" data-id="' + esc(item.id) + '"' +
          (action.displayOnly ? ' data-display-only="true"' : '') + '>' + esc(action.label || action.action) + '</button>';
      }
      if (overflowActions.length) {
        h += '<details class="yc-native-action-more" data-action-menu><summary>更多' + icon('chevronDown') + '</summary><div class="yc-native-action-more-menu">';
        for (const action of overflowActions) {
          h += '<button type="button" class="yc-native-row-action" data-act="' + esc(action.action) + '" data-id="' + esc(item.id) + '"' +
            (action.displayOnly ? ' data-display-only="true"' : '') + '>' + esc(action.label || action.action) + '</button>';
        }
        h += '</div></details>';
      }
      return h + '</div>';
    }

    function hasAction(item, action) {
      if (interactionsBlocked() || approvalProcessing(item)) return false;
      const actions = Array.isArray(item && item.runtimeActions) ? item.runtimeActions : [];
      return actions.some(a => {
        if (!a || a.enabled === false || a.displayOnly) return false;
        if (action === 'approve') return a.action === 'approve' || a.callBackExecType === 'agree';
        return a.action === 'reject' || a.action === 'return' || a.callBackExecType === 'reject';
      });
    }

    function currentItem() {
      return (state.data && state.data.items || []).find(i => i.id === state.activeItemId) || null;
    }

    function detailNavigationState() {
      const items = state.data ? filterItems(state.data.items, state.activeL1, state.activeL2, state.riskFilter) : [];
      const index = items.findIndex(i => i.id === state.activeItemId);
      return {
        index,
        total: items.length,
        prevId: index > 0 ? items[index - 1].id : '',
        nextId: index >= 0 && index < items.length - 1 ? items[index + 1].id : ''
      };
    }

    function columnPixelWidth(column) {
      if (typeof column.width === 'number') return column.width;
      const parsed = Number.parseInt(String(column.width || ''), 10);
      if (Number.isFinite(parsed)) return parsed;
      return column.id === 'title' ? 320 : column.id === 'actions' ? 150 : 120;
    }

    function orderedColumnsForMenu() {
      const draft = state.draftVisibleColumns.length ? state.draftVisibleColumns : state.visibleColumns;
      const visible = draft.map(getColumn);
      const visibleIds = new Set(draft);
      return visible.concat(allColumns().filter(column => !visibleIds.has(column.id)));
    }

    function toggleNativeColumn(id) {
      const column = getColumn(id);
      if (column.locked) return;
      const draft = state.draftVisibleColumns.length ? state.draftVisibleColumns : state.visibleColumns;
      state.draftVisibleColumns = draft.includes(id)
        ? draft.filter(columnId => columnId !== id)
        : draft.slice(0, -1).concat(id, 'actions');
      render();
    }

    function moveNativeColumn(id, direction) {
      const draft = state.draftVisibleColumns.length ? state.draftVisibleColumns : state.visibleColumns;
      const from = draft.indexOf(id);
      const to = from + direction;
      if (from < 1 || to < 1 || to >= draft.length - 1 || getColumn(id).locked) return;
      const next = draft.slice();
      [next[from], next[to]] = [next[to], next[from]];
      state.draftVisibleColumns = next;
      render();
    }

    function openNativeColumnMenu() {
      state.columnMenuOpen = true;
      state.draftVisibleColumns = state.visibleColumns.slice();
      state.columnSearch = '';
      render();
    }

    function cancelNativeColumnMenu() {
      state.columnMenuOpen = false;
      state.draftVisibleColumns = [];
      state.columnSearch = '';
      render();
    }

    function confirmNativeColumnMenu() {
      state.userColumnTouched = true;
      state.visibleColumns = ensureRequiredColumns(state.draftVisibleColumns);
      state.columnMenuOpen = false;
      state.draftVisibleColumns = [];
      state.columnSearch = '';
      render();
    }

    function resetNativeColumnMenu() {
      const ids = configuredColumnIdsForItems(currentItemsForColumns());
      state.draftVisibleColumns = ensureRequiredColumns(ids.length ? ids : COLUMN_DEFS.filter(column => column.locked || ['submitter', 'receivedAt', 'docType', 'advice', 'attachments'].includes(column.id)).map(column => column.id));
      render();
    }

    function setNativeSort(id, direction) {
      if (state.sortColumn === id && state.sortDirection === direction) {
        state.sortColumn = '';
        state.sortDirection = 'none';
      } else {
        state.sortColumn = id;
        state.sortDirection = direction === 'desc' ? 'desc' : 'asc';
      }
      render();
    }

    function sortNativeItems(items) {
      if (!state.sortColumn || state.sortDirection === 'none') return items.slice();
      const direction = state.sortDirection === 'desc' ? -1 : 1;
      return items.slice().sort((left, right) => {
        const leftValue = fieldText(left, state.sortColumn);
        const rightValue = fieldText(right, state.sortColumn);
        return String(leftValue || '').localeCompare(String(rightValue || ''), 'zh-CN', { numeric: true }) * direction;
      });
    }

    function renderNativeColumnMenu(location) {
      const draft = state.draftVisibleColumns.length ? state.draftVisibleColumns : state.visibleColumns;
      const keyword = state.columnSearch.trim().toLocaleLowerCase();
      const menuColumns = orderedColumnsForMenu().filter(column => !column.locked && (!keyword || String(column.label).toLocaleLowerCase().includes(keyword)));
      const tableClass = location === 'table' ? ' yc-native-column-control-table' : '';
      let h = '<div class="yc-native-column-control' + tableClass + '">' +
        '<button type="button" class="yc-native-table-settings-trigger" id="btnNativeColumns" title="列设置" aria-label="列设置" aria-expanded="' + state.columnMenuOpen + '">' + icon('columns') + '</button>' +
        '<div class="yc-native-column-menu" id="nativeColumnMenu" role="dialog" aria-label="列设置"' + (state.columnMenuOpen ? '' : ' hidden') + '>' +
        '<div class="yc-native-column-menu-search"><span>' + icon('search') + '</span><input id="nativeColumnSearch" value="' + esc(state.columnSearch) + '" placeholder="搜索列"></div>' +
        '<div class="yc-native-column-menu-content">';
      for (const column of menuColumns) {
        const visible = draft.includes(column.id);
        const index = draft.indexOf(column.id);
        h += '<div class="yc-native-column-item"><label>' +
          '<input type="checkbox" data-column-toggle="' + esc(column.id) + '"' + (visible ? ' checked' : '') + (column.locked ? ' disabled' : '') + '>' +
          '<span>' + esc(column.label) + '</span></label><span class="yc-native-column-order">' +
          '<button type="button" data-column-move="up" data-column-id="' + esc(column.id) + '" title="上移"' + (!visible || index <= 1 || column.locked ? ' disabled' : '') + '>' + icon('chevronUp') + '</button>' +
          '<button type="button" data-column-move="down" data-column-id="' + esc(column.id) + '" title="下移"' + (!visible || index < 1 || index >= draft.length - 2 || column.locked ? ' disabled' : '') + '>' + icon('chevronDown') + '</button>' +
          '</span></div>';
      }
      if (!menuColumns.length) h += '<p class="yc-native-column-empty">暂无匹配列</p>';
      return h + '</div><div class="yc-native-column-menu-footer"><button type="button" class="text" data-column-reset>重置</button><span></span><button type="button" data-column-cancel>取消</button><button type="button" class="primary" data-column-confirm>确定</button></div></div></div>';
    }

    function renderMessageList(items, toolbarHtml) {
      const sorted = sortNativeItems(items);
      const selectable = sorted.filter(item => hasAction(item, 'approve') || hasAction(item, 'return'));
      const selectedCount = selectable.filter(item => state.selectedIds.has(item.id)).length;
      const allSelected = selectable.length > 0 && selectedCount === selectable.length;
      const coreFieldIds = new Set(['title', 'actions', 'submitter', 'receivedAt', 'submittedAt', 'docType']);
      const extraFieldIds = state.visibleColumns.filter(id => !coreFieldIds.has(id));
      const listItems = sorted.map(item => {
        const business = businessName(item);
        const submitter = displayText(item.submitter);
        const receivedAt = item.receivedAt ? ('任务到手 ' + formatDate(item.receivedAt)) : '任务到手时间不可用';
        const submittedAt = item.submittedAt ? ('提交 ' + formatDate(item.submittedAt)) : '';
        return {
          id: item.id,
          title: item.title,
          riskLevel: item.riskLevel,
          business,
          submitter,
          submittedAt,
          taskMeta: [business, submitter, receivedAt, submittedAt].filter(Boolean).join(' · '),
          extraFields: extraFieldIds.map(id => ({
            id,
            label: getColumn(id).label,
            value: fieldText(item, id),
            tone: id === 'advice' ? item.advice : (id === 'riskLevel' ? item.riskLevel : ''),
            tags: id === 'tags' && Array.isArray(item.smartTags)
              ? item.smartTags.map(tag => ({
                  label: displayText(tag && (tag.label || tag.name || tag.value || tag)),
                  kind: displayText(tag && tag.kind)
                })).filter(tag => tag.label)
              : []
          })).filter(field => field.value),
          tenantName: item.crossTenant ? displayText(item.tenantName) : '',
          actionsHtml: renderRowActions(item),
          done: state.activeL1 === 'done',
          unread: !state.readItemIds.has(item.id),
          selected: state.selectedIds.has(item.id),
          active: item.id === state.activeItemId,
          canSelect: hasAction(item, 'approve') || hasAction(item, 'return')
        };
      });
      return window.ApproveInboxMessageList.render({
        items: listItems,
        allSelected,
        selectableCount: selectable.length,
        toolbarHtml,
        emptyText: state.activeL1 === 'done' ? '暂无已办' : '暂无待办',
        aiIconHtml: localIcon('AI_star'),
        escapeHtml: esc
      });
    }

    function sortByReceivedAt(items) {
      return (items || []).map((item, index) => ({ item, index })).sort((a, b) => {
        const at = a.item.receivedAt ? new Date(a.item.receivedAt).getTime() : NaN;
        const bt = b.item.receivedAt ? new Date(b.item.receivedAt).getTime() : NaN;
        const am = Number.isNaN(at);
        const bm = Number.isNaN(bt);
        if (am !== bm) return am ? 1 : -1;
        if (am) return a.index - b.index;
        return (bt - at) || (a.index - b.index);
      }).map(entry => entry.item);
    }

    /** 按当前筛选子集（L1+L2 后的 visible）实时算总结，切维度即不同 */
    function buildTabSummary(visible, scope, dimLabel) {
      if (!visible || !visible.length) return null;
      const risk = { high: 0, medium: 0, low: 0 };
      const typeMap = {};
      let approved = 0, rejected = 0, attention = 0;
      for (const i of visible) {
        if (risk[i.riskLevel] != null) risk[i.riskLevel]++;
        const t = businessName(i); typeMap[t] = (typeMap[t] || 0) + 1;
        if (i.advice === 'approve') approved++;
        if (i.advice === 'reject') rejected++;
        if (i.advice === 'caution' || i.riskLevel === 'medium') attention++;
      }
      const types = Object.entries(typeMap).sort((a, b) => b[1] - a[1]);
      const top = types[0];
      const dim = dimLabel && dimLabel !== '全部' ? dimLabel : '';
      if (scope === 'done') {
        const rate = visible.length ? Math.round((approved / visible.length) * 100) : 0;
        const analysis = `${dim ? '「' + dim + '」' : ''}已办 ${visible.length} 件，通过 ${approved} 件、驳回 ${rejected} 件，通过率 ${rate}%。` +
          (risk.high ? `重要 ${risk.high} 件已处置。` : '') +
          (top ? `类型以「${top[0]}」最多（${top[1]} 件）。` : '');
        return { scope: 'done', total: visible.length, approvedCount: approved, rejectedCount: rejected, riskDistribution: risk, highlights: [{ label: '通过率', value: rate + '%' }], analysis };
      }
      const analysis = `${dim ? '「' + dim + '」' : ''}待办 ${visible.length} 项，` +
        (risk.high ? `重要 ${risk.high} 项需优先处理，` : '') +
        `需关注 ${attention} 项。` +
        (top ? `类型以「${top[0]}」最多（${top[1]} 项）。` : '');
      return { scope: 'pending', total: visible.length, riskDistribution: risk, analysis };
    }

    function renderReviewSummary(rs) {
      if (!rs) return '';
      let h = '<section class="yc-approve-inbox-review-summary yc-chart-insight">';
      const title = rs.scope === 'pending' ? '待办智能速览' : '已办智能总结';
      h += '<div class="review-summary-head"><span class="yc-message-center-ai-icon">' + localIcon('AI_star') + '</span><span>' + title + '</span>' +
        (rs.period ? '<span class="period">' + esc(rs.period) + '</span>' : '') + '</div>';
      // 待办速览：去掉统计行（与 tab 数字重复），只留分析；已办：保留通过率等独有统计
      if (rs.scope !== 'pending') {
        h += '<div class="review-summary-stats yc-metric-list detail-metrics">';
        if (rs.approvedCount != null) h += '<section class="stat yc-metric detail-metric detail-metric--success stat-approve"><span class="detail-metric-label">通过</span><strong class="detail-metric-value">' + rs.approvedCount + '</strong></section>';
        if (rs.rejectedCount != null) h += '<section class="stat yc-metric detail-metric detail-metric--danger stat-reject"><span class="detail-metric-label">驳回</span><strong class="detail-metric-value">' + rs.rejectedCount + '</strong></section>';
        if (rs.returnedCount) h += '<section class="stat yc-metric detail-metric detail-metric--warning stat-return"><span class="detail-metric-label">退回</span><strong class="detail-metric-value">' + rs.returnedCount + '</strong></section>';
        if (rs.highlights) for (const hl of rs.highlights) h += '<section class="stat yc-metric detail-metric detail-metric--info"><span class="detail-metric-label">' + esc(hl.label) + '</span><strong class="detail-metric-value">' + esc(hl.value) + '</strong></section>';
        h += '</div>';
      }
      if (rs.analysis) h += '<p class="review-summary-analysis">' + esc(rs.analysis) + '</p>';
      return h + '</section>';
    }

    function renderList() {
      const data = state.data;
      if (!data) return '<div class="yc-native-table-loading" role="status">正在加载待办…</div>';
      const items = data.items;
      // L1 计数
      const l1Counts = {
        todo: filterItems(items, 'todo', 'all').length,
        done: filterItems(items, 'done', 'all').length,
      };
      // L2 固定展示单据类型，风险等级由右侧下拉独立筛选
      const l2Tabs = docTypeTabs(items, state.activeL1);
      // 容错：当前 activeL2 不在选项里则回退 all
      if (!l2Tabs.some(t => t.id === state.activeL2)) state.activeL2 = 'all';
      const visible = sortByReceivedAt(filterItems(items, state.activeL1, state.activeL2, state.riskFilter));
      syncVisibleColumnsForItems(visible);

      const curTenant = data.meta && data.meta.currentTenantName;
      // 待分析数：当前可取（非跨租户）voucher 单据里，分析未完成的（漏跑/旧模板残缺）
      const pendingAnalysis = filterItems(items, state.activeL1, 'all')
        .filter(i => i.voucher && !i.crossTenant && i.analyzed === false).length;
      const selectedVisible = visible.filter(i => state.selectedIds.has(i.id));
      const selectedRiskOption = RISK_FILTER_OPTIONS.find(option => option.id === state.riskFilter) || RISK_FILTER_OPTIONS[0];

      // ── L1 行 ──
      let h = '<p class="yc-approve-inbox-customization-hint" role="note">可在 YonWork 对话中定制智能待办列表、详情页面与智能审核规则</p>' +
        '<header class="yc-approve-inbox-header">';
      h += '<div class="yc-approve-inbox-header-row yc-approve-inbox-header-primary">';
      h += '<div class="yc-approve-inbox-tabs-l1" role="tablist" data-tab-focus-scope="l1">';
      for (const t of TABS_L1) {
        h += '<button type="button" class="yc-approve-inbox-tab-l1' + (state.activeL1 === t.id ? ' yc-approve-inbox-tab-l1-active' : '') + '" data-l1="' + t.id + '" role="tab" aria-selected="' + (state.activeL1 === t.id ? 'true' : 'false') + '">' +
          t.label + '<span class="count">' + l1Counts[t.id] + '</span></button>';
      }
      h += '</div>';
      h += '<label class="yc-mail-search-inline">' + icon('search') +
        '<input id="mailSearch" value="' + esc(state.query) + '" placeholder="检索标题、提交人、业务、AI建议">' +
      '</label>';
      h += '</div>';
      // ── L2 行 + 风险等级筛选 ──
      h += '<div class="yc-approve-inbox-header-row yc-approve-inbox-header-secondary">';
      h += '<div class="yc-approve-inbox-tabs-l2" role="tablist" data-tab-focus-scope="l2">';
      for (const t of l2Tabs) {
        const cnt = filterItems(items, state.activeL1, t.id, state.riskFilter).length;
        h += '<button type="button" class="yc-approve-inbox-tab-l2' + (state.activeL2 === t.id ? ' yc-approve-inbox-tab-l2-active' : '') + '" data-l2="' + esc(t.id) + '" role="tab" aria-selected="' + (state.activeL2 === t.id ? 'true' : 'false') + '">' +
          esc(t.label) + (t.id !== 'all' ? '<span class="count">' + cnt + '</span>' : '') + '</button>';
      }
      h += '</div>';
      // ── 工具栏 ──
      const selectedApprovable = selectedVisible.filter(i => hasAction(i, 'approve'));
      h += '<div class="yc-approve-inbox-toolbar yc-approve-inbox-filter-tools">' +
        '<details class="yc-approve-inbox-risk-select">' +
          '<summary class="yc-approve-inbox-risk-trigger" id="riskFilter" aria-label="风险等级">' +
            '<span>' + esc(selectedRiskOption.label) + '</span>' + icon('chevronDown') +
          '</summary>' +
          '<div class="yc-approve-inbox-risk-menu" role="listbox" aria-label="风险等级">' +
            RISK_FILTER_OPTIONS.map(option => '<button type="button" class="yc-approve-inbox-risk-option' + (state.riskFilter === option.id ? ' yc-approve-inbox-risk-option-active' : '') + '" role="option" aria-selected="' + (state.riskFilter === option.id ? 'true' : 'false') + '" data-risk-filter="' + esc(option.id) + '">' +
              '<span>' + esc(option.label) + '</span>' + (state.riskFilter === option.id ? icon('check') : '') +
            '</button>').join('') +
          '</div>' +
        '</details>' +
      '</div></div></header>';

      const listToolbarHtml = '<button type="button" class="yc-approve-inbox-tenant-toggle' + (state.currentTenantOnly ? ' on' : '') + '" id="btnTenantToggle" ' +
        'role="switch" aria-checked="' + (state.currentTenantOnly ? 'true' : 'false') + '" ' +
        'title="' + (curTenant ? ('当前租户：' + esc(curTenant) + '；关闭后显示其他租户') : '关闭后显示其他租户') + '">' +
        '<span class="yc-approve-inbox-tenant-switch" aria-hidden="true"></span><span class="yc-approve-inbox-tenant-toggle-label">仅显示当前租户</span>' +
      '</button>' +
      '<button type="button" class="yc-approve-inbox-toolbar-icon" id="btnColumns" title="自定义字段" aria-label="自定义字段">' + icon('columns') + '</button>' +
      renderNativeColumnMenu('list') +
      (state.activeL1 === 'todo'
        ? '<button type="button" class="btn btn-primary yc-approve-inbox-batch-approve" id="btnBatch"' +
            (selectedApprovable.length === 0 || interactionsBlocked() ? ' disabled' : '') + '>批量同意' +
            (selectedApprovable.length > 0 ? '（' + selectedApprovable.length + '）' : '') + '</button>'
        : '') +
      (pendingAnalysis > 0
        ? '<button type="button" class="yc-approve-inbox-reanalyze-pending" id="btnReanalyzePending" title="重新分析" aria-label="对分析未完成的单据后台批量重新分析"' +
            (interactionsBlocked() ? ' disabled' : '') + '>' + icon('bot') + '重新分析</button>'
        : '');

      if (state.columnPanelOpen) {
        h += '<section class="yc-mail-column-panel">';
        h += '<div class="yc-mail-column-list">';
        for (const col of allColumns()) {
          const visible = state.visibleColumns.includes(col.id);
          const orderIndex = state.visibleColumns.indexOf(col.id);
          h += '<div class="yc-mail-column-item' + (col.locked ? ' locked' : '') + '">' +
            '<label class="yc-mail-column-toggle"><input type="checkbox" data-col="' + esc(col.id) + '"' + (visible ? ' checked' : '') + (col.locked ? ' disabled' : '') + '><span>' + esc(col.label) + '</span></label>' +
            '<div class="yc-mail-column-order">' +
              '<button type="button" data-col-up="' + esc(col.id) + '" title="上移"' + (!visible || orderIndex <= 1 || col.locked ? ' disabled' : '') + '>' + icon('chevronUp') + '</button>' +
              '<button type="button" data-col-down="' + esc(col.id) + '" title="下移"' + (!visible || orderIndex < 0 || orderIndex >= state.visibleColumns.length - 1 || col.locked ? ' disabled' : '') + '>' + icon('chevronDown') + '</button>' +
            '</div>' +
          '</div>';
        }
        h += '</div>';
        h += '<div class="yc-mail-column-custom">' +
          '<label class="yc-mail-column-field"><span>字段名称</span><input id="customColumnLabel" placeholder="合同金额"></label>' +
          '<label class="yc-mail-column-field"><span>字段路径</span><input id="customColumnPath" placeholder="summary.amount"></label>' +
          '<button type="button" id="btnAddCustomColumn">新增字段</button>' +
        '</div>';
        h += '</section>';
      }

      // ── 列表（每个 tab 顶部 AI 总结）──
      h += '<div class="yc-approve-inbox-list yc-mail-list">';
      const dimLabel = (l2Tabs.find(t => t.id === state.activeL2) || {}).label;
      const tabSummary = buildTabSummary(visible, state.activeL1 === 'done' ? 'done' : 'pending', dimLabel);
      if (tabSummary) h += renderReviewSummary(tabSummary);
      h += renderMessageList(visible, listToolbarHtml);
      h += '</div>';

      if (state.selectedIds.size > 0) {
        h += '<footer class="yc-approve-inbox-selection-bar"><span>已选 ' + state.selectedIds.size + ' 条</span><button type="button" id="btnClearSel">清空</button></footer>';
      }
      return h;
    }

    /* ========== 渲染：详情 5 段 ========== */
    function sevDot(s) { return 'yc-approve-inbox-dot ' + (s ? 'yc-approve-inbox-dot-' + s : 'yc-approve-inbox-dot-default'); }
    function sevTag(s) { return 'yc-approve-inbox-severity ' + (s ? 'yc-approve-inbox-severity-' + s : 'yc-approve-inbox-severity-default'); }
    function semanticToneForSeverity(s) { return SEVERITY_TONE[s] || 'default'; }
    function originalDetailUrl(d) {
      const raw = displayText(d && d.originalUrl);
      if (!raw) return '';
      try {
        const url = new URL(raw);
        return (url.protocol === 'http:' || url.protocol === 'https:') ? url.toString() : '';
      } catch (_) {
        return '';
      }
    }

    function resetDetailFieldExpansion() {
      state.detailFieldExpansion = { basic: false, raw: false };
    }

    function renderDetailFieldToggle(scope, total, expanded) {
      if (total <= DETAIL_FIELD_PREVIEW_LIMIT) return '';
      return '<button type="button" class="yc-approve-inbox-field-toggle" data-detail-field-toggle="' + scope + '" aria-expanded="' + expanded + '">' +
        '<span>' + (expanded ? '收起字段' : '查看更多') + '</span>' + localIcon('uf-anglearrowdown') + '</button>';
    }

    function renderConfiguredDetailSections(d) {
      const sections = Array.isArray(d && d.detailCardSections) ? d.detailCardSections : [];
      if (!sections.length) return '';
      let h = '';
      for (const section of sections) {
        const fields = (section.fields || []).filter(f => displayText(f && f.value));
        if (!fields.length) continue;
        const title = esc(section.title || '关键字段');
        const note = displayText(section.note);
        const kind = esc(section.kind || 'default');
        const isBasicSection = (section.title || '') === '基本信息';
        const expanded = isBasicSection && state.detailFieldExpansion.basic;
        const visibleFields = isBasicSection && !expanded ? fields.slice(0, DETAIL_FIELD_PREVIEW_LIMIT) : fields;
        let fieldHtml = '<div class="yc-approve-inbox-rawfields yc-approve-inbox-config-fields">';
        for (const f of visibleFields) {
          const fv = displayText(f.value);
          fieldHtml += '<div class="rf-row' + (f.full ? ' full' : '') + '" title="' + esc(f.reason || '') + '"><span class="rf-k" title="' + esc(f.label) + '">' + esc(f.label || f.id || '字段') + '</span><span class="rf-v" title="' + esc(fv) + '">' + esc(fv) + '</span></div>';
        }
        fieldHtml += '</div>';
        const fieldToggleHtml = isBasicSection ? renderDetailFieldToggle('basic', fields.length, expanded) : '';
        if (section.collapsed) {
          h += '<details class="yc-approve-inbox-detail-section yc-approve-inbox-detail-section-collapsible yc-approve-inbox-detail-section-' + kind + '"><summary class="yc-approve-inbox-section-summary"><span class="yc-approve-inbox-section-title">' + title + '</span><span class="yc-approve-inbox-section-count">' + fields.length + '</span></summary>' + (note ? '<p class="yc-approve-inbox-section-note">' + esc(note) + '</p>' : '') + fieldHtml + fieldToggleHtml + '</details>';
        } else {
          h += '<section class="yc-approve-inbox-detail-section yc-approve-inbox-detail-section-' + kind + '"><h4 class="yc-approve-inbox-section-title">' + title + '</h4>' + (note ? '<p class="yc-approve-inbox-section-note">' + esc(note) + '</p>' : '') + fieldHtml + fieldToggleHtml + '</section>';
        }
      }
      return h;
    }

    function detailLoadingPlaceholder(id) {
      const item = (state.data && state.data.items || []).find(entry => entry.id === id) || {};
      return {
        _loading: true,
        id,
        title: item.title || '审批单据详情',
        originalUrl: item.originalUrl || item.webUrl || '',
        dataSource: 'loading',
      };
    }

    function renderDetail(d) {
      if (!d) return '';
      const nav = detailNavigationState();
      const originalUrl = originalDetailUrl(d);
      d._canReanalyze = !interactionsBlocked() && d.dataSource === 'real' && !d.crossTenant && !d.unsupportedType;
      let detailActionsHtml = '';
      if (!d._loading && d.id && !interactionsBlocked()) {
        const item = currentItem();
        const actions = (item && item.runtimeActions || []).filter(a => a.enabled !== false && !a.displayOnly);
        detailActionsHtml = '<div class="yc-approve-inbox-detail-actions" aria-label="单据操作">';
        for (const action of actions) {
          const cls = action.action === 'approve' ? ' yc-approve-inbox-detail-btn-approve' : '';
          detailActionsHtml += '<button type="button" class="yc-approve-inbox-detail-btn' + cls + '" data-detail-act="' + esc(action.action) + '">' + esc(action.label || action.action) + '</button>';
        }
        detailActionsHtml += '</div>';
      }
      let h = '<aside class="yc-approve-inbox-detail"' + (d._loading ? ' aria-busy="true"' : '') + '>';
      h += '<header class="yc-approve-inbox-detail-header"><strong class="yc-approve-inbox-detail-title">' + esc(d.title || '审批单据详情') + '</strong>' +
        detailActionsHtml +
        '<div class="yc-approve-inbox-detail-nav" aria-label="详情快捷导航">' +
          (!d._loading ? '<span class="yc-approve-inbox-detail-nav-pair" aria-label="上下条导航">' +
            '<button type="button" class="yc-approve-inbox-detail-nav-btn" data-detail-nav="prev" title="上一条" aria-label="上一条"' + (!nav.prevId ? ' disabled' : '') + '>' + localIcon('left') + '</button>' +
            '<button type="button" class="yc-approve-inbox-detail-nav-btn" data-detail-nav="next" title="下一条" aria-label="下一条"' + (!nav.nextId ? ' disabled' : '') + '>' + localIcon('right') + '</button>' +
          '</span>' : '') +
          (!d._loading && originalUrl ? '<a class="yc-approve-inbox-detail-nav-btn" href="' + esc(originalUrl) + '" target="_blank" rel="noopener noreferrer" data-original-detail-url="1" title="打开原始单据" aria-label="打开原始单据">' + localIcon('ynf-external-link') + '</a>' : '') +
          (!d._loading && d._canReanalyze ? '<button type="button" class="yc-approve-inbox-detail-btn yc-approve-inbox-detail-btn-icon" data-detail-act="reanalyze" title="' +
            (state.detailEnriching ? '正在分析…' : '重新分析本单') + '" aria-label="' +
            (state.detailEnriching ? '正在分析' : '重新分析本单') + '"' + (state.detailEnriching ? ' disabled' : '') + '>' + localIcon('ynf-refresh') + '</button>' : '') +
          '<button type="button" class="yc-approve-inbox-detail-close" id="btnCloseDetail" aria-label="关闭">' + localIcon('uf-close') + '</button>' +
        '</div></header>' +
        '<p class="yc-approve-inbox-customization-hint" role="note">可在 YonWork 对话中定制智能待办列表、详情页面与智能审核规则</p>';

      if (d._loading) {
        return h + '<div class="yc-approve-inbox-detail-loading">正在加载详情…</div></aside>';
      }

      // ── 四态状态判定 ──
      const cross = d.crossTenant;
      const unsupported = d.unsupportedType;
      const notFound = d.unavailableReason === 'not_found';
      const hasFields = !!(d.fields && d.fields.length);
      const analyzed = !!d.analyzed;
      // 是否可「重新分析本单」：真实数据、非跨租户、非不支持类型

      if (state.detailEnriching) {
        h += '<div class="yc-approve-inbox-fallback-notice yc-approve-inbox-enriching">' + icon('bot') + '<span>正在抓取真实单据字段并分析…</span></div>';
      } else if (cross) {
        h += '<div class="yc-approve-inbox-fallback-notice">' + icon('bot') + '<span>属于其他租户' + (d.tenantName ? '『' + esc(d.tenantName) + '』' : '') + '，当前登录态无权读取真实字段。请在 YonBIP 切换到该租户后查看。</span></div>';
      } else if (unsupported) {
        h += '<div class="yc-approve-inbox-fallback-notice">' + icon('bot') + '<span>暂不支持的单据类型（非标准 MDF 单据），无法抓取结构化字段。</span></div>';
      } else if (notFound && !hasFields) {
        h += '<div class="yc-approve-inbox-fallback-notice">' + icon('bot') + '<span>单据数据未找到（可能已被处理或撤回）。</span></div>';
      } else if (d.dataSource === 'real' && !analyzed) {
        h += '<div class="yc-approve-inbox-fallback-notice">' + icon('bot') + '<span>' + (hasFields ? '已抓取真实字段，AI 分析未完成，可点刷新按钮重试。' : '尚未抓取真实字段，可点刷新按钮。') +
          (d.analysisError ? ('（' + esc(d.analysisError) + '）') : '') + '</span></div>';
      } else if (d.source === 'fallback' || d.dataSource === 'fallback') {
        h += '<div class="yc-approve-inbox-fallback-notice">' + icon('bot') + '<span>AI 兜底 · 仅供参考</span></div>';
      }

      h += '<div class="yc-approve-inbox-detail-body">';

      // ① 智能建议：合并审批建议与总体分析，复用待办智能速览的 AI 洞察卡片
      const hasSmartAdvice = analyzed || d.compositeAdvice || (d.systemRuleAudit && d.systemRuleAudit.status === 'success');
      if (hasSmartAdvice || d.overallAnalysis) {
        const composite = d.compositeAdvice || {};
        const adv = composite.advice || (d.conclusion ? d.conclusion.advice : 'caution');
        h += '<section class="yc-approve-inbox-detail-insight yc-chart-insight yc-approve-inbox-detail-insight-' + adv + '">';
        if (hasSmartAdvice) {
          h += '<div class="review-summary-head yc-approve-inbox-detail-advice-head">' +
            smartAdviceIcon() + '<strong class="yc-approve-inbox-detail-advice yc-approve-inbox-detail-advice-' + adv + '">' +
            esc(composite.label || (d.conclusion && d.conclusion.label) || ADVICE_LABEL[adv]) + '</strong></div>';
        }
        if (d.overallAnalysis) h += '<p class="review-summary-analysis yc-approve-inbox-detail-insight-analysis">' + esc(d.overallAnalysis) + '</p>';
        h += '</section>';
      }

      h += renderSystemRuleAudit(d);

      const configuredDetailSectionsHtml = renderConfiguredDetailSections(d);
      h += configuredDetailSectionsHtml;

      // ⓪ 单据字段（真实字段值，enrich 后有）
      const rawFields = (d.fields || []).filter(f => displayText(f && f.value));
      if (!configuredDetailSectionsHtml && rawFields.length) {
        const rawExpanded = state.detailFieldExpansion.raw;
        const visibleRawFields = rawExpanded ? rawFields : rawFields.slice(0, DETAIL_FIELD_PREVIEW_LIMIT);
        h += '<section class="yc-approve-inbox-detail-section"><h4 class="yc-approve-inbox-section-title">单据字段</h4><div class="yc-approve-inbox-rawfields">';
        for (const f of visibleRawFields) {
          const fv = displayText(f.value);
          h += '<div class="rf-row"><span class="rf-k" title="' + esc(f.name || f.key) + '">' + esc(f.name || f.key || '未命名字段') + '</span><span class="rf-v" title="' + esc(fv) + '">' + esc(fv) + '</span></div>';
        }
        h += '</div>' + renderDetailFieldToggle('raw', rawFields.length, rawExpanded) + '</section>';
      }

      // ③ 单据字段分析
      if (d.fieldAnalysis && d.fieldAnalysis.length) {
        h += '<section class="yc-approve-inbox-detail-section"><h4 class="yc-approve-inbox-section-title">信息分析</h4><div class="yc-approve-inbox-field-list yc-semantic-list">';
        for (const f of d.fieldAnalysis) {
          h += '<article class="yc-approve-inbox-field-row yc-semantic-list-row" data-tone="' + semanticToneForSeverity(f.severity) + '"><i class="' + sevDot(f.severity) + ' yc-semantic-marker"></i>' +
            '<div class="yc-approve-inbox-field-content yc-semantic-content"><div class="yc-approve-inbox-field-head yc-semantic-head analysis-card-head">' +
            '<span class="yc-approve-inbox-field-name analysis-card-title">' + esc(f.name + (f.value ? '：' + f.value : '')) + '</span>' +
            (f.severity ? '<span class="tag tag-' + semanticToneForSeverity(f.severity) + ' yc-semantic-row-tag yc-approve-inbox-tag">' + SEVERITY_LABEL[f.severity] + '</span>' : '') +
            '</div><p class="yc-approve-inbox-field-summary analysis-card-text">' + esc(f.summary) + '</p></div></article>';
        }
        h += '</div></section>';
      }

      // ④ 业务规则分析
      if (d.ruleAnalysis && d.ruleAnalysis.length) {
        h += '<section class="yc-approve-inbox-detail-section"><h4 class="yc-approve-inbox-section-title">个人规则（可定制）</h4><div class="yc-approve-inbox-rule-list yc-semantic-list">';
        for (const r of d.ruleAnalysis) {
          h += '<article class="yc-approve-inbox-rule-row yc-semantic-list-row" data-tone="' + semanticToneForSeverity(r.severity) + '"><i class="' + sevDot(r.severity) + ' yc-semantic-marker"></i>' +
            '<div class="yc-approve-inbox-rule-content yc-semantic-content"><div class="yc-approve-inbox-rule-head yc-semantic-head analysis-card-head">' +
            '<strong class="yc-approve-inbox-rule-name analysis-card-title">' + esc(r.ruleName) + '</strong>' +
            '<span class="tag tag-' + semanticToneForSeverity(r.severity) + ' yc-semantic-row-tag yc-approve-inbox-tag">' + SEVERITY_LABEL[r.severity] + '</span></div>' +
            '<p class="yc-approve-inbox-rule-summary analysis-card-text">' + esc([r.summary, r.evidence].filter(Boolean).join('：')) + '</p>' +
            (r.suggestion ? '<p class="yc-message-center-ai-advice analysis-card-text" data-field="advice">' +
              '<span class="yc-message-center-ai-icon">' + localIcon('AI_star') + '</span>' +
              '<span class="yc-message-center-ai-value">' + esc(r.suggestion) + '</span></p>' : '') +
            '</div></article>';
        }
        h += '</div></section>';
      }

      // ⑤ 附件分析
      const attachmentRows = attachmentRowsForDetail(d);
      if (attachmentRows.length) {
        const filterOptions = attachmentFilterOptions(attachmentRows);
        const activeFilter = activeAttachmentFilter(filterOptions);
        const visibleAttachmentRows = attachmentRows
          .map((row, idx) => Object.assign({ rowIndex: idx }, row))
          .filter(row => activeFilter === 'all' || row.sourceKey === activeFilter);
        h += '<section class="yc-approve-inbox-detail-section">' +
          '<div class="yc-approve-inbox-attachment-toolbar"><div><h4 class="yc-approve-inbox-section-title">附件分析</h4>' +
          '<p class="yc-approve-inbox-attachment-count">共 ' + attachmentRows.length + ' 个附件，按来源快速筛选</p></div>' +
          '<div class="yc-approve-inbox-attachment-filter" role="toolbar" aria-label="附件来源筛选">';
        for (const option of filterOptions) {
          h += '<button type="button" class="yc-approve-inbox-attachment-filter-btn' + (option.key === activeFilter ? ' active' : '') +
            '" data-attachment-filter="' + esc(option.key) + '" aria-pressed="' + (option.key === activeFilter ? 'true' : 'false') + '">' +
            esc(option.label) + ' ' + option.count + '</button>';
        }
        h += '</div></div><div class="yc-approve-inbox-attachment-list">';
        for (const a of visibleAttachmentRows) {
          h += '<article class="yc-approve-inbox-attachment-row"><div class="yc-approve-inbox-attachment-head">' +
            '<button type="button" class="yc-approve-inbox-attachment-preview-trigger" data-attachment-preview="' + a.rowIndex + '" title="预览附件">' +
            icon('file') + '<span class="yc-approve-inbox-attachment-name">' + esc(a.fileName) + '</span></button>' +
            '<span class="yc-approve-inbox-attachment-source yc-approve-inbox-attachment-source-' + esc(a.sourceKey) + '">' + esc(a.sourceLabel) + '</span>' +
            (a.fileType ? '<code class="yc-approve-inbox-attachment-type">' + esc(a.fileType) + '</code>' : '') +
            (a.analysis && a.analysis.severity ? '<span class="' + sevTag(a.analysis.severity) + '">' + SEVERITY_LABEL[a.analysis.severity] + '</span>' : '') + '</div>';
          if (a.analysis && a.analysis.summary) {
            h += '<p class="yc-approve-inbox-attachment-summary">' + esc(a.analysis.summary) + '</p>';
          } else {
            h += '<p class="yc-approve-inbox-attachment-summary yc-approve-inbox-attachment-pending">已识别附件' +
              (a.size ? '（' + esc(Math.round(Number(a.size) / 1024)) + ' KB）' : '') +
              '，正文内容解析待完成。</p>';
          }
          h += '<p class="yc-approve-inbox-attachment-status"><span>' + esc(a.sourceLabel) + '</span><span>' + esc(formatFileSize(a.size)) + '</span><span>' + esc(attachmentCacheLabel(a)) + '</span></p>';
          if (a.error) h += '<p class="yc-approve-inbox-attachment-status"><span>解析状态：' + esc(a.error) + '</span></p>';
          if (a.analysis && a.analysis.findings && a.analysis.findings.length) {
            h += '<ul class="yc-approve-inbox-findings">';
            for (const fd of a.analysis.findings) h += '<li>' + (fd.name ? '<strong>' + esc(fd.name) + '：</strong>' : '') + esc(fd.detail) + '</li>';
            h += '</ul>';
          }
          h += '</article>';
        }
        h += '</div></section>';
      }

      h += '</div>';


      return h + '</aside>';
    }

    /* ========== 总渲染 ========== */
    function listScrollKey() {
      return [state.activeL1, state.activeL2, state.riskFilter].join('::');
    }

    function saveListScrollPosition() {
      const list = document.querySelector('#inbox .yc-approve-inbox-list');
      if (list) state.listScrollPositions.set(listScrollKey(), list.scrollTop);
    }

    function setListScrollPosition(scrollTop) {
      const list = document.querySelector('#inbox .yc-approve-inbox-list');
      if (list) list.scrollTop = Math.min(scrollTop, Math.max(0, list.scrollHeight - list.clientHeight));
    }

    function restoreListScrollPosition() {
      const scrollTop = state.listScrollPositions.get(listScrollKey());
      if (!Number.isFinite(scrollTop)) return;
      setListScrollPosition(scrollTop);
    }

    let lastRenderedActiveTabs = { l1: null, l2: null };

    function scrollActiveTabIntoView(scope) {
      requestAnimationFrame(() => {
        const tablist = document.querySelector('[data-tab-focus-scope="' + scope + '"]');
        const activeTab = tablist && tablist.querySelector('[role="tab"][aria-selected="true"]');
        if (!tablist || !activeTab) return;
        const tablistCenter = tablist.clientWidth / 2;
        const activeTabCenter = activeTab.offsetLeft - tablist.offsetLeft + activeTab.offsetWidth / 2;
        const maxScrollLeft = Math.max(0, tablist.scrollWidth - tablist.clientWidth);
        const targetScrollLeft = Math.min(maxScrollLeft, Math.max(0, activeTabCenter - tablistCenter));
        if (Math.abs(targetScrollLeft - tablist.scrollLeft) < 1) return;
        tablist.scrollLeft = targetScrollLeft;
      });
    }

    function render(options = {}) {
      const drawer = document.getElementById('drawer');
      const renderedDetailId = drawer.dataset.detailItemId || '';
      const existingDetailBody = drawer.querySelector('.yc-approve-inbox-detail-body');
      const sameDetail = !!state.activeItemId && renderedDetailId === String(state.activeItemId);
      const detailScrollTop = Number.isFinite(options.detailScrollTop)
        ? options.detailScrollTop
        : (sameDetail && existingDetailBody ? existingDetailBody.scrollTop : null);
      const inbox = document.getElementById('inbox');
      const currentList = inbox.querySelector('.yc-approve-inbox-list');
      const currentListScrollTop = currentList ? currentList.scrollTop : null;
      const availabilityHtml = renderAvailabilityState();
      const showList = !!state.data && (state.availability.status === 'ready' || state.availability.status === 'stale_same_identity');
      inbox.innerHTML = availabilityHtml + (showList ? renderList() : '');
      if (showList) {
        const activeL1Changed = lastRenderedActiveTabs.l1 !== state.activeL1;
        const activeL2Changed = lastRenderedActiveTabs.l2 !== state.activeL2;
        lastRenderedActiveTabs = { l1: state.activeL1, l2: state.activeL2 };
        if (options.restoreListScroll) restoreListScrollPosition();
        else if (Number.isFinite(currentListScrollTop)) setListScrollPosition(currentListScrollTop);
        if (activeL1Changed) scrollActiveTabIntoView('l1');
        if (activeL2Changed) scrollActiveTabIntoView('l2');
        const selectAll = inbox.querySelector('[data-select-all]');
        if (selectAll) {
          const rowChecks = [...inbox.querySelectorAll('[data-select-row]:not(:disabled)')];
          const checkedCount = rowChecks.filter(input => input.checked).length;
          selectAll.indeterminate = checkedCount > 0 && checkedCount < rowChecks.length;
        }
      }
      if (showList && !HOST_OWNS_DETAIL && state.activeItemId && state.detail) {
        drawer.style.display = '';
        drawer.dataset.detailItemId = String(state.activeItemId);
        drawer.innerHTML = '<div class="yc-sheet-grabber" aria-hidden="true"></div>' + renderDetail(state.detail);
        if (Number.isFinite(detailScrollTop)) {
          const detailBody = drawer.querySelector('.yc-approve-inbox-detail-body');
          if (detailBody) detailBody.scrollTop = detailScrollTop;
        }
        document.body.classList.add('sheet-open');
      } else {
        drawer.style.display = 'none';
        delete drawer.dataset.detailItemId;
        drawer.innerHTML = '';
        document.body.classList.remove('sheet-open');
      }
      const approvalDialogHost = document.getElementById('approvalDialogHost');
      if (!state.approvalDialog || !approvalDialogHost.firstElementChild || options.refreshApprovalDialog) {
        approvalDialogHost.innerHTML = renderApprovalDialog();
      }
      document.getElementById('attachmentPreviewHost').innerHTML = renderAttachmentPreview();
      document.getElementById('yonclawChatHost').innerHTML = renderYonClawChat();
      const dm = document.getElementById('dataMode');
      if (state.data && dm) {
        const src = state.data.dataSource;
        dm.className = 'data-mode data-mode-' + (src === 'real' ? 'real' : 'unavailable');
        dm.textContent = src === 'real' ? '真实数据' : '未同步';
      } else if (dm) {
        dm.className = 'data-mode data-mode-unavailable';
        dm.textContent = '未同步';
      }
    }

    /* ========== 交互 ========== */
    async function openDetail(id) {
      resetDetailFieldExpansion();
      if (!state.activeItemId) saveListScrollPosition();
      if (HOST_OWNS_DETAIL) {
        state.activeItemId = id;
        render();
        tellCockpit({
          type: 'approve-inbox:request-detail',
          todoId: id,
          detailUrl: window.location.origin + '/api/details/' + encodeURIComponent(id),
        });
        return;
      }
      tellCockpit({ type: 'approve-inbox:detail-visibility', open: true });
      revokeAttachmentPreviewObjectUrl();
      state.activeItemId = id;
      state.detail = detailLoadingPlaceholder(id);
      state.detailEnriching = false;
      state.attachmentPreview = null;
      state.attachmentPreviewContent = { status: 'idle' };
      state.attachmentFilter = 'all';
      render();
      let d;
      try {
        d = await fetchDetail(id);
      } catch (e) {
        if (e && e.apiIdentityGuarded) return;
        toast('详情加载失败', 'error');
        return;
      }
      if (state.activeItemId !== id) return; // 用户已切换
      state.detail = d;
      render();
      if (!d.systemRuleAudit || !d.systemRuleAudit.fetchedAt) {
        void refreshSystemRuleAudit(id);
      }
      // 按需自动 enrich：缺字段，或已有字段但尚未产生分析且此前没有明确失败。
      if (d.dataSource === 'real'
          && (!d.enriched || (!d.analyzed && !d.analysisError))
          && !d.crossTenant
          && !d.unsupportedType) {
        await enrichAndPoll(id);
      }
    }

    async function refreshSystemRuleAudit(id) {
      try {
        const r = await fetch('/api/system-rule-audit/' + encodeURIComponent(id));
        const data = await r.json().catch(() => ({}));
        const payload = { ...(data && typeof data === 'object' ? data : {}), _httpStatus: r.status, _httpOk: r.ok };
        if (applyApiIdentityGuard(payload, r.status)) return;
        if (!r.ok || state.activeItemId !== id || !state.detail || state.detail._loading) return;
        state.detail = {
          ...state.detail,
          systemRuleAudit: payload.systemRuleAudit,
          compositeAdvice: payload.compositeAdvice,
          conclusion: payload.conclusion || state.detail.conclusion,
        };
        render();
      } catch (e) {
        if (e && e.apiIdentityGuarded) return;
        // 企业规则是可选增强项；失败不打断已打开的详情。
      }
    }

    /**
     * 单据级异步 enrich + 轮询：POST 触发后台子进程，轮询 /api/details 直到真实分析出现或任务结束。
     * 不阻塞 UI；期间每次抓到新数据即刷新（字段先到、分析后到）。
     */
    async function enrichAndPoll(id) {
      if (interactionsBlocked()) {
        toast('当前数据仅可查看，请先完成同步', 'info');
        return;
      }
      state.detailEnriching = true;
      render();
      try {
        const res = await postJson('/api/enrich/' + encodeURIComponent(id), {});
        if (applyApiIdentityGuard(res, res?._httpStatus)) return;
        if (state.activeItemId !== id) return;
        if (!res.success) {
          toast(res.error ? ('无法抓取：' + res.error) : '该单据暂无法抓取真实字段', 'info');
          return;
        }
        const started = Date.now();
        while (Date.now() - started < 185000) {
          await sleep(3000);
          if (state.activeItemId !== id) return;
          const d = await fetchDetail(id);
          state.detail = d;
          render();
          if (d.analyzed) { toast('分析完成', 'success'); return; }
          const st = await getJson('/api/enrich-status/' + encodeURIComponent(id));
          if (st && (st.status === 'done' || st.status === 'error')) {
            toast(d.enriched ? '已抓取真实字段，AI 分析未完成，可再点重新分析' : '该单据暂无法抓取真实字段', 'info');
            return;
          }
        }
        toast('分析超时，请稍后重试', 'info');
      } catch (e) {
        if (e && e.apiIdentityGuarded) return;
        toast('分析失败', 'error');
      } finally {
        state.detailEnriching = false;
        render();
      }
    }
    function closeDetail() {
      tellCockpit({ type: 'approve-inbox:detail-visibility', open: false });
      revokeAttachmentPreviewObjectUrl();
      state.activeItemId = null;
      state.detail = null;
      state.detailEnriching = false;
      state.attachmentPreview = null;
      state.attachmentPreviewContent = { status: 'idle' };
      state.attachmentFilter = 'all';
      resetDetailFieldExpansion();
      render({ restoreListScroll: true });
    }

    async function submitApproval(ids, payload) {
      if (!ids.length) return;
      if (!payload) return;
      if (interactionsBlocked()) {
        toast('当前数据仅可查看，请先完成同步', 'info');
        return { success: false, error: 'readonly_state' };
      }
      const res = await postJson('/api/approve', { ids, ...payload });
      if (res.accepted === true || res._httpStatus === 202) {
        const processingIds = res.processingIds || ids;
        for (const it of state.data.items) {
          if (!processingIds.includes(it.id)) continue;
          it.approvalProcessing = {
            ...(it.approvalProcessing || {}),
            jobId: res.jobId || it.approvalProcessing?.jobId,
            state: 'processing',
            action: payload.action,
            submittedAt: it.approvalProcessing?.submittedAt || new Date().toISOString(),
            remoteOutcome: 'unknown',
          };
          it.runtimeActions = [];
          state.selectedIds.delete(it.id);
        }
        render();
        toast(res.message || '审批已转入后台处理，可继续处理其他单据', 'success');
        tellCockpit({ type: 'approve-inbox:approve-result', ids: processingIds, action: payload.action, ok: true, processing: true, jobId: res.jobId });
        [2000, 8000, 20000, 60000].forEach(delay => setTimeout(refreshInbox, delay));
        return res;
      }
      const safety = applyApprovalSafetyResponse(res);
      if (safety.blocked) return res;
      const completed = res.completed || res.approved || [];
      if (completed.length) {
        for (const it of state.data.items) if (completed.includes(it.id)) { it.status = 'done'; it.runtimeActions = []; }
        completed.forEach(id => state.selectedIds.delete(id));
        if (completed.includes(state.activeItemId)) closeDetail();
        const text = payload.action === 'approve' ? '已通过 ' : (payload.action === 'return' ? '已退回 ' : '已驳回 ');
        toast(text + completed.length + ' 条', 'success');
        render();
        tellCockpit({ type: 'approve-inbox:approve-result', ids: completed, action: payload.action, ok: true });
      }
      if (!res.success) {
        const firstError = (res.results || []).find(r => r && !r.success)?.error;
        toast(firstError || res.error || '审批动作失败', completed.length ? 'info' : 'error');
      } else {
        await refreshInbox();
      }
      return res;
    }

    function markLocalApprovalProcessing(ids, payload, localRequestId) {
      for (const it of state.data?.items || []) {
        if (!ids.includes(it.id)) continue;
        it.approvalProcessing = {
          state: 'processing',
          action: payload.action,
          submittedAt: new Date().toISOString(),
          remoteOutcome: 'unknown',
          localRequestId,
          originalRuntimeActions: Array.isArray(it.runtimeActions) ? it.runtimeActions : [],
        };
        it.runtimeActions = [];
        state.selectedIds.delete(it.id);
      }
    }

    function clearLocalApprovalProcessing(ids, localRequestId) {
      for (const it of state.data?.items || []) {
        if (!ids.includes(it.id) || it.approvalProcessing?.localRequestId !== localRequestId) continue;
        const actions = it.approvalProcessing.originalRuntimeActions;
        delete it.approvalProcessing;
        if (Array.isArray(actions)) it.runtimeActions = actions;
      }
    }

    async function submitApprovalDialog() {
      const d = state.approvalDialog;
      if (!d || d.submitting) return;
      const payload = readApprovalDialogForm();
      if (!payload.comment) { toast('请填写审批意见', 'info'); return; }
      const ids = [...d.ids];
      const localRequestId = 'local-' + Date.now() + '-' + Math.random().toString(16).slice(2);
      markLocalApprovalProcessing(ids, payload, localRequestId);
      state.approvalDialog = null;
      render();
      toast('已提交后台处理，可关闭当前页面；处理完成前不能重复操作', 'info');
      void submitApproval(ids, payload).then((res) => {
        if (res?.accepted === true || res?._httpStatus === 202) return;
        if (APPROVAL_RECONCILIATION_CODES.has(responseIssueCode(res))) {
          const processingIds = Array.isArray(res.processingIds) && res.processingIds.length ? res.processingIds : ids;
          for (const it of state.data?.items || []) {
            if (!processingIds.includes(it.id)) continue;
            it.approvalProcessing = {
              ...(it.approvalProcessing || {}),
              jobId: res.existingJobId || it.approvalProcessing?.jobId,
              state: res.processingState === 'needs_review' ? 'needs_review' : 'processing',
              remoteOutcome: it.approvalProcessing?.remoteOutcome || 'unknown',
            };
            it.runtimeActions = [];
          }
          render();
          return;
        }
        clearLocalApprovalProcessing(ids, localRequestId);
        render();
      }).catch((e) => {
        clearLocalApprovalProcessing(ids, localRequestId);
        toast(e.message || '审批提交失败', 'error');
        render();
      });
    }

      const l1 = e.target.closest('[data-l1]');
      if (l1) { saveListScrollPosition(); state.activeL1 = l1.dataset.l1; state.activeL2 = 'all'; state.selectedIds.clear(); render({ restoreListScroll: true }); return; }
      const l2 = e.target.closest('[data-l2]');

      const tt = e.target.closest('#btnTenantToggle');

      const customColumns = e.target.closest('#btnColumns');
      if (customColumns) { state.columnPanelOpen = !state.columnPanelOpen; render(); return; }
      const customColumnToggle = e.target.closest('[data-col]');
      if (customColumnToggle) { toggleColumn(customColumnToggle.dataset.col); return; }
      const customColumnUp = e.target.closest('[data-col-up]');
      if (customColumnUp) { moveColumn(customColumnUp.dataset.colUp, -1); return; }
      const customColumnDown = e.target.closest('[data-col-down]');
      if (customColumnDown) { moveColumn(customColumnDown.dataset.colDown, 1); return; }
      if (e.target.closest('#btnAddCustomColumn')) { addCustomColumnFromPanel(); return; }
      const columns = e.target.closest('#btnNativeColumns');
      if (columns) { state.columnMenuOpen ? cancelNativeColumnMenu() : openNativeColumnMenu(); return; }
      const columnToggle = e.target.closest('[data-column-toggle]');
      if (columnToggle) { toggleNativeColumn(columnToggle.dataset.columnToggle); return; }
      const columnMove = e.target.closest('[data-column-move]');
      if (columnMove) { moveNativeColumn(columnMove.dataset.columnId, columnMove.dataset.columnMove === 'up' ? -1 : 1); return; }
      if (e.target.closest('[data-column-reset]')) { resetNativeColumnMenu(); return; }
      if (e.target.closest('[data-column-cancel]')) { cancelNativeColumnMenu(); return; }
      if (e.target.closest('[data-column-confirm]')) { confirmNativeColumnMenu(); return; }
      const sort = e.target.closest('[data-sort-column]');
      if (sort) { setNativeSort(sort.dataset.sortColumn, sort.dataset.sortDirection); return; }
      const selectAll = e.target.closest('[data-select-all]');
      if (selectAll) {
        const rowChecks = [...e.currentTarget.querySelectorAll('[data-select-row]:not(:disabled)')];
        for (const input of rowChecks) {
          if (selectAll.checked) state.selectedIds.add(input.dataset.selectRow);
          else state.selectedIds.delete(input.dataset.selectRow);
        }
        render();
        return;
      }
      const selectRow = e.target.closest('[data-select-row]');
      if (selectRow) {
        if (selectRow.checked) state.selectedIds.add(selectRow.dataset.selectRow);
        else state.selectedIds.delete(selectRow.dataset.selectRow);
        render();
        return;
      }
      const rap = e.target.closest('#btnReanalyzePending');
      if (rap) { triggerReanalyzePending(rap); return; }
      const clear = e.target.closest('#btnClearSel');
      if (clear) { state.selectedIds.clear(); render(); return; }
      const batch = e.target.closest('#btnBatch');
      if (batch) {
        const visible = filterItems(state.data.items, state.activeL1, state.activeL2, state.riskFilter);
        const selectedVisible = visible.filter(i => state.selectedIds.has(i.id));
        if (selectedVisible.length === 0) { toast('请先选择要批量处理的待办单据', 'info'); return; }
        const ids = selectedVisible.filter(i => hasAction(i, 'approve')).map(i => i.id);
        if (ids.length !== selectedVisible.length) { toast('所选单据中存在当前不可统一处理的单据，请重新选择', 'info'); return; }

        const id = actBtn.dataset.id, act = actBtn.dataset.act;
        if (act === 'approve' || act === 'reject' || act === 'return') openApprovalDialog([id], act);
        else toast('「' + act + '」暂未接入', 'info');
        return;
      }
      const actionMenu = e.target.closest('[data-action-menu]');
      if (actionMenu) { e.stopPropagation(); return; }
      const open = e.target.closest('[data-open]');
      if (open) { markItemRead(open.dataset.open); openDetail(open.dataset.open); }

    // 后台批量重新分析「未完成」单据（含漏跑/旧模板残缺）。非阻塞，结果陆续刷新。
    async function triggerReanalyzePending(btn) {
      if (interactionsBlocked()) {
        toast('当前数据仅可查看，请先完成同步', 'info');
        return;
      }
      if (btn) { btn.disabled = true; btn.textContent = '已触发分析…'; }
      try {
        const res = await postJson('/api/sync', {});
        const applied = applySyncResponse(res);
        if (applied.acceptedData) applyInboxConfigs(state.data, { initial: false });
        render();
        if (res.success) toast(res.started ? '已触发后台重新分析，结果将陆续刷新（claude 较慢）' : (res.running ? '已有分析在进行中' : '已触发'), 'success');
        else toast(syncFallbackMessage(res), 'info');
      } catch (e) { toast('触发失败', 'error'); }
      pollSyncStatus();
      setTimeout(refreshInbox, 8000);
      setTimeout(() => { pollSyncStatus(); refreshInbox(); }, 30000);
    }

    async function runManualSync() {
      setSyncButtonState(true);
      try {
        const res = await postJson('/api/sync', {});
        const applied = applySyncResponse(res);
        if (applied.acceptedData) {
          state.selectedIds.clear();
          applyInboxConfigs(state.data, { initial: false });
        }
        render();
        if (res.success) toast(res.started ? '已刷新待办，后台智能分析中' : (res.running ? '已刷新待办，已有分析在进行中' : '已刷新待办'), 'success');
        else toast(syncFallbackMessage(res), BLOCKING_SYNC_STATES.has(applied.status) ? 'error' : 'info');
      } catch (e) {
        if (!state.data) state.availability = { status: 'unavailable', message: '无法连接智能待办服务，请稍后重试。', response: null };
        render();
        toast('刷新失败，请检查网络后重试', 'error');
      } finally {
        setSyncButtonState(false);
        pollSyncStatus();
        setTimeout(refreshInbox, 3000);
        setTimeout(() => { pollSyncStatus(); refreshInbox(); }, 30000);
      }
    }

    function handleRecoveryAction(actionName) {
      const response = state.availability.response || {};
      const action = recoveryActionsFor(state.availability.status, response).find(item => item.action === actionName) || { action: actionName };
      tellCockpit({ type: 'approve-inbox:recovery-action', action: action.action, recovery: action });
      if (action.action === 'sync' || action.action === 'retry-sync') {
        runManualSync();
        return;
      }
      if (action.action === 'open-login' || action.action === 'login-in-yonwork' || action.action === 'reopen-in-yonwork') {
        if (action.url) {
          try {
            const url = new URL(action.url);
            if (url.protocol === 'http:' || url.protocol === 'https:') window.open(url.toString(), '_blank', 'noopener,noreferrer');
          } catch (_) { /* 宿主仍会收到恢复动作 */ }
        }
        toast('请从 YonWork 重新进入智能待办；服务完成身份交接后，浏览器会自动恢复', 'info');
      }
    }

    const syncButton = document.getElementById('btnSync');
    if (syncButton) {
      syncButton.addEventListener('click', runManualSync);
    }

    /* ========== 自动刷新 + 离线分析状态 ========== */
    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso); if (isNaN(d.getTime())) return '';
      const p = (n) => String(n).padStart(2, '0');
      return p(d.getHours()) + ':' + p(d.getMinutes());
    }
    async function pollSyncStatus() {
      try {
        const r = await fetch('/api/sync-status');
        const data = await r.json().catch(() => ({}));
        const s = { ...(data && typeof data === 'object' ? data : {}), _httpStatus: r.status, _httpOk: r.ok };
        if (applyApiIdentityGuard(s, r.status)) return;
        const el = document.getElementById('syncStatus');
        if (!el) return;
        if (s && s.inboxSync && s.inboxSync.running) {
          el.className = 'sync-status analyzing';
          el.innerHTML = '<span class="dot"></span>刷新待办中…';
          return;
        }
        const availabilityLabel = {
          auth_required: '需要重新登录',
          identity_mismatch: '身份已切换',
          service_context_mismatch: '正在切换环境',
          stale_same_identity: '缓存数据 · 只读',
          empty: '已同步 · 暂无待办',
          unavailable: '待办不可用',
        }[state.availability.status];
        if (availabilityLabel) {
          el.className = 'sync-status';
          el.innerHTML = '<span class="dot"></span>' + availabilityLabel;
          return;
        }
        if (state.data && state.data.dataSource !== 'real') {
          el.className = 'sync-status';
          el.innerHTML = '<span class="dot"></span>待同步';
          return;
        }
        if (!s || s.enabled === false) { el.textContent = ''; return; }
            if (s.running) {
              el.className = 'sync-status analyzing';
              const coverage = s.analysisCoverage || {};
              const progress = Number(coverage.eligible) > 0 ? (' ' + Number(coverage.analyzed || 0) + '/' + Number(coverage.eligible)) : '';
              el.innerHTML = '<span class="dot"></span>智能分析中…' + progress;
            } else {
              el.className = 'sync-status';
              const coverage = s.analysisCoverage || {};
              const eligible = Number(coverage.eligible || 0);
              const analyzed = Number(coverage.analyzed || 0);
              const remaining = Math.max(0, Number(coverage.remaining || 0));
              const failed = Math.max(0, Number(coverage.failed || 0));
              const coverageText = eligible === 0
                ? '暂无待分析单据'
                : (remaining === 0 && failed === 0
                    ? ('当前列表已分析 ' + analyzed + '/' + eligible)
                    : ((remaining > 0 ? ('当前列表待分析 ' + remaining + ' 条') : '')
                      + (remaining > 0 && failed > 0 ? ' · ' : '')
                      + (failed > 0 ? ('分析失败 ' + failed + ' 条，可打开详情重试') : '')
                      + ' · ' + analyzed + '/' + eligible));
              const statusText = coverageText + (s.lastRunAt ? (' · ' + fmtTime(s.lastRunAt)) : '');
              el.innerHTML = '<span class="dot"></span>' + statusText;
            }
      } catch (e) { /* 忽略 */ }
    }

    /* 平滑重载列表数据（保留当前选中详情，不打断阅读） */
    async function refreshInbox() {
      try {
        const res = await fetchInbox();
        const applied = applySyncResponse(res);
        if (applied.acceptedData) applyInboxConfigs(state.data, { initial: false });
        render();
      } catch (e) {
        if (!state.data) {
          state.availability = { status: 'unavailable', message: '无法连接智能待办服务，请稍后重试。', response: null };
          render();
        }
      }
    }

    /* ========== 启动 ========== */
    async function load() {
      state.loading = true;
      render();
      try {
        const res = await fetchInbox();
        const applied = applySyncResponse(res);
        if (applied.acceptedData) applyInboxConfigs(state.data, { initial: true });
        render();
        pollSyncStatus();
      } catch (e) {
        state.availability = { status: 'unavailable', message: '无法连接智能待办服务，请稍后重试。', response: null };
        render();
      }
    }
    setSyncButtonState(false);
    load();
    // 列表 30s 轮询刷新；状态 10s 轮询（仅读，不触发分析）
    setInterval(refreshInbox, 30000);
    setInterval(pollSyncStatus, 10000);
  </script>
</body>
</html>
