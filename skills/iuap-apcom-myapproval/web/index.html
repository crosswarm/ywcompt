<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>智能待办</title>
  <link rel="stylesheet" href="/message-list.css">
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      if (params.get('embed') === 'cockpit-drawer') {
        document.documentElement.classList.add('is-cockpit-embed');
      }
      if (params.get('detailOwner') === 'host') {
        document.documentElement.classList.add('is-host-detail-owner');
      }
    })();
  </script>
  <style>
    /* ========== 设计 token（独立单页自带；驾驶舱内由全局 token 提供） ========== */
    :root {
      --app-text: 222 20% 18%;
      --app-text-secondary: 222 12% 32%;
      --app-text-muted: 222 10% 45%;
      --app-text-subtle: 222 8% 62%;
      --app-surface: 0 0% 100%;
      --app-surface-elevated: 0 0% 100%;
      --app-surface-hover: 220 14% 96%;
      --app-surface-subtle: 220 16% 97%;
      --app-bg: 220 20% 99%;
      --app-border: 220 13% 88%;
      --app-border-subtle: 220 13% 92%;
      --app-border-hover: 220 13% 80%;
      --primary: 351 83% 57%;
      --primary-foreground: 0 0% 100%;
      --primary-300: 351 95% 72%;
      --adc-chart-purple: #8B5CF6;
      --app-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --yc-control-link: 217 91% 53%;
      --yc-control-link-hover: 217 91% 43%;
      --yc-control-primary-hover: color-mix(in srgb, hsl(var(--primary)) 88%, #000);
      --destructive: 0 72% 51%;
      --destructive-soft: 0 86% 96%;
      --destructive-border: 0 70% 84%;
      --warning: 32 95% 50%;
      --warning-soft: 38 92% 95%;
      --warning-border: 38 90% 80%;
      --warning-text: 32 95% 37%;
      --success: 142 71% 40%;
      --success-soft: 142 70% 95%;
      --success-border: 142 45% 80%;
      --info: 217 91% 60%;
      --info-soft: 217 91% 96%;
      --info-border: 217 91% 82%;
      --yc-table-text: hsl(var(--app-text));
      --yc-table-bg: hsl(var(--app-surface));
      --yc-table-head-bg: hsl(var(--app-surface-subtle));
      --yc-table-border: hsl(var(--app-border));
      --yc-table-border-top: hsl(var(--app-border-hover));
      --yc-table-hover: hsl(var(--app-surface-hover));
      --yc-table-selected: hsl(var(--primary) / .12);
      --yc-table-selected-hover: hsl(var(--primary) / .18);
      --yc-table-disabled: hsl(var(--app-bg));
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --yc-config-bg-image: none;
      --yc-config-bg-fit: cover;
      --yc-config-bg-position: center;
      --yc-config-bg-attachment: fixed;
      --yc-config-bg-dim: 0;
      --yc-config-bg-blur: 0px;
      --yc-config-bg-saturate: 1;
      --yc-panel-opacity: 1;
    }

    :root[data-theme="dark"],
    :root[data-theme="night"],
    :root[data-theme="black"],
    :root[data-theme="暗黑"] {
      color-scheme: dark;
      --app-text: 220 20% 92%;
      --app-text-secondary: 220 14% 78%;
      --app-text-muted: 220 10% 66%;
      --app-text-subtle: 220 8% 50%;
      --app-surface: 222 14% 14%;
      --app-surface-elevated: 222 13% 18%;
      --app-surface-hover: 222 13% 19%;
      --app-surface-subtle: 222 13% 18%;
      --app-bg: 225 18% 10%;
      --app-border: 222 10% 27%;
      --app-border-subtle: 222 11% 22%;
      --app-border-hover: 222 11% 34%;
      --destructive: 0 76% 66%;
      --destructive-soft: 0 42% 18%;
      --destructive-border: 0 42% 34%;
      --warning: 38 92% 55%;
      --warning-soft: 38 34% 18%;
      --warning-border: 38 48% 34%;
      --warning-text: 38 92% 68%;
      --success: 142 64% 50%;
      --success-soft: 142 34% 17%;
      --success-border: 142 34% 32%;
      --info: 213 93% 68%;
      --info-soft: 217 36% 18%;
      --info-border: 217 42% 36%;
      --adc-chart-purple: #A78BFA;
      --yc-control-link: 213 94% 79%;
      --yc-control-link-hover: 213 94% 86%;
      --yc-table-text: hsl(var(--app-text));
      --yc-table-bg: hsl(var(--app-surface));
      --yc-table-head-bg: hsl(var(--app-surface-subtle));
      --yc-table-border: hsl(var(--app-border));
      --yc-table-border-top: hsl(var(--app-border-hover));
      --yc-table-hover: hsl(var(--app-surface-hover));
      --yc-table-selected: hsl(var(--primary) / .12);
      --yc-table-selected-hover: hsl(var(--primary) / .18);
      --yc-table-disabled: hsl(var(--app-bg));
    }

    :root[data-theme="light"],
    :root[data-theme="浅色"] {
      color-scheme: light;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: hsl(var(--app-bg));
      color: hsl(var(--app-text));
      font-family: var(--app-font-family);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background-image: var(--yc-config-bg-image);
      background-size: var(--yc-config-bg-fit);
      background-position: var(--yc-config-bg-position);
      background-attachment: var(--yc-config-bg-attachment);
      background-repeat: no-repeat;
      filter: blur(var(--yc-config-bg-blur)) saturate(var(--yc-config-bg-saturate));
      transform: scale(1.02);
      opacity: 0;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: hsl(var(--app-bg) / var(--yc-config-bg-dim));
      opacity: 0;
    }
    html.has-config-background body::before,
    html.has-config-background body::after { opacity: 1; }
    html[data-ui-density="compact"] body { font-size: 12px; }

    .app {
      max-width: 1180px;
      height: 100vh;
      height: 100dvh;
      min-height: 0;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    html.is-cockpit-embed,
    html.is-cockpit-embed body {
      height: 100%;
      min-height: 0;
      overflow: hidden;
      background: transparent;
    }

    html.is-cockpit-embed .app {
      width: 100%;
      max-width: none;
      height: 100%;
      min-height: 0;
      margin: 0;
      padding: 0;
      gap: 0;
      background: transparent;
    }

    html.is-cockpit-embed .app-header {
      display: none;
    }

    html.is-cockpit-embed .yc-approve-inbox-shell {
      flex: 1 1 auto;
      height: 100%;
      min-height: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    html.is-cockpit-embed .yc-approve-inbox-shell-list,
    html.is-cockpit-embed .yc-approve-inbox,
    html.is-cockpit-embed .yc-mail-workbench {
      height: 100%;
      min-height: 0;
    }

    html.is-cockpit-embed.is-host-detail-owner .yc-approve-inbox-shell-drawer,
    html.is-cockpit-embed.is-host-detail-owner .yc-sheet-overlay {
      display: none !important;
    }

    /* ── 顶栏 ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .app-header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .app-header-right { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .sync-status { min-width: 0; overflow: hidden; text-overflow: ellipsis; font-size: 11px; color: hsl(var(--app-text-subtle)); white-space: nowrap; }
    .sync-status.analyzing { color: hsl(var(--primary)); }
    .sync-status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; margin-right: 4px; vertical-align: middle; }
    .sync-status.analyzing .dot { animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
    .btn-sync {
      display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
      width: 30px; height: 30px; padding: 0;
      border: 1px solid hsl(var(--app-border));
      border-radius: 6px; background: hsl(var(--app-surface));
      color: hsl(var(--app-text)); font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap;
      transition: background .14s, border-color .14s;
    }
    .btn-sync:hover { background: hsl(var(--app-surface-hover)); border-color: hsl(var(--app-border-hover)); }
    .btn-sync:disabled { opacity: .5; cursor: not-allowed; }
    .btn-sync .yc-action-icon { width: 14px; height: 14px; }
    .btn-sync.is-running .yc-action-icon { animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== Shell 布局 ========== */
    .yc-approve-inbox-shell {
      display: flex; flex: 1; min-height: 0;
      background: hsl(var(--app-surface) / var(--yc-panel-opacity));
      border: 1px solid hsl(var(--app-border-subtle));
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 3px hsl(220 40% 20% / .06);
    }
    .yc-approve-inbox-shell-list {
      flex: 1; min-width: 0; height: 100%;
      display: flex; flex-direction: column; overflow: hidden;
      transition: flex .22s cubic-bezier(.2,.8,.2,1);
    }
    .yc-approve-inbox-shell-drawer {
      flex: 0 0 380px; width: 380px; height: 100%; overflow: hidden;
      display: flex; flex-direction: column;
      animation: drawer-enter .22s cubic-bezier(.2,.8,.2,1);
    }
    @keyframes drawer-enter { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }

    /* ========== 容器 ========== */
    .yc-approve-inbox { display: flex; flex-direction: column; min-height: 0; height: 100%; }

    /* ── header: tab + 工具栏 ── */
    .yc-approve-inbox-header {
      display: flex; flex-direction: column; align-items: stretch; gap: 0;
      padding: 0; flex-shrink: 0;
      background: hsl(var(--app-surface));
    }
    .yc-approve-inbox-customization-hint {
      margin: 0;
      padding: 7px 12px 6px;
      flex-shrink: 0;
      border-bottom: 1px solid hsl(var(--app-border-subtle));
      background: hsl(var(--app-surface));
      color: hsl(var(--app-text-subtle));
      font-size: 11px;
      line-height: 1.45;
    }
    .yc-approve-inbox-detail > .yc-approve-inbox-customization-hint { padding-inline: 16px; }
    .yc-approve-inbox-header-row { min-width: 0; display: flex; align-items: center; }
    .yc-approve-inbox-header-primary {
      min-height: 44px; gap: 12px; padding: 0 18px 0 10px; border-bottom: 1px solid hsl(var(--app-border-subtle));
    }
    .yc-approve-inbox-header-secondary { min-height: 40px; gap: 12px; padding: 0 12px; }
    .yc-approve-inbox-tabs { display: flex; gap: 2px; flex: 1; min-width: 0; overflow-x: auto; scrollbar-width: none; }
    .yc-approve-inbox-tabs::-webkit-scrollbar { display: none; }

    /* 两层 tab：L1（待办|已办）粗，L2（维度）细 + 切换 */
    .yc-approve-inbox-tabs-l1 { min-width: 0; display: flex; flex: 1 1 auto; gap: 4px; }
    .yc-approve-inbox-tab-l1 {
      padding: 7px 14px; border: none; background: none; border-radius: 6px 6px 0 0;
      color: hsl(var(--app-text-muted)); font-size: 13px; font-weight: 600; cursor: pointer;
      transition: color .14s, background .14s;
    }
    .yc-approve-inbox-tab-l1:hover { color: hsl(var(--app-text)); background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-tab-l1-active { color: hsl(var(--app-text)); }
    .yc-approve-inbox-tab-l1 .count { opacity: .6; margin-left: 4px; font-weight: 500; font-size: 12px; }
    .yc-approve-inbox-tabs-l2 {
      min-width: 0; display: inline-flex; align-items: center; flex: 1 1 auto; gap: 6px; padding: 0;
      overflow-x: auto; overflow-y: hidden; scrollbar-width: none;
      border: 0; border-radius: 0; background: transparent; flex-wrap: nowrap;
    }
    .yc-approve-inbox-tabs-l2::-webkit-scrollbar { display: none; }
    .yc-approve-inbox-tab-l2 {
      flex: 0 0 auto; min-height: 28px; padding: 0 12px; border: 1px solid hsl(var(--app-border-subtle)); border-radius: 6px;
      background: hsl(var(--app-bg));
      color: hsl(var(--app-text-muted)); font-size: 12px; font-weight: 400; cursor: pointer; white-space: nowrap;
      transition: color .12s, border-color .12s, background .12s, box-shadow .12s;
    }
    .yc-approve-inbox-tab-l2:hover { border-color: hsl(var(--app-border)); background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-tab-l2-active {
      border-color: hsl(var(--primary) / .35); color: hsl(var(--primary)); background: hsl(var(--app-surface)); font-weight: 600;
      box-shadow: 0 1px 3px hsl(var(--app-text) / .14);
    }
    .yc-approve-inbox-tab-l2 .count { opacity: .55; margin-left: 3px; }
    .yc-approve-inbox-risk-select { position: relative; flex: 0 0 auto; width: max-content; }
    .yc-approve-inbox-risk-trigger {
      width: max-content; min-width: 0; height: 28px; padding: 0 8px 0 10px;
      display: inline-flex; align-items: center; justify-content: space-between; gap: 10px;
      border: 0; border-radius: 6px;
      background: hsl(var(--app-surface)); color: hsl(var(--app-text-muted));
      font: inherit; font-size: 12px; cursor: pointer; list-style: none;
      transition: color .14s, border-color .14s, background .14s;
    }
    .yc-approve-inbox-risk-trigger::-webkit-details-marker { display: none; }
    .yc-approve-inbox-risk-trigger:hover,
    .yc-approve-inbox-risk-select[open] .yc-approve-inbox-risk-trigger { color: hsl(var(--app-text)); background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-risk-trigger .yc-action-icon { width: 12px; height: 12px; transition: transform .14s; }
    .yc-approve-inbox-risk-select[open] .yc-approve-inbox-risk-trigger .yc-action-icon { transform: rotate(180deg); }
    .yc-approve-inbox-risk-menu {
      position: absolute; top: calc(100% + 4px); right: 0; z-index: 30;
      width: max-content; min-width: 100%; padding: 4px;
      border: 1px solid hsl(var(--app-border-subtle)); border-radius: 6px;
      background: hsl(var(--app-surface)); box-shadow: 0 3px 12px hsl(var(--app-text) / .16);
    }
    .yc-approve-inbox-risk-option {
      width: 100%; min-width: max-content; height: 32px; padding: 0 8px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      border: 0; border-radius: 4px; background: transparent;
      color: hsl(var(--app-text)); font: inherit; font-size: 12px; text-align: left; white-space: nowrap; cursor: pointer;
    }
    .yc-approve-inbox-risk-option:hover { background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-risk-option-active { color: hsl(var(--primary)); background: hsl(var(--primary) / .06); }
    .yc-approve-inbox-risk-option .yc-action-icon { width: 13px; height: 13px; }

    .yc-approve-inbox-tab {
      padding: 6px 10px; border: none; border-bottom: 2px solid transparent; border-radius: 4px 4px 0 0;
      background: none; color: hsl(var(--app-text-muted)); font-size: 12px; font-weight: 500;
      white-space: nowrap; cursor: pointer; transition: color .14s, border-color .14s, background .14s;
    }
    .yc-approve-inbox-tab:hover { color: hsl(var(--app-text)); background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-tab-active { color: hsl(var(--primary)); border-bottom-color: hsl(var(--primary)); font-weight: 700; }
    .yc-approve-inbox-tab .count { opacity: .6; margin-left: 3px; font-weight: 500; }

    .yc-approve-inbox-toolbar { min-width: 0; margin-left: auto; display: flex; align-items: center; justify-content: flex-end; gap: 4px; flex-shrink: 0; padding: 6px 0 2px; }
    .yc-approve-inbox-toolbar.yc-approve-inbox-filter-tools {
      position: relative; flex: 0 0 auto; margin-left: 0; padding-left: 12px;
      background: hsl(var(--app-surface)); z-index: 10; overflow: visible;
    }
    .yc-approve-inbox-toolbar-icon {
      width: 28px; height: 28px; display: grid; place-items: center;
      border: 1px solid hsl(var(--app-border-subtle)); border-radius: 6px; background: none;
      color: hsl(var(--app-text-muted)); cursor: pointer; transition: color .14s, border-color .14s, background .14s;
    }
    .yc-approve-inbox-toolbar-icon:hover { color: hsl(var(--app-text)); border-color: hsl(var(--app-border)); background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-toolbar-icon .yc-action-icon { width: 14px; height: 14px; }
    .yc-approve-inbox-batch-approve {
      display: inline-flex; align-items: center; justify-content: center; padding: 0 13px; height: 34px;
      border: 1px solid hsl(var(--primary)); border-radius: 8px; background: hsl(var(--primary));
      color: hsl(var(--primary-foreground)); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: color .14s, background .14s, border-color .14s;
    }
    .yc-approve-inbox-batch-approve:hover:not(:disabled) { color: hsl(var(--primary-foreground)); border-color: var(--yc-control-primary-hover); background: var(--yc-control-primary-hover); }
    .yc-approve-inbox-batch-approve:disabled { opacity: .4; cursor: not-allowed; }

    /* ── 列表 ── */
    .yc-approve-inbox-list { flex: 1; min-height: 0; overflow-y: auto; padding: 6px 0; }
    .yc-message-center-shell { --info: inherit; }
    :root[data-theme="dark"] .yc-message-center-item.yc-semantic-list-row,
    :root[data-theme="night"] .yc-message-center-item.yc-semantic-list-row,
    :root[data-theme="black"] .yc-message-center-item.yc-semantic-list-row,
    :root[data-theme="暗黑"] .yc-message-center-item.yc-semantic-list-row {
      --yc-standard-list-bg: hsl(var(--info-soft));
      background: linear-gradient(135deg, hsl(var(--info-soft) / .72), hsl(var(--app-surface-elevated) / .66));
      background: linear-gradient(
        135deg,
        color-mix(in srgb, var(--yc-standard-list-bg) 72%, hsl(var(--app-surface-elevated)) 28%),
        color-mix(in srgb, hsl(var(--app-surface)) 86%, var(--yc-standard-list-bg) 14%)
      );
      box-shadow: inset 0 1px 0 hsl(var(--app-border-subtle) / .46);
    }
    :root[data-theme="dark"] .yc-message-center-tag,
    :root[data-theme="night"] .yc-message-center-tag,
    :root[data-theme="black"] .yc-message-center-tag,
    :root[data-theme="暗黑"] .yc-message-center-tag {
      --wui-tag-light-border: hsl(var(--app-text) / .18);
      --wui-tag-light-bg: hsl(var(--app-text) / .08);
      --wui-tag-color-text: hsl(var(--app-text-secondary));
      --wui-tag-success-border: hsl(var(--success) / .42);
      --wui-tag-success-bg: hsl(var(--success) / .18);
      --wui-tag-success-text: hsl(var(--success));
      --wui-tag-warning-border: hsl(var(--warning) / .42);
      --wui-tag-warning-bg: hsl(var(--warning) / .18);
      --wui-tag-warning-text: hsl(var(--warning-text));
      --wui-tag-danger-border: hsl(var(--destructive) / .42);
      --wui-tag-danger-bg: hsl(var(--destructive) / .18);
      --wui-tag-danger-text: hsl(var(--destructive));
    }
    .yc-approve-inbox-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      min-height: 160px; color: hsl(var(--app-text-subtle)); font-size: 13px;
    }
    .yc-approve-inbox-empty .yc-action-icon { width: 28px; height: 28px; opacity: .4; }
    .yc-approve-inbox-availability {
      margin: 12px; padding: 18px; min-height: 132px; text-align: center;
      border: 1px solid hsl(var(--app-border-subtle)); border-radius: 9px;
      background: hsl(var(--app-surface-subtle));
    }
    .yc-approve-inbox-availability.is-notice { min-height: 0; margin-bottom: 4px; padding: 11px 14px; text-align: left; align-items: flex-start; }
    .yc-approve-inbox-availability strong { color: hsl(var(--app-text)); font-size: 14px; }
    .yc-approve-inbox-availability p { margin: 0; max-width: 560px; line-height: 1.6; }
    .yc-approve-inbox-recovery-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 4px; }
    .yc-approve-inbox-availability.is-notice .yc-approve-inbox-recovery-actions { justify-content: flex-start; }
    .yc-approve-inbox-recovery-btn {
      height: 32px; padding: 0 13px; border: 1px solid hsl(var(--app-border)); border-radius: 6px;
      background: hsl(var(--app-surface)); color: hsl(var(--app-text)); font: inherit; font-weight: 600; cursor: pointer;
    }
    .yc-approve-inbox-recovery-btn-primary { border-color: hsl(var(--primary)); background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }
    .yc-approve-inbox-recovery-btn:disabled { opacity: .55; cursor: default; }

    /* ── 智能速览：复用驾驶舱 AI 洞察卡片视觉 ── */
    .yc-chart-insight {
      --yc-chart-ai-accent: var(--adc-chart-purple);
      --yc-chart-ai-companion: hsl(var(--info));
      --yc-chart-ai-text: color-mix(in srgb, var(--yc-chart-ai-accent) 56%, var(--yc-chart-ai-companion));
      position: relative; display: grid; gap: 5px; padding: 10px 12px; border: 0; border-radius: 8px;
      background:
        radial-gradient(88% 116% at 8% 0%, color-mix(in srgb, var(--yc-chart-ai-companion) 7%, transparent) 0%, transparent 62%),
        radial-gradient(84% 120% at 100% 100%, color-mix(in srgb, var(--yc-chart-ai-accent) 6%, transparent) 0%, transparent 64%),
        linear-gradient(135deg, hsl(var(--app-surface) / 0.9), hsl(230 88% 98% / 0.72) 54%, hsl(258 88% 98% / 0.62) 100%);
      color: hsl(var(--app-text-muted)); font-size: 12px; line-height: 18px;
    }
    :root[data-theme="dark"] .yc-chart-insight,
    :root[data-theme="night"] .yc-chart-insight,
    :root[data-theme="black"] .yc-chart-insight,
    :root[data-theme="暗黑"] .yc-chart-insight {
      border: 1px solid hsl(var(--app-border-subtle) / 0.48);
      background:
        radial-gradient(88% 116% at 8% 0%, hsl(var(--info) / 0.12) 0%, transparent 62%),
        radial-gradient(84% 120% at 100% 100%, hsl(var(--primary) / 0.1) 0%, transparent 64%),
        linear-gradient(135deg, hsl(var(--app-surface-elevated) / 0.82), hsl(var(--app-surface-subtle) / 0.68) 58%, hsl(var(--app-surface) / 0.86) 100%);
      color: hsl(var(--app-text-muted));
      box-shadow: inset 0 1px 0 hsl(0 0% 100% / 0.05), inset 0 0 0 1px hsl(0 0% 100% / 0.02);
    }
    .yc-approve-inbox-review-summary { margin: 4px 12px 10px; }
    .review-summary-head { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: hsl(var(--app-text)); }
    .review-summary-head .yc-local-icon { width: 16px; height: 16px; flex: 0 0 16px; }
    .review-summary-head .period { margin-left: auto; font-weight: 500; font-size: 11px; color: hsl(var(--app-text-subtle)); }
    .review-summary-stats {
      width: 100%; display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 6px;
    }
    .review-summary-stats .stat {
      min-width: 0; max-width: 100%; padding: 7px; display: grid; grid-template-columns: minmax(0, 1fr);
      gap: 4px; align-content: start; justify-items: stretch; overflow: hidden;
      border: 1px solid hsl(var(--app-border-subtle) / .52); border-radius: 8px;
      background: linear-gradient(180deg, hsl(var(--app-surface-subtle) / .42), hsl(var(--app-surface) / .76));
      box-shadow: inset 0 1px 0 hsl(var(--app-surface) / .64); text-align: left;
    }
    .review-summary-stats .detail-metric-label { display: block; font-size: 11px; line-height: 15px; color: hsl(var(--app-text-muted)); }
    .review-summary-stats .detail-metric-value { display: block; margin: 3px 0; font-size: clamp(14px, 1.08vw, 18px); font-weight: 720; line-height: 1.16; color: hsl(var(--app-text)); font-variant-numeric: tabular-nums; }
    .review-summary-stats .stat-approve .detail-metric-value { color: hsl(var(--success)); }
    .review-summary-stats .stat-reject .detail-metric-value { color: hsl(var(--destructive)); }
    .review-summary-stats .stat-return .detail-metric-value { color: hsl(var(--warning-text)); }
    .review-summary-risk { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; font-size: 11px; color: hsl(var(--app-text-muted)); }
    .review-summary-risk .rk { display: inline-flex; align-items: center; gap: 4px; }
    .review-summary-risk .rk i { width: 7px; height: 7px; border-radius: 50%; }
    .review-summary-risk .rk-high i { background: hsl(var(--destructive)); }
    .review-summary-risk .rk-medium i { background: hsl(var(--warning)); }
    .review-summary-risk .rk-low i { background: hsl(var(--success)); }
    .review-summary-analysis { margin: 0; font-size: 12px; line-height: 1.7; color: hsl(var(--app-text-secondary)); }

    /* ── 单条列表项 ── */
    .yc-approve-inbox-row {
      position: relative; display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 12px; border-left: 3px solid transparent; cursor: pointer;
      transition: background .14s, border-color .14s;
    }
    .yc-approve-inbox-row:hover { background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-row.active { background: hsl(var(--primary) / .06); }
    .yc-approve-inbox-risk-high { border-left-color: hsl(var(--destructive)); }
    .yc-approve-inbox-risk-high .yc-approve-inbox-risk-dot { background: hsl(var(--destructive)); }
    .yc-approve-inbox-risk-high .yc-approve-inbox-row-title strong { color: hsl(var(--destructive)); }
    .yc-approve-inbox-risk-medium { border-left-color: hsl(var(--warning)); }
    .yc-approve-inbox-risk-medium .yc-approve-inbox-risk-dot { background: hsl(var(--warning)); }
    .yc-approve-inbox-risk-medium .yc-approve-inbox-row-title strong { color: hsl(var(--warning-text)); }
    .yc-approve-inbox-risk-low { border-left-color: hsl(var(--success)); }
    .yc-approve-inbox-risk-low .yc-approve-inbox-risk-dot { background: hsl(var(--success)); }
    .yc-approve-inbox-risk-low .yc-approve-inbox-row-title strong { color: hsl(var(--app-text)); }

    .yc-approve-inbox-checkbox {
      flex-shrink: 0; margin-top: 2px; width: 14px; height: 14px; cursor: pointer;
      accent-color: hsl(var(--primary)); opacity: 0; transition: opacity .12s;
    }
    .yc-approve-inbox-row:hover .yc-approve-inbox-checkbox,
    .yc-approve-inbox-checkbox:checked { opacity: 1; }

    .yc-approve-inbox-row-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
    .yc-approve-inbox-row-title { display: flex; align-items: center; gap: 6px; }
    .yc-approve-inbox-row-title strong {
      min-width: 0; font-size: 13px; font-weight: 600; line-height: 1.4;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .yc-approve-inbox-attachment-indicator {
      flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; color: hsl(var(--app-text-muted));
    }
    .yc-approve-inbox-attachment-indicator .yc-action-icon { width: 13px; height: 13px; }
    .yc-approve-inbox-risk-dot { flex-shrink: 0; width: 6px; height: 6px; border-radius: 50%; background: hsl(var(--app-text-subtle)); }

    /* ── 提交人 · 日期 meta 行 ── */
    .yc-approve-inbox-row-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: hsl(var(--app-text-subtle)); line-height: 1.4; white-space: nowrap; }
    .yc-approve-inbox-row-meta .meta-item { display: inline-flex; align-items: center; gap: 3px; }
    .yc-approve-inbox-row-meta .meta-sep { color: hsl(var(--app-border)); }
    /* 审批建议 tag（同行，tag 感，区别于审批按钮） */
    .yc-approve-inbox-advice-tag {
      margin-left: 2px; padding: 0 7px; height: 17px; border-radius: 9px; font-size: 10px; font-weight: 600;
      display: inline-flex; align-items: center; white-space: nowrap;
    }
    .yc-approve-inbox-advice-tag-approve { color: hsl(var(--success)); background: hsl(var(--success-soft)); }
    .yc-approve-inbox-advice-tag-caution { color: hsl(var(--warning-text)); background: hsl(var(--warning-soft)); }
    .yc-approve-inbox-advice-tag-reject { color: hsl(var(--destructive)); background: hsl(var(--destructive-soft)); }
    .yc-approve-inbox-advice-tag-attention { color: hsl(var(--warning-text)); background: hsl(var(--warning-soft)); }
    .yc-approve-inbox-tenant-tag {
      margin-left: 2px; padding: 0 7px; height: 17px; border-radius: 9px; font-size: 10px; font-weight: 500;
      display: inline-flex; align-items: center; white-space: nowrap; gap: 3px;
      color: hsl(var(--app-text-subtle)); background: hsl(var(--app-border-subtle) / .5); border: 1px solid hsl(var(--app-border));
    }
    .yc-message-center-list-tools { flex: 1 1 auto; margin-left: 12px; }
    .yc-approve-inbox-tenant-toggle {
      margin-left: 0; margin-right: auto; padding: 0; height: 28px; border-radius: 0; font-size: 12px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
      border: 0; background: transparent; color: hsl(var(--app-text-subtle));
    }
    .yc-approve-inbox-tenant-toggle.on { color: hsl(var(--app-text)); border-color: transparent; background: transparent; }
    .yc-approve-inbox-tenant-switch {
      position: relative; width: 32px; height: 18px; flex: 0 0 32px; border-radius: 999px;
      background: hsl(var(--app-border-hover)); transition: background .16s ease;
    }
    .yc-approve-inbox-tenant-switch::after {
      content: ""; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 999px;
      background: hsl(var(--app-bg)); box-shadow: 0 1px 3px hsl(222 40% 12% / .18); transition: transform .16s ease;
    }
    .yc-approve-inbox-tenant-toggle.on .yc-approve-inbox-tenant-switch { background: hsl(var(--primary)); }
    .yc-approve-inbox-tenant-toggle.on .yc-approve-inbox-tenant-switch::after { transform: translateX(14px); }
    .yc-approve-inbox-tenant-toggle-label { overflow: hidden; text-overflow: ellipsis; color: hsl(var(--app-text-secondary)); }
    .yc-approve-inbox-reanalyze-pending {
      height: 34px; padding: 0 13px; border: 1px solid hsl(var(--app-border-subtle)); border-radius: 8px;
      background: hsl(var(--app-surface)); color: hsl(var(--app-text-muted));
      font-size: 13px; font-weight: 400; cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
      transition: border-color .16s ease, background .16s ease, color .16s ease;
    }
    .yc-approve-inbox-reanalyze-pending:hover:not(:disabled) { border-color: hsl(var(--app-border-hover)); background: hsl(var(--app-surface-hover)); color: hsl(var(--app-text)); }
    .yc-approve-inbox-reanalyze-pending:disabled { opacity: .6; cursor: default; }

    /* ── 智能 tags ── */
    .yc-approve-inbox-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .yc-approve-inbox-tag {
      display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 4px;
      font-size: 11px; font-weight: 500; line-height: 18px; white-space: nowrap;
      max-width: 100%; overflow: hidden; text-overflow: ellipsis;
    }
    .yc-approve-inbox-tag-risk { color: hsl(var(--destructive)); background: hsl(var(--destructive-soft)); border: 1px solid hsl(var(--destructive-border)); }
    .yc-approve-inbox-tag-rule { color: hsl(var(--warning-text)); background: hsl(var(--warning-soft)); border: 1px solid hsl(var(--warning-border)); }
    .yc-approve-inbox-tag-advice { color: hsl(var(--success)); background: hsl(var(--success-soft)); border: 1px solid hsl(var(--success-border)); }
    .yc-approve-inbox-tag-default { color: hsl(var(--app-text-muted)); background: hsl(var(--app-surface-subtle)); border: 1px solid hsl(var(--app-border-subtle)); }
    .yc-approve-inbox-tag-overflow { color: hsl(var(--app-text-subtle)); background: none; border: 1px solid hsl(var(--app-border-subtle)); }

    /* ── 行操作 ── */
    /* 行操作：默认隐藏，只在 hover 到当前行时显示（与 YonClaw 一致） */
    .yc-approve-inbox-row-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; opacity: 0; pointer-events: none; transition: opacity .14s ease; }
    .yc-approve-inbox-row:hover .yc-approve-inbox-row-actions { opacity: 1; pointer-events: auto; }
    .yc-approve-inbox-row-btn {
      padding: 2px 8px; height: 24px; border: 1px solid hsl(var(--app-border)); border-radius: 4px;
      background: hsl(var(--app-surface)); color: hsl(var(--app-text-muted)); font-size: 11px; font-weight: 500;
      cursor: pointer; white-space: nowrap; transition: color .12s, border-color .12s, background .12s;
    }
    .yc-approve-inbox-row-btn:hover { color: hsl(var(--app-text)); border-color: hsl(var(--app-border-hover)); background: hsl(var(--app-surface-hover)); }
    /* 通过=主操作（用友红实心，与 YonClaw 一致）；驳回=描边幽灵 */
    .yc-approve-inbox-row-btn-approve { color: hsl(var(--primary-foreground)); border-color: hsl(var(--primary)); background: hsl(var(--primary)); font-weight: 600; }
    .yc-approve-inbox-row-btn-approve:hover { background: var(--yc-control-primary-hover); border-color: var(--yc-control-primary-hover); color: hsl(var(--primary-foreground)); }
    .yc-approve-inbox-row-btn-reject { color: hsl(var(--app-text-muted)); border-color: hsl(var(--app-border)); background: hsl(var(--app-surface)); }
    .yc-approve-inbox-row-btn-reject:hover { color: hsl(var(--app-text)); border-color: hsl(var(--app-border-hover)); background: hsl(var(--app-surface-hover)); }

    /* ── 已选条 ── */
    .yc-approve-inbox-selection-bar {
      display: flex; align-items: center; justify-content: space-between; padding: 6px 12px;
      border-top: 1px solid hsl(var(--app-border-subtle)); background: hsl(var(--primary) / .05);
      color: hsl(var(--app-text-muted)); font-size: 12px; flex-shrink: 0;
    }
    .yc-approve-inbox-selection-bar button {
      padding: 2px 8px; border: 1px solid hsl(var(--app-border)); border-radius: 4px; background: none;
      color: hsl(var(--app-text-muted)); font-size: 12px; cursor: pointer;
    }
    .yc-approve-inbox-selection-bar button:hover { color: hsl(var(--app-text)); background: hsl(var(--app-surface-hover)); }

    /* ========== 详情抽屉 ========== */
    .yc-approve-inbox-detail {
      --yc-cockpit-danger: 0 72% 51%;
      --yc-cockpit-warning: 38 92% 50%;
      --yc-cockpit-success: 160 84% 39%;
      --yc-cockpit-tag-danger: hsl(var(--yc-cockpit-danger));
      --yc-cockpit-tag-danger-soft: color-mix(in srgb, hsl(var(--yc-cockpit-danger)) 16%, hsl(var(--app-surface)));
      --yc-cockpit-tag-warning: hsl(var(--yc-cockpit-warning));
      --yc-cockpit-tag-warning-soft: color-mix(in srgb, hsl(var(--yc-cockpit-warning)) 16%, hsl(var(--app-surface)));
      --yc-cockpit-tag-success: hsl(var(--yc-cockpit-success));
      --yc-cockpit-tag-success-soft: color-mix(in srgb, hsl(var(--yc-cockpit-success)) 16%, hsl(var(--app-surface)));
      display: flex; flex-direction: column; flex: 1; min-height: 0; height: 100%; overflow: hidden;
      background: hsl(var(--app-surface)); border-left: 1px solid hsl(var(--app-border-subtle));
      font-size: 13px; color: hsl(var(--app-text));
    }
    :root[data-theme="dark"] .yc-approve-inbox-detail,
    :root[data-theme="night"] .yc-approve-inbox-detail,
    :root[data-theme="black"] .yc-approve-inbox-detail,
    :root[data-theme="暗黑"] .yc-approve-inbox-detail {
      --yc-cockpit-tag-danger-soft: color-mix(in srgb, hsl(var(--yc-cockpit-danger)) 24%, hsl(var(--app-surface)));
      --yc-cockpit-tag-warning-soft: color-mix(in srgb, hsl(var(--yc-cockpit-warning)) 24%, hsl(var(--app-surface)));
      --yc-cockpit-tag-success-soft: color-mix(in srgb, hsl(var(--yc-cockpit-success)) 24%, hsl(var(--app-surface)));
    }
    .yc-approve-inbox-detail-loading {
      flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; gap: 8px;
      color: hsl(var(--app-text-muted));
    }
    .yc-approve-inbox-detail-loading::before {
      content: ''; width: 18px; height: 18px; flex: 0 0 18px;
      border: 2px solid hsl(var(--app-border)); border-top-color: hsl(var(--primary)); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .yc-approve-inbox-detail-header {
      display: flex; align-items: center; gap: 8px; padding: 14px 16px;
      border-bottom: 1px solid hsl(var(--app-border-subtle)); flex-shrink: 0;
    }
    .yc-approve-inbox-detail-title {
      flex: 1; min-width: 0; font-size: 14px; font-weight: 700; line-height: 1.4;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .yc-approve-inbox-detail-nav {
      flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
    }
    .yc-approve-inbox-detail-nav-pair { display: inline-flex; align-items: center; gap: 0; }
    .yc-approve-inbox-detail-nav-pair .yc-approve-inbox-detail-nav-btn:first-child { border-radius: 6px 0 0 6px; }
    .yc-approve-inbox-detail-nav-pair .yc-approve-inbox-detail-nav-btn:last-child { border-radius: 0 6px 6px 0; }
    .yc-approve-inbox-detail-nav-pair .yc-approve-inbox-detail-nav-btn + .yc-approve-inbox-detail-nav-btn { margin-left: -1px; }
    .yc-approve-inbox-detail-nav-btn,
    .yc-approve-inbox-detail-close {
      flex-shrink: 0; width: 28px; height: 28px; display: grid; place-items: center;
      border: 1px solid hsl(var(--app-border-subtle)); border-radius: 6px; background: none;
      color: hsl(var(--app-text-muted)); cursor: pointer; text-decoration: none; transition: color .12s, background .12s;
    }
    .yc-approve-inbox-detail-nav-btn:hover:not(:disabled),
    .yc-approve-inbox-detail-close:hover { color: hsl(var(--app-text)); background: hsl(var(--app-surface-hover)); }
    .yc-approve-inbox-detail-nav-btn:disabled { opacity: .34; cursor: not-allowed; }
    .yc-approve-inbox-detail-nav-btn .yc-action-icon,
    .yc-approve-inbox-detail-close .yc-action-icon { width: 14px; height: 14px; }

    .yc-approve-inbox-fallback-notice {
      display: flex; align-items: center; gap: 6px; padding: 6px 16px;
      background: hsl(var(--warning-soft)); color: hsl(var(--warning-text)); font-size: 12px; font-weight: 500; flex-shrink: 0;
    }
    .yc-approve-inbox-fallback-notice .yc-action-icon { width: 13px; height: 13px; }
    .yc-approve-inbox-detail-loading { background: hsl(var(--app-surface)); color: hsl(var(--app-text-muted)); }

    .yc-approve-inbox-detail-body { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 20px; }
    .yc-approve-inbox-detail-section { display: flex; flex-direction: column; gap: 10px; }
    /* 真实单据字段 grid */
    .yc-approve-inbox-rawfields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px; }
    .yc-approve-inbox-rawfields .rf-row { display: flex; flex-direction: column; gap: 1px; min-width: 0; padding: 4px 8px; border-radius: 5px; background: hsl(var(--app-surface-subtle)); }
    .yc-approve-inbox-rawfields .rf-row.full { grid-column: 1 / -1; }
    .yc-approve-inbox-rawfields .rf-k { font-size: 12px; color: hsl(var(--app-text-subtle)); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .yc-approve-inbox-rawfields .rf-v { font-size: 12px; color: hsl(var(--app-text)); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .yc-approve-inbox-field-toggle {
      display: flex; width: max-content; align-items: center; gap: 3px; margin: 4px auto 0; padding: 0; border: 0;
      color: hsl(var(--app-text-muted) / .78); font: inherit; font-size: 12px; font-weight: 700; background: transparent; cursor: pointer;
    }
    .yc-approve-inbox-field-toggle .yc-action-icon { width: 12px; height: 12px; }
    .yc-approve-inbox-enriching { background: hsl(var(--primary) / .08); color: hsl(var(--primary)); }
    .yc-approve-inbox-enriching .yc-action-icon { animation: pulse 1s infinite; }
    .yc-approve-inbox-section-title {
      margin: 0; font-size: 12px; font-weight: 700; color: hsl(var(--app-text-muted));
      text-transform: uppercase; letter-spacing: 0;
    }
    .yc-approve-inbox-section-summary { display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: pointer; list-style: none; }
    .yc-approve-inbox-section-summary::-webkit-details-marker { display: none; }
    .yc-approve-inbox-section-count { flex-shrink: 0; min-width: 20px; height: 18px; padding: 0 6px; border-radius: 999px; background: hsl(var(--app-surface-subtle)); color: hsl(var(--app-text-subtle)); font-size: 11px; line-height: 18px; text-align: center; }
    .yc-approve-inbox-section-note { margin: 0; color: hsl(var(--app-text-subtle)); font-size: 12px; line-height: 1.5; }
    .yc-approve-inbox-section-heading-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }

    /* ① 智能建议 */
    .yc-approve-inbox-detail-insight { --yc-approve-inbox-advice-tone: hsl(var(--warning-text)); align-self: stretch; }
    .yc-approve-inbox-detail-insight-approve { --yc-approve-inbox-advice-tone: hsl(var(--success)); }
    .yc-approve-inbox-detail-insight-caution { --yc-approve-inbox-advice-tone: hsl(var(--warning-text)); }
    .yc-approve-inbox-detail-insight-reject { --yc-approve-inbox-advice-tone: hsl(var(--destructive)); }
    .yc-approve-inbox-detail-advice-icon-stop-start { stop-color: var(--yc-chart-ai-accent); }
    .yc-approve-inbox-detail-advice-icon-stop-end { stop-color: var(--yc-approve-inbox-advice-tone); }
    .yc-approve-inbox-detail-advice-icon-glyph * { fill: url(#ycApproveInboxAdviceIconGradient) !important; }
    .yc-approve-inbox-detail-advice {
      display: block; margin: 0; padding: 0; min-height: 0; border: 0; background: none; box-shadow: none;
      color: var(--yc-approve-inbox-advice-tone); font-size: 16px; line-height: 1.5; font-weight: 700;
    }
    .yc-approve-inbox-detail-insight-analysis { padding: 2px 2px 0; }
    .yc-approve-inbox-system-status {
      flex-shrink: 0; display: inline-flex; align-items: center; min-height: 20px; padding: 0 8px; border-radius: 999px;

    /* ── 无障碍：键盘焦点环 ── */

        z-index: 50; border-radius: 16px 16px 0 0;

      return: { label: '退回', title: '确认退回', defaultComment: '资料需补充，请退回修改', primary: '确认退回' },
    };

    function itemById(id) {
      return (state.data?.items || []).find(i => i.id === id) || null;
    }

    function approvalProcessing(item) {
      const processing = item && item.approvalProcessing;
      return processing && (processing.state === 'processing' || processing.state === 'needs_review') ? processing : null;
    }

    function approvalPhaseLabel(processing) {
      return ({
        queued: '等待后台开始',
        background_started: '后台处理中',
        refresh_actions: '正在刷新审批动作',
        identity_precheck: '正在复核账号和租户',
        remote_request: '等待远端审批结果',
        identity_postcheck: '正在确认远端结果',
        reconciliation: '等待结果核对',
      })[processing?.phase] || (processing?.state === 'needs_review' ? '等待结果核对' : '后台处理中');
    }

    function openApprovalDialog(ids, action) {
      const cleanIds = [...new Set((ids || []).filter(Boolean))];
      if (!cleanIds.length) { toast('请先选择要处理的单据', 'info'); return; }
      const blocked = cleanIds.map(itemById).find(approvalProcessing);
      if (blocked) { toast('该单据正在处理或等待结果核对，暂不能再次操作', 'info'); return; }
      const act = ACTION_COPY[action] ? action : 'approve';
      state.approvalDialog = {
        ids: cleanIds,
        action: act,
        comment: ACTION_COPY[act].defaultComment,
        rejectTarget: '-1',
        selectedByRejecter: '0',
        submitting: false,
      };
      render();
      setTimeout(() => {
        const textarea = document.getElementById('approvalComment');
        if (textarea) textarea.focus();
      }, 0);
    }

    function closeApprovalDialog() {
      state.approvalDialog = null;
      render();
    }

    const APPROVAL_SELECT_OPTIONS = {
      rejectTarget: [
        { value: '-1', label: '退回制单人' },
        { value: '-2', label: '终止流程' },
      ],
      selectedByRejecter: [
        { value: '0', label: '重新依次审批' },
        { value: '1', label: '直接返回驳回环节' },
      ],
    };

    function renderApprovalSelect(field, label, value) {
      const options = APPROVAL_SELECT_OPTIONS[field] || [];
      const selected = options.find(option => option.value === value) || options[0] || { value: '', label: '' };
      const id = field === 'rejectTarget' ? 'approvalRejectTarget' : 'approvalSelectedByRejecter';
      const labelId = id + 'Label';
      let h = '<div class="yc-approval-field"><label id="' + labelId + '">' + esc(label) + '</label>' +
        '<div class="yc-approval-select select dropdown" data-approval-select="' + esc(field) + '">' +
          '<button type="button" class="yc-approval-select-trigger select-selection dropdown-trigger" id="' + id + '" data-approval-select-trigger aria-haspopup="listbox" aria-expanded="false" aria-labelledby="' + labelId + ' ' + id + 'Value">' +
            '<span id="' + id + 'Value" data-approval-select-value>' + esc(selected.label) + '</span>' +
            '<span class="yc-approval-select-arrow select-arrow">' + icon('chevronDown') + '</span>' +
          '</button>' +
          '<div class="yc-approval-select-menu select-dropdown dropdown-menu" role="listbox" aria-labelledby="' + labelId + '" hidden>';
      for (const option of options) {
        const isSelected = option.value === selected.value;
        h += '<button type="button" class="yc-approval-select-option select-item dropdown-item' + (isSelected ? ' select-item-selected' : '') + '" role="option" aria-selected="' + isSelected + '" data-approval-select-option data-value="' + esc(option.value) + '">' +
          '<span>' + esc(option.label) + '</span>' +
          '<span class="yc-approval-select-check' + (isSelected ? '' : ' yc-approval-select-check-empty') + '">' + icon('check') + '</span>' +
        '</button>';
      }
      return h + '</div></div></div>';
    }

    function closeApprovalSelectMenus(exceptSelect) {
      document.querySelectorAll('[data-approval-select]').forEach((select) => {
        if (select === exceptSelect) return;
        select.classList.remove('dropdown-open');
        const trigger = select.querySelector('[data-approval-select-trigger]');
        const menu = select.querySelector('.yc-approval-select-menu');
        if (trigger) trigger.setAttribute('aria-expanded', 'false');
        if (menu) menu.hidden = true;
      });
    }

    function toggleApprovalSelect(trigger) {
      const select = trigger.closest('[data-approval-select]');
      const menu = select?.querySelector('.yc-approval-select-menu');
      if (!select || !menu) return;
      const willOpen = menu.hidden;
      closeApprovalSelectMenus(select);
      select.classList.toggle('dropdown-open', willOpen);
      trigger.setAttribute('aria-expanded', String(willOpen));
      menu.hidden = !willOpen;
    }

    function chooseApprovalSelectOption(option) {
      const select = option.closest('[data-approval-select]');
      const field = select?.dataset.approvalSelect;
      const value = option.dataset.value || '';
      if (!select || !field || !state.approvalDialog) return;
      state.approvalDialog[field] = value;
      const valueNode = select.querySelector('[data-approval-select-value]');
      if (valueNode) valueNode.textContent = option.querySelector('span')?.textContent || '';
      select.querySelectorAll('[data-approval-select-option]').forEach((item) => {
        const selected = item === option;
        item.classList.toggle('select-item-selected', selected);
        item.setAttribute('aria-selected', String(selected));
        item.querySelector('.yc-approval-select-check')?.classList.toggle('yc-approval-select-check-empty', !selected);
      });
      closeApprovalSelectMenus();
    }

    function renderApprovalDialog() {
      const d = state.approvalDialog;
      if (!d) return '';
      const copy = ACTION_COPY[d.action] || ACTION_COPY.approve;
      const items = d.ids.map(itemById).filter(Boolean);
      let h = '<div class="yc-approval-modal-layer" role="presentation" data-approval-overlay>' +
        '<section class="yc-approval-modal" role="dialog" aria-modal="true" aria-labelledby="approvalDialogTitle">' +
        '<header class="yc-approval-modal-header"><strong class="yc-approval-modal-title" id="approvalDialogTitle">' + esc(copy.title) + '</strong>' +
        '<button type="button" class="yc-approval-modal-close" data-approval-close aria-label="关闭">' + icon('close') + '</button></header>' +
        '<div class="yc-approval-modal-body">' +
        '<p class="yc-approval-modal-summary">即将' + esc(copy.label) + ' ' + d.ids.length + ' 条单据。真实数据会先执行 YonBIP 审批，成功后才移入已办。</p>';
      if (items.length) {
        h += '<ul class="yc-approval-modal-list">';
        for (const item of items.slice(0, 4)) h += '<li title="' + esc(item.title) + '">' + esc(item.title) + '</li>';
        if (items.length > 4) h += '<li>还有 ' + (items.length - 4) + ' 条</li>';
        h += '</ul>';
      }
      h += '<div class="yc-approval-field"><label for="approvalComment">审批意见</label>' +
        '<textarea id="approvalComment" data-approval-field="comment">' + esc(d.comment) + '</textarea></div>';
      if (d.action !== 'approve') {
        h += renderApprovalSelect('rejectTarget', '退回目标', d.rejectTarget) +
          renderApprovalSelect('selectedByRejecter', '再次提交后', d.selectedByRejecter);
      }
      h += '</div><footer class="yc-approval-modal-footer">' +
        '<button type="button" class="yc-approval-modal-btn" data-approval-close' + (d.submitting ? ' disabled' : '') + '>取消</button>' +
        '<button type="button" class="yc-approval-modal-btn yc-approval-modal-btn-primary" data-approval-submit' + (d.submitting ? ' disabled' : '') + '>' +
        (d.submitting ? '处理中…' : esc(copy.primary)) + '</button>' +
        '</footer></section></div>';
      return h;
    }

    function readApprovalDialogForm() {
      const d = state.approvalDialog;
      if (!d) return null;
      const comment = document.getElementById('approvalComment')?.value || '';
      return {
        action: d.action,
        comment: comment.trim() || ACTION_COPY[d.action].defaultComment,
        rejectTarget: d.rejectTarget || '-1',
        selectedByRejecter: d.selectedByRejecter || '0',
      };
    }

    function formatFileSize(bytes) {
      const n = Number(bytes || 0);
      if (!n) return '-';
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return Math.round(n / 1024) + ' KB';
      return (n / 1024 / 1024).toFixed(1) + ' MB';
    }

    function attachmentSourceInfo(source) {
      const raw = displayText(source).toLowerCase();
      if (raw.includes('comment')) return { key: 'comment', label: '评论附件' };
      if (raw.includes('task')) return { key: 'task', label: '任务附件' };
      if (raw.includes('approval') || raw.includes('approve') || raw.includes('workflow')) return { key: 'approval', label: '审批附件' };
      if (raw.includes('analysis')) return { key: 'analysis', label: '已识别' };
      if (raw === 'mdf-file-api' || raw.includes('file-api') || raw.includes('standard') || raw.includes('detail')) return { key: 'standard', label: '标准附件' };
      if (!raw) return { key: 'standard', label: '标准附件' };
      return { key: 'other', label: '其他附件' };
    }

    function attachmentFilterOptions(rows) {
      const counts = new Map();
      const labels = new Map();
      for (const row of rows) {
        counts.set(row.sourceKey, (counts.get(row.sourceKey) || 0) + 1);
        labels.set(row.sourceKey, row.sourceLabel);
      }
      const preferred = ['standard', 'comment', 'task', 'approval', 'analysis', 'other'];
      const keys = Array.from(counts.keys()).sort((a, b) => {
        const ai = preferred.indexOf(a);
        const bi = preferred.indexOf(b);
        return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi) || a.localeCompare(b);
      });
      return [{ key: 'all', label: '全部', count: rows.length }].concat(keys.map(key => ({
        key,
        label: labels.get(key) || attachmentSourceInfo(key).label,
        count: counts.get(key) || 0
      })));
    }

    function activeAttachmentFilter(options) {
      const keys = new Set(options.map(option => option.key));
      return keys.has(state.attachmentFilter) ? state.attachmentFilter : 'all';
    }

    function attachmentCacheLabel(att) {
      if (att.error) return '解析异常';
      if (att.localPath) return '已缓存';
      return '未缓存正文';
    }

    function attachmentRowsForDetail(d) {
      if (!d) return [];
      const attachmentAnalysis = Array.isArray(d.attachmentAnalysis) ? d.attachmentAnalysis : [];
      const attachments = Array.isArray(d.attachments) ? d.attachments : [];
      return (attachments.length ? attachments : attachmentAnalysis.map(a => ({ fileName: a.name, fileType: a.fileType, source: 'analysis' }))).map((a, idx) => {
        const name = displayText(a.fileName || a.name);
        const analysis = attachmentAnalysis.find(x => x && x.name === name) || attachmentAnalysis[idx] || null;
        const sourceInfo = attachmentSourceInfo(a.source);
        return {
          fileName: name,
          fileType: displayText(a.fileType || (analysis && analysis.fileType) || ''),
          size: a.size,
          localPath: a.localPath || null,
          error: a.error || null,
          source: displayText(a.source || ''),
          sourceKey: sourceInfo.key,
          sourceLabel: sourceInfo.label,
          analysis
        };
      }).filter(a => a.fileName);
    }

    function attachmentExt(att) {
      const type = displayText(att && att.fileType).toLowerCase().replace(/^\./, '');
      if (type) return type;
      const name = displayText(att && att.fileName).toLowerCase();
      const idx = name.lastIndexOf('.');
      return idx >= 0 ? name.slice(idx + 1) : '';
    }

    function isImageAttachment(att) {
      return /^(png|jpe?g|gif|webp|bmp|svg|ico)$/.test(attachmentExt(att));
    }

    const TEXT_PREVIEW_EXTENSIONS = new Set(['txt','text','log','csv','json','xml','md','markdown','js','ts','jsx','tsx','css','html','htm','sql','yml','yaml','ini','conf','sh']);
    const WORD_PREVIEW_EXTENSIONS = new Set(['doc','docx','rtf']);
    const SPREADSHEET_PREVIEW_EXTENSIONS = new Set(['xls','xlsx']);
    const PREVIEW_SCRIPT_URLS = {
      mammoth: 'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js',
      xlsx: 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js'
    };
    const previewScriptPromises = {};
    let attachmentPreviewObjectUrl = '';

    function revokeAttachmentPreviewObjectUrl() {
      if (attachmentPreviewObjectUrl) {
        URL.revokeObjectURL(attachmentPreviewObjectUrl);
        attachmentPreviewObjectUrl = '';
      }
    }

    function attachmentPreviewUrl(att) {
      if (!state.activeItemId || !att || !att.localPath || !att.fileName) return '';
      return '/api/attachments/' + encodeURIComponent(state.activeItemId) + '/' + encodeURIComponent(att.fileName);
    }

    function appendPreviewParam(url) {
      return url + (url.includes('?') ? '&' : '?') + 'preview=html';
    }

    function sanitizePreviewHtml(html) {
      const doc = new DOMParser().parseFromString(html || '', 'text/html');
      doc.querySelectorAll('script,style,iframe,object,embed,link,meta').forEach(node => node.remove());
      doc.querySelectorAll('*').forEach(node => {
        Array.from(node.attributes).forEach(attr => {
          const name = attr.name.toLowerCase();
          const value = String(attr.value || '').trim().toLowerCase();
          if (name.startsWith('on') || ((name === 'href' || name === 'src' || name === 'xlink:href') && value.startsWith('javascript:'))) {
            node.removeAttribute(attr.name);
          }
        });
      });
      return doc.body.innerHTML;
    }

    function csvToPreviewHtml(text) {
      const rows = String(text || '').split(/\r?\n/).filter(row => row.trim()).slice(0, 120).map(row => row.split(',').map(cell => cell.trim()));
      if (!rows.length) return '<p class="yc-attachment-preview-empty">文件为空。</p>';
      return '<table><tbody>' + rows.map((row, rowIndex) => {
        const tag = rowIndex === 0 ? 'th' : 'td';
        return '<tr>' + row.map(cell => '<' + tag + '>' + esc(cell) + '</' + tag + '>').join('') + '</tr>';
      }).join('') + '</tbody></table>';
    }

    function loadPreviewScript(name) {
      if ((name === 'mammoth' && window.mammoth) || (name === 'xlsx' && window.XLSX)) return Promise.resolve();
      if (!previewScriptPromises[name]) {
        previewScriptPromises[name] = new Promise((resolve, reject) => {
          const existing = document.getElementById('yc-preview-lib-' + name);
          if (existing) {
            existing.addEventListener('load', resolve, { once: true });
            existing.addEventListener('error', () => reject(new Error('预览库加载失败')), { once: true });
            return;
          }
          const script = document.createElement('script');
          script.id = 'yc-preview-lib-' + name;
          script.src = PREVIEW_SCRIPT_URLS[name];
          script.async = true;
          script.onload = resolve;
          script.onerror = () => reject(new Error('预览库加载失败'));
          document.head.appendChild(script);
        });
      }
      return previewScriptPromises[name];
    }

    async function readPreviewError(response) {
      try {
        const data = await response.json();
        return data.issue?.userMessage || data.error || data.message || ('HTTP ' + response.status);
      } catch (_) {
        return 'HTTP ' + response.status;
      }
    }

    async function guardAttachmentIdentityResponse(response) {
      if (response.ok && response.status !== 401) return false;
      const payload = await response.clone().json().catch(() => ({}));
      return applyApiIdentityGuard(payload, response.status);
    }

    async function fetchAttachmentForPreview(url) {
      const response = await fetch(url, { credentials: 'same-origin' });
      if (await guardAttachmentIdentityResponse(response)) throw apiIdentityGuardedError();
      if (!response.ok) throw new Error(await readPreviewError(response));
      return response;
    }

    async function tryServerHtmlPreview(url) {
      const response = await fetch(appendPreviewParam(url), { credentials: 'same-origin' });
      if (await guardAttachmentIdentityResponse(response)) throw apiIdentityGuardedError();
      if (!response.ok) throw new Error(await readPreviewError(response));
      return sanitizePreviewHtml(await response.text());
    }

    async function buildAttachmentPreviewContent(att) {
      const url = attachmentPreviewUrl(att);
      if (!url) {
        return { status: 'message', message: '附件正文暂未缓存。已显示当前可用的附件元信息和智能分析结果；重新分析拿到下载地址后可在此直接预览。' };
      }
      const ext = attachmentExt(att);
      if (isImageAttachment(att)) {
        const blob = await (await fetchAttachmentForPreview(url)).blob();
        return { status: 'ready', kind: 'image', objectUrl: URL.createObjectURL(blob) };
      }
      if (ext === 'pdf') {
        const blob = await (await fetchAttachmentForPreview(url)).blob();
        return { status: 'ready', kind: 'iframe', objectUrl: URL.createObjectURL(blob) };
      }
      if (TEXT_PREVIEW_EXTENSIONS.has(ext)) {
        const text = await (await fetchAttachmentForPreview(url)).text();
        if (ext === 'csv') return { status: 'ready', kind: 'html', html: csvToPreviewHtml(text) };
        if (ext === 'json') {
          try {
            return { status: 'ready', kind: 'text', text: JSON.stringify(JSON.parse(text), null, 2).slice(0, 200000) };
          } catch (_) {
            return { status: 'ready', kind: 'text', text: text.slice(0, 200000) };
          }
        }
        return { status: 'ready', kind: 'text', text: text.slice(0, 200000) };
      }
      if (WORD_PREVIEW_EXTENSIONS.has(ext)) {
        let serverError = '';
        if (ext === 'doc' || ext === 'rtf') {
          try {
            return { status: 'ready', kind: 'html', html: await tryServerHtmlPreview(url) };
          } catch (e) {
            if (e && e.apiIdentityGuarded) throw e;
            serverError = e && e.message ? e.message : String(e);
          }
        }
        try {
          await loadPreviewScript('mammoth');
          if (!window.mammoth) throw new Error('Word 预览库不可用');
          const arrayBuffer = await (await fetchAttachmentForPreview(url)).arrayBuffer();
          const result = await window.mammoth.convertToHtml({ arrayBuffer });
          return { status: 'ready', kind: 'html', html: sanitizePreviewHtml(result.value) };
        } catch (e) {
          if (e && e.apiIdentityGuarded) throw e;
          try {
            return { status: 'ready', kind: 'html', html: await tryServerHtmlPreview(url) };
          } catch (serverPreviewError) {
            if (serverPreviewError && serverPreviewError.apiIdentityGuarded) throw serverPreviewError;
            const clientError = e && e.message ? e.message : String(e);
            throw new Error(serverError ? clientError + '；' + serverError : clientError);
          }
        }
      }
      if (SPREADSHEET_PREVIEW_EXTENSIONS.has(ext)) {
        await loadPreviewScript('xlsx');
        if (!window.XLSX) throw new Error('Excel 预览库不可用');
        const arrayBuffer = await (await fetchAttachmentForPreview(url)).arrayBuffer();
        const workbook = window.XLSX.read(arrayBuffer, { type: 'array' });
        const sheetName = workbook.SheetNames && workbook.SheetNames[0];
        if (!sheetName) return { status: 'message', message: '工作簿没有可预览的工作表。' };
        return { status: 'ready', kind: 'html', html: sanitizePreviewHtml(window.XLSX.utils.sheet_to_html(workbook.Sheets[sheetName], { editable: false })) };
      }
      return { status: 'message', message: '当前格式暂不支持浏览器内嵌预览，可点击下方“打开原文件”。' };
    }

    function openAttachmentPreview(index) {
      const rows = attachmentRowsForDetail(state.detail);
      const att = rows[Number(index)];
      if (!att) return;
      revokeAttachmentPreviewObjectUrl();
      state.attachmentPreview = att;
      state.attachmentPreviewContent = { status: 'loading' };
      render();
      buildAttachmentPreviewContent(att).then(content => {
        if (state.attachmentPreview !== att) {
          if (content && content.objectUrl) URL.revokeObjectURL(content.objectUrl);
          return;
        }
        revokeAttachmentPreviewObjectUrl();
        if (content && content.objectUrl) attachmentPreviewObjectUrl = content.objectUrl;
        state.attachmentPreviewContent = content;
        render();
      }).catch(error => {
        if (state.attachmentPreview !== att) return;
        if (error && error.apiIdentityGuarded) return;
        state.attachmentPreviewContent = { status: 'error', message: error && error.message ? error.message : String(error) };
        render();
      });
    }

    function closeAttachmentPreview() {
      revokeAttachmentPreviewObjectUrl();
      state.attachmentPreview = null;
      state.attachmentPreviewContent = { status: 'idle' };
      render();
    }

    async function runAttachmentFileAction(link) {
      const url = link && link.dataset.attachmentApiUrl;
      const action = link && link.dataset.attachmentFileAction;
      if (!url || (action !== 'open' && action !== 'download')) return;
      const previewWindow = action === 'open' ? window.open('', '_blank') : null;
      try {
        const response = await fetchAttachmentForPreview(url);
        const objectUrl = URL.createObjectURL(await response.blob());
        if (action === 'open' && previewWindow) {
          previewWindow.location.href = objectUrl;
        } else {
          const anchor = document.createElement('a');
          anchor.href = objectUrl;
          if (action === 'open') anchor.target = '_blank';
          if (action === 'download') anchor.download = link.getAttribute('download') || 'attachment';
          anchor.rel = 'noopener';
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
        }
        setTimeout(() => URL.revokeObjectURL(objectUrl), 60000);
      } catch (error) {
        if (previewWindow) previewWindow.close();
        if (error && error.apiIdentityGuarded) return;
        toast(error && error.message ? error.message : '附件读取失败', 'error');
      }
    }

    function renderAttachmentPreview() {
      const att = state.attachmentPreview;
      if (!att) return '';
      const url = attachmentPreviewUrl(att);
      const summary = att.analysis && att.analysis.summary
        ? att.analysis.summary
        : ('已识别附件' + (att.size ? '（' + formatFileSize(att.size) + '）' : '') + '，正文内容解析待完成。');
      let pane = '';
      const content = state.attachmentPreviewContent || { status: 'idle' };
      if (content.status === 'loading') {
        pane = '<p class="yc-attachment-preview-empty">正在生成预览…</p>';
      } else if (content.status === 'message') {
        pane = '<p class="yc-attachment-preview-empty">' + esc(content.message) + '</p>';
      } else if (content.status === 'error') {
        pane = '<p class="yc-attachment-preview-empty yc-attachment-preview-error">预览失败：' + esc(content.message) + '</p>';
      } else if (content.status === 'ready' && content.kind === 'image') {
        pane = '<img src="' + esc(content.objectUrl) + '" alt="' + esc(att.fileName) + '" />';
      } else if (content.status === 'ready' && content.kind === 'iframe') {
        pane = '<iframe src="' + esc(content.objectUrl) + '" title="' + esc(att.fileName) + '"></iframe>';
      } else if (content.status === 'ready' && content.kind === 'text') {
        pane = '<pre class="yc-attachment-preview-text">' + esc(content.text) + '</pre>';
      } else if (content.status === 'ready' && content.kind === 'html') {
        pane = '<div class="yc-attachment-preview-html">' + content.html + '</div>';
      } else {
        pane = '<p class="yc-attachment-preview-empty">准备预览…</p>';
      }
      let findings = '';
      if (att.analysis && Array.isArray(att.analysis.findings) && att.analysis.findings.length) {
        findings += '<ul class="yc-approve-inbox-findings">';
        for (const fd of att.analysis.findings) {
          findings += '<li>' + (fd.name ? '<strong>' + esc(fd.name) + '：</strong>' : '') + esc(fd.detail) + '</li>';
        }
        findings += '</ul>';
      }

    function recoveryActionsFor(status, res) {
      const issue = responseIssue(res) || {};
      const recovery = issue.recovery || res?.recovery;
      const actions = [];
      if (Array.isArray(recovery)) {
        for (const action of recovery) if (action?.action) actions.push(action);
      } else if (recovery && typeof recovery === 'object') {
        if (recovery.action) actions.push({ action: recovery.action, label: recovery.label, url: recovery.url, env: recovery.env });
        if (recovery.retryAction) actions.push({ action: recovery.retryAction, label: recovery.retryLabel });
      }
      if (status === 'auth_required') {
        if (!actions.some(a => a.action === 'reopen-in-yonwork')) {
          actions.unshift({ action: 'reopen-in-yonwork', label: '从 YonWork 重新进入智能待办' });
        }
        return actions.filter((action, index) =>
          action.action !== 'sync'
          && action.action !== 'retry-sync'
          && action.action !== 'open-login'
          && action.action !== 'login-in-yonwork'
          && actions.findIndex(other => other.action === action.action) === index
        );
      } else if (status === 'identity_mismatch') {
        if (!actions.some(a => a.action === 'sync' || a.action === 'retry-sync')) actions.push({ action: 'retry-sync', label: '同步当前账号' });
      } else if (status === 'service_context_mismatch') {
        if (!actions.some(a => a.action === 'sync' || a.action === 'retry-sync')) actions.push({ action: 'retry-sync', label: '重新连接' });
      } else if (status === 'stale_same_identity' || status === 'unavailable') {
        if (!actions.some(a => a.action === 'sync' || a.action === 'retry-sync')) actions.push({ action: 'retry-sync', label: '重新刷新' });
      }
      return actions.filter((action, index) => actions.findIndex(other => other.action === action.action) === index);
    }

    function configuredColumnsForItems(items) {
      const cfg = state.tableViewConfig || {};

      const groupKey = keys.length === 1 && groups[keys[0]] ? keys[0] : 'default';
      const columns = (groups[groupKey] && groups[groupKey].columns) || cfg.defaultColumns || COLUMN_DEFS;
      return Array.isArray(columns) && columns.length ? columns : COLUMN_DEFS;

    function allColumns() {
      const byId = new Map();
      for (const col of COLUMN_DEFS) byId.set(col.id, col);
      for (const col of configuredColumnsForItems(currentItemsForColumns())) byId.set(col.id, { ...(byId.get(col.id) || {}), ...col });
      return [...byId.values()];
    }

    function getColumn(id) {
      return allColumns().find(c => c.id === id) || { id, label: id };

    function ensureRequiredColumns(ids) {
      const next = Array.isArray(ids) ? ids.filter(id => id && id !== 'actions') : [];
      if (!next.includes('title')) next.unshift('title');
      return next.concat('actions');
    }

    function getPathValue(source, path) {
      if (!source || !path) return undefined;
      return String(path).split('.').reduce((current, segment) => {
        if (current == null) return undefined;
        const match = segment.match(/^(.+)\[(\d+)]$/);
        if (match) {
          const base = current[match[1]];
          return Array.isArray(base) ? base[Number(match[2])] : undefined;
        }
        return current[segment];
      }, source);
    }

    function findSummaryFieldValue(item, col) {
      const fields = item && item.summary && item.summary.iformFields;
      if (!Array.isArray(fields)) return undefined;
      const matched = fields.find(field => {
        if (!field || typeof field !== 'object') return false;
        return (col.fieldId && field.fieldId === col.fieldId) ||
          (col.fieldLabel && (field.label === col.fieldLabel || field.name === col.fieldLabel || field.title === col.fieldLabel));
      });
      return matched ? (matched.displayValue ?? matched.value ?? matched.name) : undefined;
    }

      return displayText(value);

    function addCustomColumnFromPanel() {

      const base = (path || label).replace(/[^\w]+/g, '-').replace(/^-+|-+$/g, '').toLowerCase() || Date.now();
      const existingIds = new Set(allColumns().map(c => c.id));
      let id = 'custom-' + base;

      while (existingIds.has(id)) {
